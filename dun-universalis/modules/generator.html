<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dungeon Generator · Dungeon Universalis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/styles/generator.css">
<style>
.back-home-btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:5px 12px;border:1px solid #4a3420;background:transparent;color:#6b4c2a;cursor:pointer;transition:all .15s;}
.back-home-btn:hover{border-color:#c8a060;color:#c8a060;}
</style>
</head>
<body>
<!-- HOME button injected by JS below -->
</body>
<script src="../src/data/images.js"></script>
<script src="../src/data/crops.js"></script>
<script src="../src/data/tiles.js"></script>
<script src="../src/data/elements.js"></script>
<script src="../src/scripts/shared.js"></script>
<script>
// Inject generator HTML then run script
(function(){
  var req=new XMLHttpRequest();
  req.open('GET','../src/fragments/generator_body.html',false);
  req.send();
  document.body.innerHTML=req.responseText;
  // Add HOME button
  var ctrl=document.querySelector('#controls');
  if(ctrl){
    var b=document.createElement('button');
    b.className='back-home-btn btn';b.textContent='⌂ HOME';
    b.onclick=function(){window.location.href='../index.html';};
    ctrl.appendChild(b);
  }
  preloadTileImages();
})();
</script>
<script src="../src/scripts/generator.js"></script>
</html>
