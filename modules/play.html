<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Play — Dungeon Universalis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0a06; --bg-panel:#1a1208; --border:#5a3e18; --border-gold:#a07820;
  --gold:#e0b840; --gold-dim:#8a7030; --text:#f0e4c0; --text-muted:#b09060;
  --green:#4a8a4a; --green-light:#7aba7a; --red:#8a2a2a; --red-light:#e07070;
  --grey:#3a3020; --grey-text:#706050;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'IM Fell English',Georgia,serif;color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--bg-panel);border-bottom:2px solid var(--border-gold);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:20;}
.hdr-home{text-decoration:none;font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--gold);flex-shrink:0;}
.hdr-back{font-family:Cinzel,serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:5px 10px;transition:all .15s;}
.hdr-back:hover{border-color:var(--border-gold);color:var(--gold);}
.hdr-title{font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--gold);letter-spacing:2px;}
.hdr-sub{font-family:Cinzel,serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-progress{font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);}
.hdr-progress b{color:var(--gold);}
.hdr-btn{font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.hdr-btn:hover{border-color:var(--border-gold);color:var(--gold);}
.hdr-btn.danger{border-color:var(--red);color:var(--red-light);}
.hdr-btn.danger:hover{background:rgba(138,42,42,.2);}

/* ── BODY ── */
.play-body{flex:1;display:flex;overflow:hidden;position:relative;}

/* ── MAP VIEWPORT ── */
#map-vp{flex:1;position:relative;overflow:hidden;background:#050302;cursor:grab;}
#map-vp.panning{cursor:grabbing;}
#map-vp.dragging-party{cursor:crosshair;}

/* ── WORLD (single transform target) ── */
#map-world{position:absolute;top:0;left:0;transform-origin:0 0;}
#map-img{display:block;max-width:none;user-select:none;pointer-events:none;}
#map-svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
#map-svg.interactive{pointer-events:all;}

/* ── ZOOM CONTROLS ── */
.zoom-ctrl{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:3px;z-index:10;}
.zoom-ctrl button{width:30px;height:30px;background:rgba(10,8,4,.9);border:1px solid var(--border);color:var(--gold);font-family:Cinzel,serif;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
.zoom-ctrl button:hover{border-color:var(--gold);}
.zoom-ctrl .fit-btn{font-size:9px;letter-spacing:0;height:24px;}

/* ── LEGEND ── */
.map-legend{position:absolute;bottom:16px;left:16px;background:rgba(10,8,4,.9);border:1px solid var(--border);padding:9px 13px;z-index:10;display:flex;flex-direction:column;gap:5px;}
.ml-item{display:flex;align-items:center;gap:8px;font-family:Cinzel,serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.ml-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── PARTY MARKER DRAG HINT ── */
.party-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(10,8,4,.85);border:1px solid var(--border-gold);color:var(--gold);font-family:Cinzel,serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;z-index:10;pointer-events:none;opacity:0;transition:opacity .3s;}
.party-hint.show{opacity:1;}

/* ── MISSION POPOVER ── */
#popover{position:fixed;z-index:100;width:230px;background:rgba(13,10,6,.97);border:1px solid var(--border-gold);box-shadow:0 4px 24px rgba(0,0,0,.7);display:none;flex-direction:column;}
#popover.open{display:flex;}
.pop-header{padding:10px 13px 8px;border-bottom:1px solid var(--border);background:rgba(160,120,32,.08);}
.pop-num{font-family:Cinzel,serif;font-size:8px;color:var(--text-muted);margin-bottom:2px;}
.pop-name{font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--gold);line-height:1.3;margin-bottom:4px;}
.pop-region{font-family:Cinzel,serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dim);}
.pop-badge{display:inline-block;font-family:Cinzel,serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-top:5px;}
.b-available{background:rgba(160,120,32,.15);border:1px solid var(--border-gold);color:var(--gold);}
.b-active{background:rgba(224,184,64,.2);border:1px solid var(--gold);color:var(--gold);}
.b-victory{background:rgba(74,138,74,.15);border:1px solid var(--green);color:var(--green-light);}
.b-defeat{background:rgba(138,42,42,.15);border:1px solid var(--red);color:var(--red-light);}
.b-locked{background:rgba(58,48,32,.3);border:1px solid var(--grey);color:var(--grey-text);}
.pop-goal{padding:8px 13px;font-size:11px;color:var(--text-muted);font-style:italic;line-height:1.5;border-bottom:1px solid var(--border);}
.pop-actions{padding:9px 13px;display:flex;flex-direction:column;gap:6px;}
.pop-launch{font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px;border:1px solid var(--border-gold);background:rgba(160,120,32,.1);color:var(--gold);cursor:pointer;transition:all .15s;width:100%;text-align:center;}
.pop-launch:hover{background:rgba(160,120,32,.25);}
.pop-outcome-row{display:flex;gap:5px;}
.pop-oc{flex:1;font-family:Cinzel,serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 4px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.pop-oc.v{border-color:var(--green);color:var(--green-light);}
.pop-oc.v:hover{background:rgba(74,138,74,.2);}
.pop-oc.d{border-color:var(--red);color:var(--red-light);}
.pop-oc.d:hover{background:rgba(138,42,42,.2);}
.pop-brief-link{font-family:Cinzel,serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:center;cursor:pointer;padding:4px 0 0;transition:color .15s;}
.pop-brief-link:hover{color:var(--gold);}
.pop-status-msg{font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-align:center;padding:6px 0;}

/* ── BRIEF PANEL ── */
.brief{width:340px;flex-shrink:0;background:rgba(26,18,8,.98);border-left:2px solid var(--border-gold);display:flex;flex-direction:column;z-index:15;overflow:hidden;transform:translateX(100%);transition:transform .25s ease;}
.brief.open{transform:translateX(0);}
.brief-close{position:absolute;top:10px;right:12px;background:transparent;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px;transition:color .15s;}
.brief-close:hover{color:var(--gold);}
.brief-top{padding:15px 38px 12px 18px;border-bottom:1px solid var(--border);background:rgba(160,120,32,.06);flex-shrink:0;position:relative;}
.brief-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold);margin-bottom:3px;line-height:1.3;}
.brief-region{font-family:Cinzel,serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.brief-scroll{flex:1;overflow-y:auto;padding:14px 18px;}
.brief-scroll::-webkit-scrollbar{width:4px;}
.brief-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.b-narrative{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.7;padding:9px 11px;border-left:3px solid var(--border-gold);background:rgba(160,120,32,.04);margin-bottom:12px;}
.b-row{margin-bottom:10px;}
.b-label{font-family:Cinzel,serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:3px;}
.b-val{font-size:12px;color:var(--text);line-height:1.6;}
.b-val.gold{color:var(--gold);}
.b-sep{border:none;border-top:1px solid var(--border);margin:10px 0;}
.b-element{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:12px;}
.b-enum{width:16px;height:16px;border-radius:50%;background:var(--text);color:var(--bg);font-family:Cinzel,serif;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

/* ── SVG ELEMENTS ── */
.pin-available  { fill:#a07820; }
.pin-active     { fill:#e0b840; }
.pin-victory    { fill:#4a8a4a; }
.pin-defeat     { fill:#8a2a2a; }
.pin-locked     { fill:#2a2016; }
.pin-text       { fill:#0a0806; font-family:Cinzel,serif; font-weight:700; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
.pin-ring       { fill:none; stroke:#e0b840; stroke-width:1.5; opacity:0; }
.pin-clickable  { cursor:pointer; pointer-events:all; }
.conn-line      { fill:none; stroke-width:1.5; }
.cv{stroke:#a07820;} .cd{stroke:#8b1a1a;} .cc{stroke:#4a5a6e;}
.party-drag-zone{ cursor:move; pointer-events:all; }
</style>
</head>
<body>

<div class="hdr">
  <a href="../index.html" class="hdr-home" title="Home">⚔</a>
  <a class="hdr-back" href="campaigns.html">← Campaigns</a>
  <div>
    <div class="hdr-title" id="hdr-title">Loading…</div>
    <div class="hdr-sub">Campaign Play</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-progress" id="hdr-progress"></div>
    <button class="hdr-btn" onclick="togglePartyDrag()" id="btn-move-party" title="Move party marker">⚑ Move Party</button>
    <button class="hdr-btn danger" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<div class="play-body">

  <div id="map-vp">
    <div id="map-world">
      <img id="map-img" src="arasca-map.jpg" alt="World of Arasca" draggable="false">
      <svg id="map-svg"></svg>
    </div>

    <div class="map-legend">
      <div class="ml-item"><div class="ml-dot" style="background:#a07820;border:1px solid #e0b840;"></div>Available</div>
      <div class="ml-item"><div class="ml-dot" style="background:#e0b840;box-shadow:0 0 4px #e0b840;"></div>Active</div>
      <div class="ml-item"><div class="ml-dot" style="background:#4a8a4a;"></div>Victory</div>
      <div class="ml-item"><div class="ml-dot" style="background:#8a2a2a;"></div>Defeat</div>
      <div class="ml-item"><div class="ml-dot" style="background:#2a2016;border:1px solid #5a3e18;"></div>Locked</div>
      <div class="ml-item" style="margin-top:4px;border-top:1px solid var(--border);padding-top:5px;">
        <span style="font-size:14px;line-height:1;">⚑</span>Party location
      </div>
    </div>

    <div class="party-hint" id="party-hint">Click map to place party</div>

    <div class="zoom-ctrl">
      <button onclick="mZoom(0.2)">+</button>
      <button onclick="mZoom(-0.2)">−</button>
      <button class="fit-btn" onclick="mFit()">Fit</button>
    </div>
  </div>

  <!-- Brief panel — slides in from right -->
  <div class="brief" id="brief-panel">
    <div class="brief-top">
      <button class="brief-close" onclick="closeBrief()">×</button>
      <div class="brief-name" id="b-name"></div>
      <div class="brief-region" id="b-region"></div>
      <span class="brief-badge" id="b-badge"></span>
    </div>
    <div class="brief-scroll" id="b-body"></div>
  </div>
</div>

<!-- Mission popover -->
<div id="popover">
  <div class="pop-header">
    <div class="pop-num" id="pop-num"></div>
    <div class="pop-name" id="pop-name"></div>
    <div class="pop-region" id="pop-region"></div>
    <span class="pop-badge" id="pop-badge"></span>
  </div>
  <div class="pop-goal" id="pop-goal"></div>
  <div class="pop-actions" id="pop-actions"></div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────
var campaign = null;
var customMissions = [];
var playState = null;   // { [nodeId]: 'locked'|'available'|'active'|'victory'|'defeat' }
var partyPos = null;    // { x, y } normalised 0-1 in image space

var IMG_W = 2000, IMG_H = 722;
var mScale = 1, mOX = 0, mOY = 0;
var mDrag = false, mDSX = 0, mDSY = 0, mDOX = 0, mDOY = 0, mDidDrag = false;
var partyDragMode = false;
var openNodeId = null;  // which pin's popover is open

// ── OFFICIAL MISSIONS ────────────────────────────────────────
var OFFICIAL_MISSIONS = [
  {id:'off_1', name:'Defeat the Leader',       icon:'⚔',  goal:'Knock out the Quest Leader.',                                    settings:['dungeon','civilised','outdoor'], turnLimit:null},
  {id:'off_2', name:'Steal the Relic',          icon:'💎', goal:'Steal the relic from the Leader and escape.',                   settings:['dungeon','civilised'],           turnLimit:45},
  {id:'off_3', name:'Rescue the Prisoner',      icon:'⛓',  goal:'Free the prisoner and escort them to the exit.',               settings:['dungeon','civilised'],           turnLimit:40},
  {id:'off_4', name:'Destroy the Artefact',     icon:'💥', goal:'Reach the Artefact and destroy it.',                           settings:['dungeon'],                       turnLimit:null},
  {id:'off_5', name:'Escort the Messenger',     icon:'📜', goal:'Keep the messenger alive until they reach the exit.',           settings:['dungeon','civilised','outdoor'], turnLimit:35},
  {id:'off_6', name:'Survive the Night',        icon:'🌑', goal:'Survive until dawn.',                                           settings:['dungeon','civilised'],           turnLimit:20},
  {id:'off_7', name:'Plunder the Vault',        icon:'🏆', goal:'Collect as much treasure as possible and escape.',             settings:['dungeon','civilised'],           turnLimit:35},
  {id:'off_8', name:'Assassinate the Champion', icon:'🗡', goal:'Eliminate the Champion without alerting the garrison.',         settings:['dungeon','civilised'],           turnLimit:null},
  {id:'off_9', name:'Retrieve the Tome',        icon:'📖', goal:'Find and retrieve the ancient tome.',                          settings:['dungeon','civilised'],           turnLimit:50},
  {id:'off_10',name:'The Gauntlet',             icon:'🏃', goal:'All heroes must reach the Exit before the turn limit.',        settings:['dungeon'],                       turnLimit:25},
  {id:'off_11',name:'The Siege',                icon:'🏰', goal:'Defend the stronghold entrance for the required turns.',       settings:['dungeon','civilised'],           turnLimit:15},
  {id:'off_12',name:'The Final Reckoning',      icon:'💀', goal:'Defeat the Boss and all Champions.',                           settings:['dungeon'],                       turnLimit:20},
];
function getMission(mid) {
  return OFFICIAL_MISSIONS.find(function(m){return m.id===mid;}) ||
    customMissions.find(function(m){return m.id===mid;}) ||
    (campaign._missions||[]).find(function(m){return m.id===mid;}) || null;
}

// ── LOAD ─────────────────────────────────────────────────────
function load() {
  var id = new URLSearchParams(window.location.search).get('c');
  try{customMissions=JSON.parse(localStorage.getItem('dun_custom_missions')||'[]');}catch(e){}
  var camps=[]; try{camps=JSON.parse(localStorage.getItem('dun_campaigns')||'[]');}catch(e){}
  campaign = camps.find(function(c){return c.id===id;});
  if (!campaign) { document.getElementById('hdr-title').textContent='Campaign not found'; return; }
  document.title = campaign.name+' — DUN Play';
  document.getElementById('hdr-title').textContent = campaign.name;
  var saved=null; try{saved=JSON.parse(localStorage.getItem('dun_play_'+id));}catch(e){}
  if (saved) {
    playState = saved.state || saved; // handle old format
    partyPos  = saved.party || null;
  } else {
    playState = buildInitialState();
  }
  var img = document.getElementById('map-img');
  function onImgReady() {
    IMG_W = img.naturalWidth  || 2000;
    IMG_H = img.naturalHeight || 722;
    var svg = document.getElementById('map-svg');
    svg.setAttribute('width',  IMG_W);
    svg.setAttribute('height', IMG_H);
    svg.style.width  = IMG_W + 'px';
    svg.style.height = IMG_H + 'px';
    ensurePins();
    renderMap();
    mFit();
  }
  if (img.complete && img.naturalWidth) onImgReady();
  else img.onload = onImgReady;
}

// Fallback pin positions spread across the map — used when a node has no mapPin.
// Arranged in a loose grid that avoids the sea areas at the edges.
var FALLBACK_PINS = [
  {x:0.18,y:0.48},{x:0.28,y:0.52},{x:0.38,y:0.48},{x:0.48,y:0.52},
  {x:0.58,y:0.46},{x:0.65,y:0.50},{x:0.72,y:0.48},{x:0.78,y:0.52},
  {x:0.22,y:0.60},{x:0.34,y:0.60},{x:0.44,y:0.58},{x:0.54,y:0.58},
  {x:0.62,y:0.58},{x:0.70,y:0.58},{x:0.30,y:0.40},{x:0.50,y:0.40},
];

function ensurePins() {
  var fallbackIdx = 0;
  // Build a set of already-used positions so fallbacks don't land on existing pins
  var used = {};
  (campaign.nodes||[]).forEach(function(n){
    if (n.mapPin) used[n.mapPin.x.toFixed(2)+','+n.mapPin.y.toFixed(2)] = true;
  });

  (campaign.nodes||[]).forEach(function(n) {
    if (n.mapPin) return; // already pinned
    // Find next fallback not already used
    var pos;
    while (fallbackIdx < FALLBACK_PINS.length) {
      pos = FALLBACK_PINS[fallbackIdx++];
      var key = pos.x.toFixed(2)+','+pos.y.toFixed(2);
      if (!used[key]) { used[key]=true; break; }
    }
    if (!pos) pos = {x: 0.1 + (fallbackIdx*0.07)%0.8, y: 0.45 + (fallbackIdx%3)*0.08};
    // Assign directly to the node object in campaign (in-memory only, not saved back)
    n.mapPin = { x: pos.x, y: pos.y, isAutoPin: true };
  });
}

function buildInitialState() {
  var s={};
  (campaign.nodes||[]).forEach(function(n,i){s[n.id]=i===0?'available':'locked';});
  return s;
}

function saveState() {
  localStorage.setItem('dun_play_'+campaign.id, JSON.stringify({state:playState, party:partyPos}));
}

function nodeStatus(nid){ return playState[nid]||'locked'; }

// ── PLAY LOGIC ────────────────────────────────────────────────
function recordOutcome(nid, outcome) {
  playState[nid] = outcome;
  (campaign.connections||[]).forEach(function(c){
    if (c.from!==nid) return;
    // Unlock if: outcome matches, connection is 'custom', or connection has no outcome set
    var co = c.outcome || '';
    var unlocks = co==='' || co===outcome || co==='custom';
    if (unlocks) {
      if (nodeStatus(c.to)==='locked') playState[c.to]='available';
    }
  });
  saveState();
  openNodeId = null;
  closePopover();
  renderMap();
}

function confirmReset() {
  if (!confirm('Reset all campaign progress for "'+campaign.name+'"?')) return;
  playState = buildInitialState();
  partyPos = null;
  openNodeId = null;
  saveState();
  closePopover();
  closeBrief();
  renderMap();
}

// ── RENDER ────────────────────────────────────────────────────
function renderMap() {
  renderConnections();
  renderPins();
  renderParty();
  updateProgress();
}

var PIN_R = 12; // pin radius in image pixels

// ── CONNECTION LINES (only between completed nodes) ───────────
function renderConnections() {
  // Remove old connection groups
  var svg = document.getElementById('map-svg');
  Array.from(svg.querySelectorAll('.conn-group')).forEach(function(g){g.remove();});

  // Ensure arrowhead defs
  var defs = svg.querySelector('defs');
  if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg','defs'); svg.insertBefore(defs,svg.firstChild); }
  var aColors = {victory:'#a07820',defeat:'#8b1a1a',custom:'#4a5a6e'};
  Object.keys(aColors).forEach(function(o){
    if (defs.querySelector('#arr-'+o)) return;
    var mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id','arr-'+o); mk.setAttribute('markerWidth','7'); mk.setAttribute('markerHeight','5');
    mk.setAttribute('refX','6'); mk.setAttribute('refY','2.5'); mk.setAttribute('orient','auto');
    var poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 7 2.5, 0 5'); poly.setAttribute('fill',aColors[o]); poly.setAttribute('opacity','0.85');
    mk.appendChild(poly); defs.appendChild(mk);
  });

  (campaign.connections||[]).forEach(function(conn){
    var fn = (campaign.nodes||[]).find(function(n){return n.id===conn.from;});
    var tn = (campaign.nodes||[]).find(function(n){return n.id===conn.to;});
    if (!fn||!tn||!fn.mapPin||!tn.mapPin) return;

    var fst = nodeStatus(conn.from);
    // Only show if the from-node is completed AND this outcome was the one taken
    var show = (fst==='victory' && conn.outcome==='victory') ||
               (fst==='defeat'  && conn.outcome==='defeat')  ||
               (fst==='victory' && conn.outcome==='custom')  ||
               (fst==='defeat'  && conn.outcome==='custom');
    if (!show) return;

    var x1 = fn.mapPin.x * IMG_W;
    var y1 = fn.mapPin.y * IMG_H;
    var x2 = tn.mapPin.x * IMG_W;
    var y2 = tn.mapPin.y * IMG_H;

    // Shorten line to stop at pin edge
    var dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    if (len < 1) return;
    var ux = dx/len, uy = dy/len;
    x1 += ux*(PIN_R+2); y1 += uy*(PIN_R+2);
    x2 -= ux*(PIN_R+6); y2 -= uy*(PIN_R+6);

    var oc = conn.outcome||'custom';
    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','conn-group');

    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('class','conn-line '+(oc==='victory'?'cv':oc==='defeat'?'cd':'cc'));
    line.setAttribute('marker-end','url(#arr-'+oc+')');
    g.appendChild(line);

    // Outcome label along the line
    var label = conn.label || (oc!=='custom' ? oc : '');
    if (label) {
      var mx=(x1+x2)/2, my=(y1+y2)/2;
      var bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      var lw = label.length*5+10;
      bg.setAttribute('x',mx-lw/2); bg.setAttribute('y',my-8);
      bg.setAttribute('width',lw); bg.setAttribute('height',13);
      bg.setAttribute('fill','rgba(13,10,6,0.8)'); bg.setAttribute('rx','2');
      g.appendChild(bg);
      var lt = document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',mx); lt.setAttribute('y',my+2);
      lt.setAttribute('text-anchor','middle');
      lt.setAttribute('fill',aColors[oc]||'#4a5a6e');
      lt.setAttribute('font-size','9'); lt.setAttribute('font-family','Cinzel,serif');
      lt.textContent = label.length>16?label.substring(0,15)+'…':label;
      g.appendChild(lt);
    }
    svg.appendChild(g);
  });
}

// ── MISSION PINS ─────────────────────────────────────────────
var PIN_COLORS = {
  available:'#a07820', active:'#e0b840',
  victory:'#4a8a4a',   defeat:'#8a2a2a', locked:'#1e180c'
};
var PIN_TEXT_COLORS = {
  available:'#0a0806', active:'#0a0806',
  victory:'#d0f0d0',   defeat:'#f0d0d0', locked:'#5a4a30'
};

function renderPins() {
  var svg = document.getElementById('map-svg');
  Array.from(svg.querySelectorAll('.pin-group')).forEach(function(g){g.remove();});

  (campaign.nodes||[]).forEach(function(node, idx) {
    if (!node.mapPin) return;
    var m  = getMission(node.missionId);
    var st = nodeStatus(node.id);
    var cx = node.mapPin.x * IMG_W;
    var cy = node.mapPin.y * IMG_H;
    var num = node.locNum || (idx+1);

    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','pin-group pin-clickable');
    g.setAttribute('data-nodeid', node.id);

    // Glow for available/active
    if (st==='available'||st==='active') {
      var glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
      glow.setAttribute('cx',cx); glow.setAttribute('cy',cy);
      glow.setAttribute('r',PIN_R+6);
      glow.setAttribute('fill',st==='active'?'rgba(224,184,64,0.2)':'rgba(160,120,32,0.15)');
      g.appendChild(glow);
    }

    // Shadow
    var shadow = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    shadow.setAttribute('cx',cx+2); shadow.setAttribute('cy',cy+PIN_R+2);
    shadow.setAttribute('rx',PIN_R*0.8); shadow.setAttribute('ry',4);
    shadow.setAttribute('fill','rgba(0,0,0,0.35)');
    g.appendChild(shadow);

    // Main circle
    var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',cx); circle.setAttribute('cy',cy);
    circle.setAttribute('r',PIN_R);
    circle.setAttribute('fill', PIN_COLORS[st]||'#1e180c');
    circle.setAttribute('stroke', openNodeId===node.id ? '#e0b840' : (st==='locked'?'#3a2a14':'#0a0806'));
    circle.setAttribute('stroke-width', openNodeId===node.id ? '2.5' : '1.5');
    g.appendChild(circle);

    // Status icon ring for active
    if (st==='active') {
      var ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',cx); ring.setAttribute('cy',cy); ring.setAttribute('r',PIN_R+3);
      ring.setAttribute('fill','none'); ring.setAttribute('stroke','#e0b840'); ring.setAttribute('stroke-width','1');
      ring.setAttribute('stroke-dasharray','3 3'); ring.setAttribute('opacity','0.7');
      g.appendChild(ring);
    }

    // Number text
    var txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',cx); txt.setAttribute('y',cy);
    txt.setAttribute('class','pin-text');
    txt.setAttribute('font-size', String(num).length>2?'7':'9');
    txt.setAttribute('fill', PIN_TEXT_COLORS[st]||'#5a4a30');
    txt.textContent = num;
    g.appendChild(txt);

    // Status dot (top-right corner of pin)
    if (st==='victory'||st==='defeat') {
      var dot = document.createElementNS('http://www.w3.org/2000/svg','text');
      dot.setAttribute('x',cx+PIN_R-2); dot.setAttribute('y',cy-PIN_R+2);
      dot.setAttribute('text-anchor','middle'); dot.setAttribute('dominant-baseline','central');
      dot.setAttribute('font-size','9'); dot.setAttribute('pointer-events','none');
      dot.textContent = st==='victory' ? '✓' : '✗';
      dot.setAttribute('fill', st==='victory'?'#7aba7a':'#e07070');
      g.appendChild(dot);
    }

    g.addEventListener('click', function(e){
      e.stopPropagation();
      if (partyDragMode) return;
      openPin(node.id, cx, cy);
    });

    svg.appendChild(g);
  });
}

// ── PARTY MARKER ─────────────────────────────────────────────
function renderParty() {
  var svg = document.getElementById('map-svg');
  var existing = svg.querySelector('.party-group');
  if (existing) existing.remove();
  if (!partyPos) return;

  var px = partyPos.x * IMG_W;
  var py = partyPos.y * IMG_H;

  var g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','party-group party-drag-zone');

  // Glow
  var glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('cx',px); glow.setAttribute('cy',py); glow.setAttribute('r','20');
  glow.setAttribute('fill','rgba(224,184,64,0.12)');
  g.appendChild(glow);

  // Base circle
  var base = document.createElementNS('http://www.w3.org/2000/svg','circle');
  base.setAttribute('cx',px); base.setAttribute('cy',py); base.setAttribute('r','14');
  base.setAttribute('fill','rgba(13,10,6,0.85)');
  base.setAttribute('stroke','#e0b840'); base.setAttribute('stroke-width','2');
  g.appendChild(base);

  // Banner icon
  var icon = document.createElementNS('http://www.w3.org/2000/svg','text');
  icon.setAttribute('x',px); icon.setAttribute('y',py);
  icon.setAttribute('text-anchor','middle'); icon.setAttribute('dominant-baseline','central');
  icon.setAttribute('font-size','14'); icon.setAttribute('pointer-events','none');
  icon.textContent = '⚑';
  g.appendChild(icon);

  // Label
  var lbg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  lbg.setAttribute('x',px-24); lbg.setAttribute('y',py+16);
  lbg.setAttribute('width','48'); lbg.setAttribute('height','12');
  lbg.setAttribute('fill','rgba(13,10,6,0.75)'); lbg.setAttribute('rx','2');
  g.appendChild(lbg);
  var lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',px); lbl.setAttribute('y',py+23);
  lbl.setAttribute('text-anchor','middle');
  lbl.setAttribute('fill','#e0b840'); lbl.setAttribute('font-size','8');
  lbl.setAttribute('font-family','Cinzel,serif'); lbl.setAttribute('pointer-events','none');
  lbl.textContent = 'PARTY';
  g.appendChild(lbl);

  // Drag behaviour
  var pDrag=false, pDSX=0, pDSY=0;
  g.addEventListener('mousedown', function(e){
    e.stopPropagation();
    pDrag=true; pDSX=e.clientX; pDSY=e.clientY;
    document.getElementById('map-vp').classList.add('panning');
  });
  document.addEventListener('mousemove', function(e){
    if (!pDrag) return;
    var dx=e.clientX-pDSX, dy=e.clientY-pDSY;
    pDSX=e.clientX; pDSY=e.clientY;
    var nx = partyPos.x + dx/(IMG_W*mScale);
    var ny = partyPos.y + dy/(IMG_H*mScale);
    partyPos = { x:Math.max(0,Math.min(1,nx)), y:Math.max(0,Math.min(1,ny)) };
    renderParty();
  });
  document.addEventListener('mouseup', function(){
    if (!pDrag) return;
    pDrag=false;
    document.getElementById('map-vp').classList.remove('panning');
    saveState();
  });

  svg.appendChild(g);
}

// ── PARTY PLACEMENT MODE ──────────────────────────────────────
function togglePartyDrag() {
  partyDragMode = !partyDragMode;
  var btn = document.getElementById('btn-move-party');
  var hint = document.getElementById('party-hint');
  var vp = document.getElementById('map-vp');
  if (partyDragMode) {
    btn.style.borderColor = '#e0b840'; btn.style.color = '#e0b840';
    hint.classList.add('show');
    vp.classList.add('dragging-party');
    document.getElementById('map-svg').classList.add('interactive');
  } else {
    btn.style.borderColor = ''; btn.style.color = '';
    hint.classList.remove('show');
    vp.classList.remove('dragging-party');
    if (!openNodeId) document.getElementById('map-svg').classList.remove('interactive');
  }
}

// ── POPOVER ───────────────────────────────────────────────────
function openPin(nodeId, pinCX, pinCY) {
  openNodeId = nodeId;
  renderPins(); // re-render to show selected ring

  var node = (campaign.nodes||[]).find(function(n){return n.id===nodeId;});
  var m    = getMission(node.missionId);
  var st   = nodeStatus(nodeId);
  var idx  = (campaign.nodes||[]).indexOf(node);
  var num  = node.locNum || (idx+1);

  var badgeLabels = {available:'Available',active:'In Progress',victory:'Victory',defeat:'Defeat',locked:'Locked'};
  var badgeClasses= {available:'b-available',active:'b-active',victory:'b-victory',defeat:'b-defeat',locked:'b-locked'};

  document.getElementById('pop-num').textContent    = 'Mission '+num;
  document.getElementById('pop-name').textContent   = m ? (m.icon+' '+m.name) : nodeId;
  document.getElementById('pop-region').textContent = node.region ? '📍 '+node.region : '';
  document.getElementById('pop-badge').textContent  = badgeLabels[st]||st;
  document.getElementById('pop-badge').className    = 'pop-badge '+(badgeClasses[st]||'b-locked');
  document.getElementById('pop-goal').textContent   = m ? (m.goal||'') : '';

  var acts = '';
  var playable = st==='available'||st==='active';
  if (playable) {
    acts += '<button class="pop-launch" onclick="launchDungeon(\''+nodeId+'\')">⚔ Launch Dungeon</button>';
    acts += '<div class="pop-outcome-row">'+
      '<button class="pop-oc v" onclick="recordOutcome(\''+nodeId+'\',\'victory\')">✓ Victory</button>'+
      '<button class="pop-oc d" onclick="recordOutcome(\''+nodeId+'\',\'defeat\')">✗ Defeat</button>'+
    '</div>';
  } else if (st==='victory') {
    acts += '<div class="pop-status-msg" style="color:var(--green-light);">✓ Completed — Victory</div>';
  } else if (st==='defeat') {
    acts += '<div class="pop-status-msg" style="color:var(--red-light);">✗ Completed — Defeat</div>';
  } else {
    acts += '<div class="pop-status-msg" style="color:var(--grey-text);">🔒 Locked</div>';
  }
  if (m && (m.narrative||m.setup||m.specialRules)) {
    acts += '<div class="pop-brief-link" onclick="openBrief(\''+nodeId+'\')">Read full brief →</div>';
  }
  document.getElementById('pop-actions').innerHTML = acts;

  // Position popover near pin in screen space
  positionPopover(pinCX, pinCY);
  document.getElementById('popover').classList.add('open');
  document.getElementById('map-svg').classList.add('interactive');
}

function positionPopover(pinImgX, pinImgY) {
  var pop = document.getElementById('popover');
  pop.style.display = 'flex'; // temporarily show to measure
  var pw = pop.offsetWidth || 230;
  var ph = pop.offsetHeight || 200;

  // Convert image coords to screen coords
  var vp = document.getElementById('map-vp').getBoundingClientRect();
  var sx = pinImgX * mScale + mOX + vp.left;
  var sy = pinImgY * mScale + mOY + vp.top;

  // Try right of pin first
  var PIN_R_SCREEN = PIN_R * mScale;
  var x = sx + PIN_R_SCREEN + 8;
  var y = sy - ph/2;

  // Flip left if off-screen right
  if (x + pw > window.innerWidth - 10) x = sx - PIN_R_SCREEN - pw - 8;
  // Clamp vertical
  y = Math.max(60, Math.min(window.innerHeight - ph - 10, y));

  pop.style.left = x + 'px';
  pop.style.top  = y + 'px';
}

function closePopover() {
  openNodeId = null;
  document.getElementById('popover').classList.remove('open');
  if (!partyDragMode) document.getElementById('map-svg').classList.remove('interactive');
  renderPins();
}

// ── BRIEF PANEL ───────────────────────────────────────────────
function openBrief(nodeId) {
  var node = (campaign.nodes||[]).find(function(n){return n.id===nodeId;});
  if (!node) return;
  var m = getMission(node.missionId);
  var st = nodeStatus(nodeId);

  document.getElementById('b-name').textContent   = m?m.name:nodeId;
  document.getElementById('b-region').textContent = node.region?'📍 '+node.region:'';
  var badgeClasses={available:'b-available',active:'b-active',victory:'b-victory',defeat:'b-defeat',locked:'b-locked'};
  var badgeLabels ={available:'Available',active:'In Progress',victory:'Victory',defeat:'Defeat',locked:'Locked'};
  document.getElementById('b-badge').textContent  = badgeLabels[st]||st;
  document.getElementById('b-badge').className    = 'brief-badge '+(badgeClasses[st]||'b-locked');

  var body='';
  if (m) {
    if (m.narrative) body+='<div class="b-narrative">'+m.narrative+'</div>';
    body+=brow('Goal',m.goal);
    if (m.faction) body+=brow('Faction',m.faction);
    if (m.setup){body+='<hr class="b-sep">';body+=brow('Set-Up',m.setup);}
    if (m.specialRules) body+=brow('Special Rules',m.specialRules);
    if (m.specialElements&&m.specialElements.length) {
      body+='<div class="b-row"><span class="b-label">Special Elements</span>';
      m.specialElements.forEach(function(el,i){body+='<div class="b-element"><div class="b-enum">'+(i+1)+'</div><div>'+el+'</div></div>';});
      body+='</div>';
    }
    if (m.furniture&&m.furniture.length) body+=brow('Furniture',m.furniture.join(', '));
    if (m.otherElements&&m.otherElements.length) body+=brow('Other Elements',m.otherElements.join(', '));
    body+='<hr class="b-sep">';
    body+=brow('Quest End',m.questEnd);
    if (m.rewards) body+='<div class="b-row"><span class="b-label">Rewards</span><div class="b-val gold">'+m.rewards+'</div></div>';
    if (m.tiles) body+=brow('Tiles',m.tiles);
    if (m.turnLimit) body+=brow('Turn Limit',m.turnLimit+' turns');
  } else {
    body+='<div style="color:var(--text-muted);font-style:italic;font-size:12px;padding:8px 0;">Official mission — details in rulebook.</div>';
  }
  document.getElementById('b-body').innerHTML = body;
  document.getElementById('brief-panel').classList.add('open');
}

function closeBrief() { document.getElementById('brief-panel').classList.remove('open'); }
function brow(l,v){ return v?'<div class="b-row"><span class="b-label">'+l+'</span><div class="b-val">'+v+'</div></div>':''; }

// ── LAUNCH ────────────────────────────────────────────────────
function launchDungeon(nid) {
  var node=(campaign.nodes||[]).find(function(n){return n.id===nid;});
  if (!node) return;
  var m=getMission(node.missionId);
  var settings=m?(m.settings||['dungeon']):['dungeon'];
  var handoff={
    campaignId:campaign.id, nodeId:nid,
    mission:m||{id:nid,name:node.missionId,goal:'',icon:'⚔',settings:['dungeon']},
    dungeonType:node.dungeonType||'random',
    setting:node.preferredSetting||settings[0]||'dungeon'
  };
  try{localStorage.setItem('dun_campaign_launch',JSON.stringify(handoff));}catch(e){}
  window.location.href='generator.html';
}

// ── PROGRESS ─────────────────────────────────────────────────
function updateProgress() {
  var total=(campaign.nodes||[]).length;
  var done=(campaign.nodes||[]).filter(function(n){var s=nodeStatus(n.id);return s==='victory'||s==='defeat';}).length;
  document.getElementById('hdr-progress').innerHTML='Missions: <b>'+done+'</b> / '+total;
}

// ── PAN / ZOOM ────────────────────────────────────────────────
function applyT(){
  document.getElementById('map-world').style.transform=
    'translate('+mOX+'px,'+mOY+'px) scale('+mScale+')';
}
function mZoom(d, cx, cy){
  var vp=document.getElementById('map-vp');
  if (cx===undefined){cx=vp.clientWidth/2; cy=vp.clientHeight/2;}
  var ns=Math.max(0.12,Math.min(8,mScale*(1+d)));
  var r=ns/mScale;
  mOX=cx-r*(cx-mOX); mOY=cy-r*(cy-mOY); mScale=ns; applyT();
  // Reposition open popover
  if (openNodeId) {
    var n=(campaign.nodes||[]).find(function(n){return n.id===openNodeId;});
    if (n&&n.mapPin) positionPopover(n.mapPin.x*IMG_W, n.mapPin.y*IMG_H);
  }
}
function mFit(){
  var vp=document.getElementById('map-vp');
  var vw=vp.clientWidth, vh=vp.clientHeight;
  mScale=Math.min(vw/IMG_W, vh/IMG_H);
  mOX=(vw-IMG_W*mScale)/2; mOY=(vh-IMG_H*mScale)/2; applyT();
}

(function initInteraction(){
  var vp = document.getElementById('map-vp');

  // Wheel zoom
  vp.addEventListener('wheel',function(e){
    e.preventDefault();
    var r=vp.getBoundingClientRect();
    mZoom(e.deltaY>0?-0.1:0.1, e.clientX-r.left, e.clientY-r.top);
  },{passive:false});

  // Pan drag
  vp.addEventListener('mousedown',function(e){
    if (e.target.closest('.pin-group')||e.target.closest('.party-group')) return;
    if (partyDragMode) {
      // Place party on click
      var r=vp.getBoundingClientRect();
      var ix=(e.clientX-r.left-mOX)/mScale;
      var iy=(e.clientY-r.top -mOY)/mScale;
      partyPos={x:Math.max(0,Math.min(1,ix/IMG_W)), y:Math.max(0,Math.min(1,iy/IMG_H))};
      saveState(); renderParty(); togglePartyDrag(); return;
    }
    mDrag=true; mDidDrag=false;
    mDSX=e.clientX; mDSY=e.clientY; mDOX=mOX; mDOY=mOY;
    vp.classList.add('panning');
  });
  document.addEventListener('mousemove',function(e){
    if (!mDrag) return;
    var dx=e.clientX-mDSX, dy=e.clientY-mDSY;
    if (Math.abs(dx)+Math.abs(dy)>3) mDidDrag=true;
    mOX=mDOX+dx; mOY=mDOY+dy; applyT();
  });
  document.addEventListener('mouseup',function(){
    if (!mDrag) return; mDrag=false;
    vp.classList.remove('panning');
  });

  // Click outside popover → close
  document.addEventListener('click',function(e){
    if (!openNodeId) return;
    var pop=document.getElementById('popover');
    if (!pop.contains(e.target)&&!e.target.closest('.pin-group')) {
      closePopover();
    }
  });

  window.addEventListener('resize',function(){mFit();});
})();

load();
</script>
