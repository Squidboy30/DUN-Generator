<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Play — Dungeon Universalis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0d0a06;
  --bg-panel:    #1a1208;
  --bg-card:     #211609;
  --border:      #5a3e18;
  --border-gold: #a07820;
  --gold:        #e0b840;
  --gold-dim:    #8a7030;
  --text:        #f0e4c0;
  --text-muted:  #b09060;
  --green:       #4a8a4a;
  --green-light: #7aba7a;
  --red:         #8a2a2a;
  --red-light:   #e07070;
  --grey:        #3a3020;
  --grey-text:   #706050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'IM Fell English', Georgia, serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* HEADER */
.hdr { background: var(--bg-panel); border-bottom: 2px solid var(--border-gold); padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 10; }
.hdr-back { font-family: Cinzel,serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; border: 1px solid var(--border); padding: 5px 10px; transition: all .15s; }
.hdr-back:hover { border-color: var(--border-gold); color: var(--gold); }
.hdr-title { font-family: 'Cinzel Decorative', serif; font-size: 16px; color: var(--gold); letter-spacing: 2px; }
.hdr-sub { font-family: Cinzel,serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.hdr-progress { font-family: Cinzel,serif; font-size: 10px; letter-spacing: 1px; color: var(--text-muted); }
.hdr-progress b { color: var(--gold); }
.btn { font-family: Cinzel,serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--border-gold); color: var(--gold); }
.btn.danger { border-color: var(--red); color: var(--red-light); }
.btn.danger:hover { background: rgba(138,42,42,.2); }

/* BODY */
.body { flex:1; display:flex; overflow:hidden; position:relative; }
.map-backdrop { position:absolute; inset:0; background-image:url('arasca-map.jpg'); background-size:cover; background-position:center; filter:saturate(.08) brightness(.12); z-index:0; }

/* FLOW AREA */
.flow-area { flex:1; position:relative; overflow:hidden; z-index:1; cursor:default; }
.flow-world { position:absolute; top:0; left:0; transform-origin:0 0; }
.flow-svg { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
.flow-nodes { position:absolute; top:0; left:0; }

/* NODE CARDS */
.pnode { position:absolute; width:190px; border:1px solid var(--border); background:var(--bg-card); transition:border-color .2s, box-shadow .2s, transform .15s; user-select:none; }
.pnode.locked { opacity:.35; filter:saturate(.15); }
.pnode.available { border-color:var(--border-gold); cursor:pointer; box-shadow:0 0 12px rgba(160,120,32,.25); }
.pnode.available:hover { border-color:var(--gold); box-shadow:0 0 22px rgba(224,184,64,.38); transform:translateY(-2px); }
.pnode.active { border-color:var(--gold); box-shadow:0 0 0 2px var(--gold), 0 0 28px rgba(224,184,64,.4); cursor:pointer; }
.pnode.active::after { content:''; position:absolute; inset:-4px; border:2px solid var(--gold); opacity:0; animation:pulse-ring 2s ease-out infinite; pointer-events:none; }
@keyframes pulse-ring { 0%{inset:-4px;opacity:.7} 100%{inset:-16px;opacity:0} }
.pnode.victory { border-color:var(--green); opacity:.7; }
.pnode.defeat  { border-color:var(--red);   opacity:.7; }
.pnode-hdr { padding:7px 10px 5px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
.pnode-num { font-family:Cinzel,serif; font-size:9px; color:var(--text-muted); flex-shrink:0; min-width:14px; }
.pnode-name { font-family:Cinzel,serif; font-size:10px; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pnode-icon { font-size:12px; flex-shrink:0; }
.pnode-body { padding:6px 10px 8px; }
.pnode-goal { font-size:10px; color:var(--text-muted); font-style:italic; line-height:1.4; margin-bottom:4px; }
.pnode-region { font-family:Cinzel,serif; font-size:8px; letter-spacing:1px; color:var(--gold-dim); text-transform:uppercase; }

/* ZOOM CONTROLS */
.zoom-ctrl { position:absolute; bottom:14px; left:14px; display:flex; gap:4px; z-index:10; }
.zoom-ctrl button { width:26px; height:26px; background:rgba(10,8,6,.85); border:1px solid var(--border); color:var(--gold); font-family:Cinzel,serif; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
.zoom-ctrl button:hover { border-color:var(--gold); }
.zoom-ctrl .fit-btn { width:auto; padding:0 8px; font-size:9px; letter-spacing:0; }

/* LEGEND */
.legend { position:absolute; top:12px; left:12px; background:rgba(10,8,6,.82); border:1px solid var(--border); padding:8px 12px; z-index:10; display:flex; flex-direction:column; gap:5px; }
.legend-item { display:flex; align-items:center; gap:7px; font-family:Cinzel,serif; font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* BRIEF PANEL */
.brief { width:340px; flex-shrink:0; background:var(--bg-panel); border-left:2px solid var(--border-gold); display:flex; flex-direction:column; z-index:2; overflow:hidden; }
.brief-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-muted); font-style:italic; font-size:13px; padding:40px; text-align:center; }
.brief-empty-icon { font-size:36px; opacity:.35; }
.brief-content { display:none; flex-direction:column; flex:1; overflow:hidden; }
.brief-top { padding:16px 20px 12px; border-bottom:1px solid var(--border); background:rgba(160,120,32,.06); flex-shrink:0; }
.brief-mission-name { font-family:'Cinzel Decorative',serif; font-size:14px; color:var(--gold); margin-bottom:3px; line-height:1.3; }
.brief-region-label { font-family:Cinzel,serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px; }
.brief-badge { display:inline-block; font-family:Cinzel,serif; font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
.b-available { background:rgba(160,120,32,.15); border:1px solid var(--border-gold); color:var(--gold); }
.b-active    { background:rgba(224,184,64,.2);  border:1px solid var(--gold);        color:var(--gold); }
.b-victory   { background:rgba(74,138,74,.15);  border:1px solid var(--green);       color:var(--green-light); }
.b-defeat    { background:rgba(138,42,42,.15);  border:1px solid var(--red);         color:var(--red-light); }
.b-locked    { background:rgba(58,48,32,.3);    border:1px solid var(--grey);        color:var(--grey-text); }
.brief-scroll { flex:1; overflow-y:auto; padding:16px 20px; }
.brief-scroll::-webkit-scrollbar { width:4px; }
.brief-scroll::-webkit-scrollbar-thumb { background:var(--border); }
.b-narrative { font-size:13px; color:var(--text-muted); font-style:italic; line-height:1.7; padding:10px 12px; border-left:3px solid var(--border-gold); background:rgba(160,120,32,.04); margin-bottom:14px; }
.b-row { margin-bottom:11px; }
.b-label { font-family:Cinzel,serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:3px; }
.b-val { font-size:12px; color:var(--text); line-height:1.6; }
.b-val.gold { color:var(--gold); }
.b-sep { border:none; border-top:1px solid var(--border); margin:12px 0; }
.b-element { display:flex; align-items:flex-start; gap:8px; margin-bottom:5px; font-size:12px; }
.b-element-num { width:18px; height:18px; border-radius:50%; background:var(--text); color:var(--bg); font-family:Cinzel,serif; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.brief-actions { padding:14px 20px; border-top:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; gap:7px; }
.brief-actions-label { font-family:Cinzel,serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
.launch-btn { display:flex; align-items:center; justify-content:center; gap:8px; font-family:Cinzel,serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:10px; border:1px solid var(--border-gold); background:rgba(160,120,32,.1); color:var(--gold); text-decoration:none; cursor:pointer; transition:all .15s; width:100%; }
.launch-btn:hover { background:rgba(160,120,32,.25); border-color:var(--gold); }
.outcome-row { display:flex; gap:7px; }
.oc-btn { flex:1; font-family:Cinzel,serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:9px 6px; border:1px solid var(--border); background:transparent; cursor:pointer; transition:all .15s; }
.oc-btn.v { border-color:var(--green); color:var(--green-light); }
.oc-btn.v:hover { background:rgba(74,138,74,.2); }
.oc-btn.d { border-color:var(--red); color:var(--red-light); }
.oc-btn.d:hover { background:rgba(138,42,42,.2); }
.reset-btn { width:100%; font-family:Cinzel,serif; font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:7px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .15s; }
.reset-btn:hover { border-color:var(--red); color:var(--red-light); }

/* SVG CONNECTION COLOURS */
.cv { stroke:#a07820; } .cd { stroke:#8b1a1a; } .cc { stroke:#4a5a6e; } .cl { stroke:#3a3020; stroke-dasharray:4 3; }
</style>
</head>
<body>

<div class="hdr">
  <a class="hdr-back" href="campaigns.html">← Campaigns</a>
  <div>
    <div class="hdr-title" id="hdr-title">Loading…</div>
    <div class="hdr-sub">Campaign Play</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-progress" id="hdr-progress"></div>
    <button class="btn danger" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<div class="body">
  <div class="map-backdrop"></div>

  <!-- Flow graph -->
  <div class="flow-area" id="flow-area">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#a07820;border:1px solid #e0b840"></div>Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e0b840;box-shadow:0 0 5px #e0b840"></div>Active</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a8a4a"></div>Victory</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8a2a2a"></div>Defeat</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3a3020"></div>Locked</div>
    </div>
    <div id="flow-world">
      <svg class="flow-svg" id="flow-svg"><defs></defs></svg>
      <div class="flow-nodes" id="flow-nodes"></div>
    </div>
    <div class="zoom-ctrl">
      <button onclick="fZoom(.15)">+</button>
      <button onclick="fZoom(-.15)">−</button>
      <button class="fit-btn" onclick="fFit()">Fit</button>
    </div>
  </div>

  <!-- Brief panel -->
  <div class="brief" id="brief">
    <div class="brief-empty" id="brief-empty">
      <div class="brief-empty-icon">⚔</div>
      <div>Select an available mission to view its brief and begin play</div>
    </div>
    <div class="brief-content" id="brief-content">
      <div class="brief-top">
        <div class="brief-mission-name" id="b-name"></div>
        <div class="brief-region-label" id="b-region"></div>
        <span class="brief-badge" id="b-badge"></span>
      </div>
      <div class="brief-scroll" id="b-body"></div>
      <div class="brief-actions" id="b-actions"></div>
    </div>
  </div>
</div>

<script>
var campaign = null;
var customMissions = [];
var playState = null;
var selNodeId = null;
var NODE_W = 190, NODE_H = 95;
var fScale = 1, fOX = 0, fOY = 0;
var fDrag = false, fDSX = 0, fDSY = 0, fDOX = 0, fDOY = 0;

// ── LOAD ──────────────────────────────────────────────────────

function load() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('c');
  try { customMissions = JSON.parse(localStorage.getItem('dun_custom_missions') || '[]'); } catch(e){}
  var camps = []; try { camps = JSON.parse(localStorage.getItem('dun_campaigns') || '[]'); } catch(e){}
  campaign = camps.find(function(c){ return c.id === id; });
  if (!campaign) { document.getElementById('hdr-title').textContent = 'Campaign not found'; return; }
  document.title = campaign.name + ' — DUN Play';
  document.getElementById('hdr-title').textContent = campaign.name;
  var saved = null; try { saved = JSON.parse(localStorage.getItem('dun_play_' + id)); } catch(e){}
  playState = saved || buildInitialState();
  renderAll();
  setTimeout(fFit, 80);
}

function buildInitialState() {
  var s = {};
  (campaign.nodes||[]).forEach(function(n, i){ s[n.id] = i === 0 ? 'available' : 'locked'; });
  saveState();
  return s;
}
function saveState() { localStorage.setItem('dun_play_' + campaign.id, JSON.stringify(playState)); }

function getMission(mid) {
  return customMissions.find(function(m){ return m.id === mid; }) ||
    (campaign._missions||[]).find(function(m){ return m.id === mid; }) || null;
}

// ── PLAY LOGIC ─────────────────────────────────────────────────

function nodeStatus(nid) { return playState[nid] || 'locked'; }

function recordOutcome(nid, outcome) {
  playState[nid] = outcome;
  (campaign.connections||[]).forEach(function(c) {
    if (c.from !== nid) return;
    if (c.outcome === outcome || c.outcome === 'custom') {
      if (nodeStatus(c.to) === 'locked') playState[c.to] = 'available';
    }
  });
  saveState();
  selNodeId = null;
  renderAll();
}

function confirmReset() {
  if (!confirm('Reset all progress for "' + campaign.name + '"?')) return;
  playState = buildInitialState();
  selNodeId = null;
  renderAll();
}

// ── RENDER ─────────────────────────────────────────────────────

function renderAll() {
  renderNodes();
  renderConns();
  renderBrief();
  updateProgress();
}

var statusIcon  = { available:'◆', active:'▶', victory:'✓', defeat:'✗', locked:'○' };
var statusLabel = { available:'Available', active:'In Progress', victory:'Victory', defeat:'Defeat', locked:'Locked' };
var badgeClass  = { available:'b-available', active:'b-active', victory:'b-victory', defeat:'b-defeat', locked:'b-locked' };

function renderNodes() {
  var el = document.getElementById('flow-nodes');
  var svg = document.getElementById('flow-svg');
  el.innerHTML = '';
  var maxX = 0, maxY = 0;
  (campaign.nodes||[]).forEach(function(n) {
    maxX = Math.max(maxX, (n.x||0) + NODE_W + 40);
    maxY = Math.max(maxY, (n.y||0) + NODE_H + 40);
  });
  svg.setAttribute('width', maxX); svg.setAttribute('height', maxY);

  (campaign.nodes||[]).forEach(function(node, idx) {
    var m = getMission(node.missionId);
    var st = nodeStatus(node.id);
    var isSel = node.id === selNodeId;
    var playable = st === 'available' || st === 'active';

    var d = document.createElement('div');
    d.className = 'pnode ' + st + (isSel ? ' active' : '');
    d.style.left = (node.x||0) + 'px';
    d.style.top  = (node.y||0) + 'px';

    var locNum = node.locNum || (idx + 1);
    var name   = m ? m.name : node.missionId;
    var goal   = m ? (m.goal||'').substring(0,58) : '';
    var region = node.region || '';

    d.innerHTML =
      '<div class="pnode-hdr">' +
        '<div class="pnode-num">' + locNum + '</div>' +
        '<div class="pnode-name">' + (m ? (m.icon||'◆') + ' ' : '') + name + '</div>' +
        '<div class="pnode-icon">' + (statusIcon[st]||'○') + '</div>' +
      '</div>' +
      '<div class="pnode-body">' +
        (goal ? '<div class="pnode-goal">' + goal + (m&&m.goal&&m.goal.length>58?'…':'') + '</div>' : '') +
        (region ? '<div class="pnode-region">📍 ' + region + '</div>' : '') +
      '</div>';

    if (playable) d.addEventListener('click', function(){ selectNode(node.id); });
    el.appendChild(d);
  });
}

function renderConns() {
  var svg = document.getElementById('flow-svg');
  Array.from(svg.querySelectorAll('.cg')).forEach(function(g){ g.remove(); });
  var defs = svg.querySelector('defs');

  var cols = { victory:'#a07820', defeat:'#8b1a1a', custom:'#4a5a6e', locked:'#3a3020' };
  ['victory','defeat','custom','locked'].forEach(function(o) {
    if (defs.querySelector('#arr-'+o)) return;
    var mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id','arr-'+o); mk.setAttribute('markerWidth','8'); mk.setAttribute('markerHeight','6');
    mk.setAttribute('refX','7'); mk.setAttribute('refY','3'); mk.setAttribute('orient','auto');
    var poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 8 3, 0 6'); poly.setAttribute('fill',cols[o]);
    poly.setAttribute('opacity', o==='locked'?'0.25':'0.85');
    mk.appendChild(poly); defs.appendChild(mk);
  });

  (campaign.connections||[]).forEach(function(conn) {
    var fn = (campaign.nodes||[]).find(function(n){ return n.id===conn.from; });
    var tn = (campaign.nodes||[]).find(function(n){ return n.id===conn.to; });
    if (!fn||!tn) return;

    var fst = nodeStatus(conn.from), tst = nodeStatus(conn.to);
    var isLocked = fst==='locked' || tst==='locked';
    var oc = isLocked ? 'locked' : (conn.outcome||'custom');
    var opacity = isLocked ? 0.25 : (fst==='victory'||fst==='defeat' ? 1 : 0.7);
    var cls = { victory:'cv', defeat:'cd', custom:'cc', locked:'cl' }[oc] || 'cc';

    var x1=(fn.x||0)+NODE_W, y1=(fn.y||0)+NODE_H/2;
    var x2=(tn.x||0),        y2=(tn.y||0)+NODE_H/2;
    var mx=(x1+x2)/2;

    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','cg'); g.setAttribute('opacity',opacity);

    var path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M '+x1+' '+y1+' C '+mx+' '+y1+','+mx+' '+y2+','+x2+' '+y2);
    path.setAttribute('fill','none'); path.setAttribute('stroke-width','1.5');
    path.setAttribute('class',cls); path.setAttribute('marker-end','url(#arr-'+oc+')');
    g.appendChild(path);

    // Label
    var ltext = conn.label || (oc!=='locked'&&oc!=='custom' ? oc : '');
    if (ltext) {
      var lt = document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',mx); lt.setAttribute('y',(y1+y2)/2-5);
      lt.setAttribute('text-anchor','middle'); lt.setAttribute('fill',cols[oc]||'#4a5a6e');
      lt.setAttribute('font-size','9'); lt.setAttribute('font-family','Cinzel,serif');
      lt.textContent = ltext.length>13 ? ltext.substring(0,12)+'…' : ltext;
      g.appendChild(lt);
    }
    svg.appendChild(g);
  });
}

function updateProgress() {
  var total = (campaign.nodes||[]).length;
  var done  = (campaign.nodes||[]).filter(function(n){ var s=nodeStatus(n.id); return s==='victory'||s==='defeat'; }).length;
  document.getElementById('hdr-progress').innerHTML = 'Missions: <b>'+done+'</b> / '+total;
}

// ── BRIEF PANEL ────────────────────────────────────────────────

function selectNode(nid) {
  selNodeId = nid;
  renderAll();
}

function renderBrief() {
  var empty = document.getElementById('brief-empty');
  var cont  = document.getElementById('brief-content');
  if (!selNodeId) { empty.style.display='flex'; cont.style.display='none'; return; }
  var node = (campaign.nodes||[]).find(function(n){ return n.id===selNodeId; });
  if (!node) return;
  var m = getMission(node.missionId);
  var st = nodeStatus(selNodeId);
  empty.style.display = 'none'; cont.style.display = 'flex';

  document.getElementById('b-name').textContent    = m ? m.name : node.missionId;
  document.getElementById('b-region').textContent  = node.region ? '📍 ' + node.region : '';
  document.getElementById('b-badge').textContent   = statusLabel[st] || st;
  document.getElementById('b-badge').className     = 'brief-badge ' + (badgeClass[st]||'b-locked');

  // Body content
  var body = '';
  if (m) {
    if (m.narrative) body += '<div class="b-narrative">' + m.narrative + '</div>';
    body += brow('Goal', m.goal);
    if (m.faction) body += brow('Faction', m.faction);
    if (m.setup)   { body += '<hr class="b-sep">'; body += brow('Set-Up', m.setup); }
    if (m.specialRules) body += brow('Special Rules', m.specialRules);
    if (m.specialElements && m.specialElements.length) {
      body += '<div class="b-row"><span class="b-label">Special Elements</span>';
      m.specialElements.forEach(function(el,i){ body += '<div class="b-element"><div class="b-element-num">'+(i+1)+'</div><div>'+el+'</div></div>'; });
      body += '</div>';
    }
    if (m.furniture&&m.furniture.length)     body += brow('Furniture', m.furniture.join(', '));
    if (m.otherElements&&m.otherElements.length) body += brow('Other Elements', m.otherElements.join(', '));
    body += '<hr class="b-sep">';
    body += brow('Quest End', m.questEnd);
    if (m.rewards)   body += '<div class="b-row"><span class="b-label">Rewards</span><div class="b-val gold">'+m.rewards+'</div></div>';
    if (m.tiles)     body += brow('Tiles', m.tiles);
    if (m.turnLimit) body += brow('Turn Limit', m.turnLimit + ' turns');
  } else {
    body += '<div style="color:var(--text-muted);font-style:italic;font-size:12px;padding:8px 0;">Mission details not available — official missions are not stored locally.</div>';
  }
  document.getElementById('b-body').innerHTML = body;

  // Actions
  var dt = node.dungeonType || 'random';
  var launchUrl = dt === 'random' ? 'generator.html' : 'builder.html';
  var act = '';

  if (st === 'available' || st === 'active') {
    act += '<div class="brief-actions-label">' + (st==='available' ? 'Ready to Play' : 'In Progress') + '</div>';
    act += '<button class="launch-btn" onclick="launchDungeon(\'' + selNodeId + '\')">⚔ Launch Dungeon</button>';
    act += '<div class="outcome-row">' +
      '<button class="oc-btn v" onclick="recordOutcome(\''+selNodeId+'\',\'victory\')">✓ Victory</button>' +
      '<button class="oc-btn d" onclick="recordOutcome(\''+selNodeId+'\',\'defeat\')">✗ Defeat</button>' +
    '</div>';
  } else if (st === 'victory') {
    act += '<div style="color:var(--green-light);font-family:Cinzel,serif;font-size:11px;letter-spacing:1px;text-align:center;">✓ Completed — Victory</div>';
    var ul = unlockedBy(selNodeId,'victory');
    if (ul.length) act += '<div style="font-size:10px;color:var(--text-muted);font-style:italic;">Unlocked: '+ul.join(', ')+'</div>';
  } else if (st === 'defeat') {
    act += '<div style="color:var(--red-light);font-family:Cinzel,serif;font-size:11px;letter-spacing:1px;text-align:center;">✗ Completed — Defeat</div>';
    var ul2 = unlockedBy(selNodeId,'defeat');
    if (ul2.length) act += '<div style="font-size:10px;color:var(--text-muted);font-style:italic;">Unlocked: '+ul2.join(', ')+'</div>';
  } else {
    act += '<div style="color:var(--grey-text);font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-align:center;padding:4px;">🔒 Complete preceding missions to unlock</div>';
  }
  document.getElementById('b-actions').innerHTML = act;
}

function launchDungeon(nid) {
  var node = (campaign.nodes||[]).find(function(n){ return n.id===nid; });
  if (!node) return;
  var m = getMission(node.missionId);
  var dt = node.dungeonType || 'random';
  var settings = m ? (m.settings||['dungeon']) : ['dungeon'];
  var setting = node.preferredSetting || settings[0] || 'dungeon';
  var handoff = {
    campaignId: campaign.id,
    nodeId: nid,
    mission: m || { id: nid, name: node.missionId, goal: '', icon: '⚔', settings: ['dungeon'] },
    dungeonType: dt,
    setting: setting
  };
  try { localStorage.setItem('dun_campaign_launch', JSON.stringify(handoff)); } catch(e){}
  var url = dt === 'planned' ? 'builder.html' : 'generator.html';
  window.location.href = url;
}

function brow(label, val) {
  if (!val) return '';
  return '<div class="b-row"><span class="b-label">'+label+'</span><div class="b-val">'+val+'</div></div>';
}

function unlockedBy(nid, outcome) {
  return (campaign.connections||[])
    .filter(function(c){ return c.from===nid && c.outcome===outcome; })
    .map(function(c) {
      var tn = (campaign.nodes||[]).find(function(n){ return n.id===c.to; });
      if (!tn) return null;
      var m = getMission(tn.missionId);
      return m ? m.name : tn.missionId;
    }).filter(Boolean);
}

// ── PAN / ZOOM ─────────────────────────────────────────────────

function applyT() {
  document.getElementById('flow-world').style.transform =
    'translate('+fOX+'px,'+fOY+'px) scale('+fScale+')';
}
function fZoom(d) {
  var vp = document.getElementById('flow-area');
  var cx=vp.clientWidth/2, cy=vp.clientHeight/2;
  var ns = Math.max(.3, Math.min(3, fScale+d));
  var r = ns/fScale;
  fOX = cx - r*(cx-fOX); fOY = cy - r*(cy-fOY); fScale = ns;
  applyT();
}
function fFit() {
  var nodes = campaign ? campaign.nodes||[] : [];
  if (!nodes.length) return;
  var vp = document.getElementById('flow-area');
  var vw=vp.clientWidth, vh=vp.clientHeight;
  var minX=Infinity, minY=Infinity, maxX=0, maxY=0;
  nodes.forEach(function(n){ minX=Math.min(minX,n.x||0); minY=Math.min(minY,n.y||0); maxX=Math.max(maxX,(n.x||0)+NODE_W); maxY=Math.max(maxY,(n.y||0)+NODE_H); });
  var pad=60;
  fScale = Math.min((vw-pad*2)/(maxX-minX||1), (vh-pad*2)/(maxY-minY||1), 1.4);
  fOX = pad - minX*fScale; fOY = pad - minY*fScale;
  applyT();
}

(function initPan() {
  var vp = document.getElementById('flow-area');
  vp.addEventListener('wheel', function(e) {
    e.preventDefault();
    var r = vp.getBoundingClientRect();
    var cx=e.clientX-r.left, cy=e.clientY-r.top;
    var d = (e.deltaY>0?-1:1)*0.1;
    var ns=Math.max(.3,Math.min(3,fScale+d*fScale)), ratio=ns/fScale;
    fOX=cx-ratio*(cx-fOX); fOY=cy-ratio*(cy-fOY); fScale=ns;
    applyT();
  },{passive:false});
  vp.addEventListener('mousedown', function(e) {
    if (e.target.closest('.pnode')) return;
    fDrag=true; fDSX=e.clientX; fDSY=e.clientY; fDOX=fOX; fDOY=fOY;
    vp.style.cursor='grabbing';
  });
  document.addEventListener('mousemove', function(e) {
    if (!fDrag) return;
    fOX=fDOX+(e.clientX-fDSX); fOY=fDOY+(e.clientY-fDSY); applyT();
  });
  document.addEventListener('mouseup', function() {
    if (!fDrag) return; fDrag=false;
    document.getElementById('flow-area').style.cursor='default';
  });
})();

load();
</script>
