<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dungeon Builder · Dungeon Universalis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/styles/builder.css">
<style>
/* ── Generator modal ── */
.ai-opt{flex:1;font-family:Cinzel,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 3px;border:1px solid #5a3e18;background:transparent;color:#d1bfa3;cursor:pointer;transition:all .15s;line-height:1.5;}
.ai-opt:hover{border-color:#a07820;color:#efd99a;}
.ai-opt.active{border-color:#e0b840;color:#efd99a;background:rgba(139,105,20,0.2);}
.ai-theme-btn{font-family:Cinzel,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 6px;border:1px solid #5a3e18;background:transparent;color:#d1bfa3;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.ai-theme-btn:hover{border-color:#a07820;color:#efd99a;}
.ai-theme-btn.active{border-color:#e0b840;color:#efd99a;background:rgba(139,105,20,0.2);}
/* ── Floor tabs ── */
.floor-tab{font-family:Cinzel,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border:1px solid #3a2810;background:transparent;color:#9d8a76;cursor:pointer;transition:all .15s;}
.floor-tab:hover{border-color:#6a4820;color:#d1bfa3;}
.floor-tab.active{border-color:#a07820;color:#efd99a;background:rgba(139,105,20,0.15);}
.floor-tab .del-f{margin-left:5px;opacity:0;color:#f4cece;font-size:13px;}
.floor-tab:hover .del-f{opacity:1;}
</style>
</head>
<body>
<div id="app-builder" style="display:flex;height:100vh;flex-direction:column;background:#0e0c08;">
  <div id="bld-header">
    <a href="../index.html" style="text-decoration:none;color:inherit;"><h1>&#9876; DUNGEON BUILDER</h1></a>
    <input type="text" id="bld-dungeon-name" placeholder="Dungeon name..." spellcheck="false">
    <span id="bld-tile-count"></span>
    <button class="bld-btn" id="bld-btn-new">+ NEW</button>
    <button class="bld-btn" id="bld-btn-ai" onclick="openGenModal()" style="background:rgba(139,105,20,0.3);border-color:#a07820;color:#e0b840;">✦ GENERATE</button>
    <button class="bld-btn" id="bld-btn-save">&#128190; SAVE</button>
    <button class="bld-btn play" id="bld-btn-play">&#9654; PLAY</button>
    <button class="bld-btn" id="bld-btn-export">EXPORT PNG</button>
    <button class="bld-btn home" onclick="window.location.href='../index.html'">&#8962; HOME</button>
  </div>
  <!-- Floor tabs — hidden until multi-floor dungeon is generated -->
  <div id="floor-tabs" style="display:none;background:#130f09;border-bottom:1px solid #3a2810;padding:0 12px;align-items:center;gap:4px;min-height:32px;flex-shrink:0;">
    <span style="font-family:Cinzel,serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#706050;margin-right:6px;">FLOOR</span>
    <div id="floor-tab-list" style="display:flex;gap:3px;"></div>
    <button onclick="addFloor()" style="font-family:Cinzel,serif;font-size:13px;padding:2px 8px;border:1px solid #3a2810;background:transparent;color:#706050;cursor:pointer;margin-left:4px;">+</button>
  </div>
  <div id="bld-body">
    <div id="bld-sidebar">
      <div id="bld-sidebar-tabs">
        <button class="bld-tab active" data-tab="tiles">TILES</button>
        <button class="bld-tab" data-tab="elements">ELEMENTS</button>
        <button class="bld-tab" data-tab="saved">SAVED</button>
      </div>
      <div class="bld-tab-panel active" id="bld-panel-tiles"><div id="bld-picker-tiles"></div></div>
      <div class="bld-tab-panel" id="bld-panel-elements"><div id="bld-picker-elements"></div></div>
      <div class="bld-tab-panel" id="bld-panel-saved"><div id="bld-saved-list"></div></div>
      <div id="bld-info-panel"><div class="bld-info-empty">Select a tile to place</div></div>
    </div>
    <div id="bld-map-wrap"><canvas id="builder-canvas"></canvas></div>
  </div>
  <div id="bld-log"></div>
</div>

<!-- Dungeon Generator Modal -->
<div id="gen-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#1a1208;border:1px solid #a07820;width:560px;max-height:92vh;overflow-y:auto;font-family:Cinzel,serif;">
    <div style="padding:16px 20px 12px;border-bottom:1px solid #5a3e18;background:rgba(139,105,20,0.1);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;color:#e0b840;letter-spacing:2px;">✦ DUNGEON GENERATOR</div>
      <button onclick="closeGenModal()" style="background:transparent;border:none;color:#b09060;font-size:18px;cursor:pointer;">×</button>
    </div>
    <div style="padding:18px 20px;">
      <div style="font-size:13px;color:#b09060;font-style:italic;margin-bottom:16px;line-height:1.6;font-family:'Crimson Text',serif;">
        Procedurally generates a dungeon with multiple routes and branching paths — inspired by Advanced HeroQuest, Warhammer Quest and Diablo. Runs entirely offline.
      </div>
      <!-- Theme -->
      <div style="margin-bottom:14px;">
        <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:7px;">Theme</div>
        <div id="gen-theme-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;"></div>
      </div>
      <!-- Size / Routes / Floors -->
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div style="flex:1;">
          <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Size</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active" data-f="size" data-v="small"  onclick="setOpt(this)">Small<br><span style="font-size:11px;opacity:.6;">6–8</span></button>
            <button class="ai-opt"        data-f="size" data-v="medium" onclick="setOpt(this)">Medium<br><span style="font-size:11px;opacity:.6;">10–14</span></button>
            <button class="ai-opt"        data-f="size" data-v="large"  onclick="setOpt(this)">Large<br><span style="font-size:11px;opacity:.6;">16–20</span></button>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Routes</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active"  data-f="routes" data-v="linear"    onclick="setOpt(this)">Linear<br><span style="font-size:11px;opacity:.6;">1 path</span></button>
            <button class="ai-opt"         data-f="routes" data-v="branching" onclick="setOpt(this)">Branch<br><span style="font-size:11px;opacity:.6;">2–3</span></button>
            <button class="ai-opt"         data-f="routes" data-v="open"      onclick="setOpt(this)">Open<br><span style="font-size:11px;opacity:.6;">explore</span></button>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Floors</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active" data-f="floors" data-v="1" onclick="setOpt(this)">1<br><span style="font-size:11px;opacity:.6;">single</span></button>
            <button class="ai-opt"        data-f="floors" data-v="2" onclick="setOpt(this)">2<br><span style="font-size:11px;opacity:.6;">two</span></button>
            <button class="ai-opt"        data-f="floors" data-v="3" onclick="setOpt(this)">3<br><span style="font-size:11px;opacity:.6;">three</span></button>
          </div>
        </div>
      </div>
      <div id="gen-status" style="display:none;padding:10px 12px;background:rgba(0,0,0,0.4);border:1px solid #5a3e18;font-size:13px;color:#e0b840;letter-spacing:1px;margin-bottom:12px;text-align:center;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeGenModal()" style="font-family:Cinzel,serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border:1px solid #5a3e18;background:transparent;color:#b09060;cursor:pointer;">Cancel</button>
        <button id="gen-go" onclick="runGen()" style="font-family:Cinzel,serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;border:1px solid #a07820;background:rgba(139,105,20,0.2);color:#e0b840;cursor:pointer;">✦ Generate</button>
      </div>
    </div>
  </div>
</div>

</body>
<!-- ═══════════════════════════════════════════════════════════
     Scripts load after </body> so DOM exists when they run.
     Order matters: data → shared → dungeon-gen → inline → builder
════════════════════════════════════════════════════════════ -->
<script src="../src/data/images.js"></script>
<script src="../src/data/crops.js"></script>
<script src="../src/data/tiles.js"></script>
<script src="../src/data/elements.js"></script>
<script src="../src/scripts/shared.js"></script>
<script src="../src/scripts/dungeon-gen.js"></script>
<script>
preloadTileImages();

// Tab wiring (sidebar: Tiles / Elements / Saved)
document.querySelectorAll('.bld-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.bld-tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.bld-tab-panel').forEach(function(p){p.classList.remove('active');});
    tab.classList.add('active');
    var panel=document.getElementById('bld-panel-'+tab.dataset.tab);
    if(panel) panel.classList.add('active');
  });
});

/* ════════════════════════════════════════════════════════════
   DUNGEON GENERATOR UI
════════════════════════════════════════════════════════════ */
var genState = { theme:'dungeon', size:'medium', routes:'branching', floors:1 };

var GEN_THEMES = [
  {id:'dungeon',   icon:'🏰', label:'Dungeon'},
  {id:'crypt',     icon:'💀', label:'Crypt'},
  {id:'cave',      icon:'⛏',  label:'Cave'},
  {id:'sewer',     icon:'🐀', label:'Sewer'},
  {id:'civilised', icon:'🏛',  label:'Civilised'},
  {id:'outdoor',   icon:'🌲', label:'Outdoor'},
];

function openGenModal() {
  var grid = document.getElementById('gen-theme-grid');
  grid.innerHTML = GEN_THEMES.map(function(t){
    return '<button class="ai-theme-btn'+(genState.theme===t.id?' active':'')+
      '" data-id="'+t.id+'" onclick="pickTheme(\''+t.id+'\')">'+
      '<span style="font-size:16px;">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');
  document.getElementById('gen-status').style.display = 'none';
  var goBtn = document.getElementById('gen-go');
  goBtn.disabled = false; goBtn.textContent = '✦ Generate';
  // Sync button states to genState
  document.querySelectorAll('.ai-opt').forEach(function(b){
    b.classList.toggle('active', b.dataset.v === String(genState[b.dataset.f]));
  });
  document.getElementById('gen-modal').style.display = 'flex';
}

function closeGenModal() {
  document.getElementById('gen-modal').style.display = 'none';
}

function pickTheme(id) {
  genState.theme = id;
  document.querySelectorAll('.ai-theme-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.id === id);
  });
}

function setOpt(btn) {
  var f = btn.dataset.f, v = btn.dataset.v;
  genState[f] = isNaN(v) ? v : parseInt(v);
  btn.parentElement.querySelectorAll('.ai-opt').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function genStatus(msg) {
  var el = document.getElementById('gen-status');
  el.style.display = 'block'; el.textContent = msg;
}

function runGen() {
  if (typeof DungeonGen === 'undefined') { genStatus('✗ Generator not loaded'); return; }
  var btn = document.getElementById('gen-go');
  btn.disabled = true; btn.textContent = '⟳ Building…';
  genStatus('⟳ Generating dungeon layout…');
  setTimeout(function(){
    try {
      var result = DungeonGen.generate({
        theme:  genState.theme,
        size:   genState.size,
        routes: genState.routes,
        floors: genState.floors,
        seed:   Math.floor(Math.random() * 999999),
      });
      applyGenResult(result);
      closeGenModal();
    } catch(err) {
      console.error(err);
      genStatus('✗ Failed: ' + err.message);
      btn.disabled = false; btn.textContent = '✦ Generate';
    }
  }, 30);
}

function applyGenResult(result) {
  var api = window._bldTest;
  if (!api) { alert('Builder not ready — please wait and try again.'); return; }

  var ids = [];
  result.floors.forEach(function(floor) {
    api.newDungeon();
    var cur = api.getCurrent();
    if (!cur) return;
    cur.name = floor.name;
    cur.tiles = [];
    var seq = 1;
    floor.tiles.forEach(function(t) {
      if (typeof TILE_DB !== 'undefined') {
        if (!TILE_DB.find(function(td){ return td.id === t.tileId; })) {
          console.warn('Skipping unknown tile:', t.tileId); return;
        }
      }
      cur.tiles.push({ id: seq++, tileId: t.tileId, gx: t.gx, gy: t.gy, rot: t.rot||0 });
    });
    api.buildConnections();
    api.saveCurrent();
    ids.push(cur.id);
  });

  if (ids.length > 0) {
    api.loadDungeon(ids[0]);
    if (ids.length > 1) showFloorTabs(ids, result.name);
    else hideFloorTabs();
  }

  // Redraw now and after images finish loading
  api.draw();
  setTimeout(function(){ if(window._bldTest) window._bldTest.draw(); }, 500);
  setTimeout(function(){ if(window._bldTest) window._bldTest.draw(); }, 1500);
  console.log('Generated:', result.name, result.floors.length+'F', 'seed:'+result.seed);
}

/* ════════════════════════════════════════════════════════════
   FLOOR TABS
════════════════════════════════════════════════════════════ */
var floorGroup = null;

function showFloorTabs(ids, name) {
  floorGroup = ids.slice();
  document.getElementById('floor-tabs').style.display = 'flex';
  renderFloorTabs();
}
function hideFloorTabs() {
  floorGroup = null;
  document.getElementById('floor-tabs').style.display = 'none';
}
function renderFloorTabs() {
  if (!floorGroup) return;
  var api = window._bldTest;
  var cur = api ? api.getCurrent() : null;
  var layouts = api ? api.getLayouts() : [];
  document.getElementById('floor-tab-list').innerHTML = floorGroup.map(function(lid, i){
    var l = layouts.find(function(x){ return x.id === lid; });
    var label = l ? l.name.replace(/^.*— /,'') : 'Floor '+(i+1);
    var active = cur && cur.id === lid;
    return '<button class="floor-tab'+(active?' active':'')+'" onclick="switchFloor('+lid+')">'
      +(i===0?'⬆':'⬇')+' '+(i+1)
      +(floorGroup.length>1?'<span class="del-f" onclick="delFloor(event,'+lid+')">×</span>':'')
      +'</button>';
  }).join('');
}
function switchFloor(id) {
  var api = window._bldTest;
  if (api) { api.loadDungeon(id); renderFloorTabs(); }
}
function addFloor() {
  var api = window._bldTest;
  if (!api) return;
  var cur = api.getCurrent();
  if (!floorGroup && cur) floorGroup = [cur.id];
  if (!floorGroup) return;
  api.newDungeon();
  var n = api.getCurrent();
  if (!n) return;
  var base = cur ? cur.name.split(' — ')[0] : 'Dungeon';
  n.name = base + ' — Floor ' + (floorGroup.length + 1);
  api.saveCurrent();
  floorGroup.push(n.id);
  document.getElementById('floor-tabs').style.display = 'flex';
  renderFloorTabs();
}
function delFloor(e, id) {
  e.stopPropagation();
  if (!floorGroup || floorGroup.length <= 1) return;
  if (!confirm('Remove this floor?')) return;
  var api = window._bldTest;
  var cur = api ? api.getCurrent() : null;
  var idx = floorGroup.indexOf(id);
  floorGroup = floorGroup.filter(function(x){ return x !== id; });
  if (cur && cur.id === id && api) api.loadDungeon(floorGroup[Math.max(0,idx-1)]);
  if (floorGroup.length <= 1) hideFloorTabs();
  else renderFloorTabs();
}
</script>
<script src="../src/scripts/builder.js"></script>
</html>
