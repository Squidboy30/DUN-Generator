<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dungeon Builder · Dungeon Universalis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/styles/builder.css">
</head>
<body>
<div id="app-builder" style="display:flex;height:100vh;flex-direction:column;background:#0e0c08;">
  <div id="bld-header">
    <a href="../index.html" style="text-decoration:none;color:inherit;"><h1>&#9876; DUNGEON BUILDER</h1></a>
    <input type="text" id="bld-dungeon-name" placeholder="Dungeon name..." spellcheck="false">
    <span id="bld-tile-count"></span>
    <button class="bld-btn" id="bld-btn-new">+ NEW</button>
    <button class="bld-btn" id="bld-btn-ai" onclick="openAIBuilder()" style="background:rgba(139,105,20,0.3);border-color:#a07820;color:#e0b840;">✦ AI GENERATE</button>
    <button class="bld-btn" id="bld-btn-save">&#128190; SAVE</button>
    <button class="bld-btn play" id="bld-btn-play">&#9654; PLAY</button>
    <button class="bld-btn" id="bld-btn-export">EXPORT PNG</button>
    <button class="bld-btn home" onclick="window.location.href='../index.html'">&#8962; HOME</button>
  </div>
  <div id="floor-tabs" style="display:none;background:#130f09;border-bottom:1px solid #3a2810;padding:0 12px;align-items:center;gap:4px;min-height:32px;flex-shrink:0;">
    <span style="font-family:Cinzel,serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#706050;margin-right:6px;">FLOOR</span>
    <div id="floor-tab-list" style="display:flex;gap:3px;"></div>
    <button onclick="addFloor()" title="Add floor" style="font-family:Cinzel,serif;font-size:11px;padding:2px 8px;border:1px solid #3a2810;background:transparent;color:#706050;cursor:pointer;margin-left:4px;transition:all .15s;">+</button>
  </div>
  <div id="bld-body">
    <div id="bld-sidebar">
      <div id="bld-sidebar-tabs">
        <button class="bld-tab active" data-tab="tiles">TILES</button>
        <button class="bld-tab" data-tab="elements">ELEMENTS</button>
        <button class="bld-tab" data-tab="saved">SAVED</button>
      </div>
      <div class="bld-tab-panel active" id="bld-panel-tiles"><div id="bld-picker-tiles"></div></div>
      <div class="bld-tab-panel" id="bld-panel-elements"><div id="bld-picker-elements"></div></div>
      <div class="bld-tab-panel" id="bld-panel-saved"><div id="bld-saved-list"></div></div>
      <div id="bld-info-panel"><div class="bld-info-empty">Select a tile to place</div></div>
    </div>
    <div id="bld-map-wrap"><canvas id="builder-canvas"></canvas></div>
  </div>
  <div id="bld-log"></div>
</div>

<!-- Dungeon Generator Modal -->
<div id="ai-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#1a1208;border:1px solid #a07820;width:560px;max-height:92vh;overflow-y:auto;font-family:Cinzel,serif;">
    <div style="padding:16px 20px 12px;border-bottom:1px solid #5a3e18;background:rgba(139,105,20,0.1);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:14px;color:#e0b840;letter-spacing:2px;">✦ DUNGEON GENERATOR</div>
      <button onclick="closeAIBuilder()" style="background:transparent;border:none;color:#b09060;font-size:18px;cursor:pointer;line-height:1;">×</button>
    </div>
    <div style="padding:18px 20px;">
      <div style="font-size:11px;color:#b09060;font-style:italic;margin-bottom:16px;line-height:1.6;font-family:'Crimson Text',serif;">
        Procedurally generates a dungeon with multiple routes, branching paths and narrative rooms — inspired by Advanced HeroQuest, Warhammer Quest and Diablo.
      </div>

      <!-- Theme -->
      <div style="margin-bottom:14px;">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:7px;">Theme</div>
        <div id="ai-theme-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;"></div>
      </div>

      <!-- Size + Routes + Floors -->
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div style="flex:1;">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Size</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active" data-field="size" data-val="small"  onclick="setAIOpt(this)">Small<br><span style="font-size:8px;opacity:.6;">6–8</span></button>
            <button class="ai-opt"        data-field="size" data-val="medium" onclick="setAIOpt(this)">Medium<br><span style="font-size:8px;opacity:.6;">10–14</span></button>
            <button class="ai-opt"        data-field="size" data-val="large"  onclick="setAIOpt(this)">Large<br><span style="font-size:8px;opacity:.6;">16–20</span></button>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Routes</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active"  data-field="routes" data-val="linear"    onclick="setAIOpt(this)">Linear<br><span style="font-size:8px;opacity:.6;">one path</span></button>
            <button class="ai-opt"         data-field="routes" data-val="branching" onclick="setAIOpt(this)">Branch<br><span style="font-size:8px;opacity:.6;">2–3 ways</span></button>
            <button class="ai-opt"         data-field="routes" data-val="open"      onclick="setAIOpt(this)">Open<br><span style="font-size:8px;opacity:.6;">explore</span></button>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b09060;margin-bottom:6px;">Floors</div>
          <div style="display:flex;gap:3px;">
            <button class="ai-opt active" data-field="floors" data-val="1" onclick="setAIOpt(this)">1<br><span style="font-size:8px;opacity:.6;">single</span></button>
            <button class="ai-opt"        data-field="floors" data-val="2" onclick="setAIOpt(this)">2<br><span style="font-size:8px;opacity:.6;">two lvls</span></button>
            <button class="ai-opt"        data-field="floors" data-val="3" onclick="setAIOpt(this)">3<br><span style="font-size:8px;opacity:.6;">three lvls</span></button>
          </div>
        </div>
      </div>

      <div id="ai-status" style="display:none;padding:10px 12px;background:rgba(0,0,0,0.4);border:1px solid #5a3e18;font-size:10px;color:#e0b840;letter-spacing:1px;margin-bottom:12px;text-align:center;"></div>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeAIBuilder()" style="font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border:1px solid #5a3e18;background:transparent;color:#b09060;cursor:pointer;">Cancel</button>
        <button id="ai-go-btn" onclick="runAIBuilder()" style="font-family:Cinzel,serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;border:1px solid #a07820;background:rgba(139,105,20,0.2);color:#e0b840;cursor:pointer;">✦ Generate</button>
      </div>
    </div>
  </div>
</div>

<style>
.ai-opt { flex:1;font-family:Cinzel,serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 3px;border:1px solid #5a3e18;background:transparent;color:#b09060;cursor:pointer;transition:all .15s;line-height:1.5; }
.ai-opt:hover { border-color:#a07820;color:#e0b840; }
.ai-opt.active { border-color:#e0b840;color:#e0b840;background:rgba(139,105,20,0.2); }
.ai-theme-btn { font-family:Cinzel,serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:8px 6px;border:1px solid #5a3e18;background:transparent;color:#b09060;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px; }
.ai-theme-btn:hover { border-color:#a07820;color:#e0b840; }
.ai-theme-btn.active { border-color:#e0b840;color:#e0b840;background:rgba(139,105,20,0.2); }
.floor-tab { font-family:Cinzel,serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border:1px solid #3a2810;background:transparent;color:#706050;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px; }
.floor-tab:hover { border-color:#6a4820;color:#b09060; }
.floor-tab.active { border-color:#a07820;color:#e0b840;background:rgba(139,105,20,0.15); }
.floor-tab .del-floor { margin-left:4px;opacity:0;font-size:10px;color:#e07070;transition:opacity .15s; }
.floor-tab:hover .del-floor { opacity:1; }
</style>

<script>
/* ════════════════════════════════════════════════════════════
   DUNGEON GENERATOR — wires DungeonGen into the builder
════════════════════════════════════════════════════════════ */
var genState = { theme:'dungeon', size:'medium', routes:'branching', floors:1 };

var AI_BUILDER_THEMES = [
  {id:'dungeon',   icon:'🏰',label:'Dungeon'},
  {id:'crypt',     icon:'💀',label:'Crypt'},
  {id:'cave',      icon:'⛏', label:'Cave'},
  {id:'sewer',     icon:'🐀',label:'Sewer'},
  {id:'civilised', icon:'🏛', label:'Civilised'},
  {id:'outdoor',   icon:'🌲',label:'Outdoor'},
];

function openAIBuilder() {
  var grid = document.getElementById('ai-theme-grid');
  grid.innerHTML = AI_BUILDER_THEMES.map(function(t){
    return '<button class="ai-theme-btn'+(genState.theme===t.id?' active':'')+
      '" data-id="'+t.id+'" onclick="selectAITheme(\''+t.id+'\')">'+
      '<span style="font-size:14px;">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');
  document.getElementById('ai-status').style.display='none';
  document.getElementById('ai-go-btn').disabled=false;
  document.getElementById('ai-go-btn').textContent='✦ Generate';
  // Reset floor buttons to match state
  document.querySelectorAll('.ai-opt').forEach(function(b){
    b.classList.toggle('active', b.dataset.val===String(genState[b.dataset.field]));
  });
  document.getElementById('ai-modal').style.display='flex';
}

function closeAIBuilder() {
  document.getElementById('ai-modal').style.display='none';
}

function selectAITheme(id) {
  genState.theme = id;
  document.querySelectorAll('.ai-theme-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.id===id);
  });
}

function setAIOpt(btn) {
  var field = btn.dataset.field;
  var val   = btn.dataset.val;
  genState[field] = isNaN(val) ? val : parseInt(val);
  btn.parentElement.querySelectorAll('.ai-opt').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function setAIStatus(msg) {
  var el=document.getElementById('ai-status');
  el.style.display='block'; el.textContent=msg;
}

function runAIBuilder() {
  if (typeof DungeonGen === 'undefined') {
    setAIStatus('✗ Generator not loaded — refresh the page');
    return;
  }
  var btn = document.getElementById('ai-go-btn');
  btn.disabled=true; btn.textContent='⟳ Generating…';
  setAIStatus('⟳ Building dungeon layout…');

  // Small timeout so the UI updates before the (sync) generation runs
  setTimeout(function(){
    try {
      var result = DungeonGen.generate({
        theme:  genState.theme,
        size:   genState.size,
        routes: genState.routes,
        floors: genState.floors,
        seed:   Math.floor(Math.random()*999999),
      });
      applyGeneratedDungeon(result);
      closeAIBuilder();
    } catch(err) {
      setAIStatus('✗ Generation failed: '+err.message);
      btn.disabled=false; btn.textContent='✦ Generate';
    }
  }, 30);
}

/* ── Apply generated dungeon to builder state ──────────────── */
function applyGeneratedDungeon(result) {
  // Create a separate builder layout for each floor
  var generatedLayoutIds = [];

  result.floors.forEach(function(floor, fi) {
    // Create new layout for this floor
    var layout = {
      id: nextLayoutId++,
      name: floor.name,
      created: Date.now(),
      modified: Date.now(),
      tiles: [],
      elements: [],
      connections: [],
      mission: null,
      campaign: null,
      fogRevealed: [],
      heroPos: null,
      _generatedFloor: fi,
      _dungeonGroup: result.name,
    };

    // Assign real tile IDs — generator already picked them
    var placedCount = 0;
    floor.tiles.forEach(function(t) {
      // Validate tile exists
      var def = typeof TILE_DB !== 'undefined'
        ? TILE_DB.find(function(td){ return td.id === t.tileId; })
        : null;
      if (!def && typeof TILE_DB !== 'undefined') return; // skip unknown tiles
      layout.tiles.push({
        id: placedCount + 1,
        tileId: t.tileId,
        gx: t.gx,
        gy: t.gy,
        rot: t.rot || 0,
      });
      placedCount++;
    });

    nextPlacedId = placedCount + 1;
    layouts.push(layout);
    generatedLayoutIds.push(layout.id);
  });

  // Save and switch to first floor
  saveLayouts();
  refreshSavedList();

  if (generatedLayoutIds.length > 0) {
    loadDungeon(generatedLayoutIds[0]);
    // Show multi-floor tabs if more than 1 floor
    if (generatedLayoutIds.length > 1) {
      showFloorTabs(generatedLayoutIds, result.name);
    } else {
      hideFloorTabs();
    }
  }

  if (typeof addBuildLog === 'function') {
    addBuildLog('✦ Generated: '+result.name+
      ' ('+result.floors.length+' floor'+(result.floors.length>1?'s':'')+
      ', theme: '+result.theme+', seed: '+result.seed+')', 'ok');
  }
}

/* ════════════════════════════════════════════════════════════
   FLOOR TABS — multi-floor navigation
════════════════════════════════════════════════════════════ */
var activeFloorGroup = null; // array of layout IDs for current multi-floor dungeon

function showFloorTabs(layoutIds, groupName) {
  activeFloorGroup = layoutIds;
  var bar  = document.getElementById('floor-tabs');
  var list = document.getElementById('floor-tab-list');
  bar.style.display = 'flex';
  renderFloorTabs();
}

function hideFloorTabs() {
  activeFloorGroup = null;
  document.getElementById('floor-tabs').style.display = 'none';
}

function renderFloorTabs() {
  if (!activeFloorGroup) return;
  var list = document.getElementById('floor-tab-list');
  list.innerHTML = activeFloorGroup.map(function(lid, i) {
    var layout = layouts.find(function(l){ return l.id === lid; });
    var name   = layout ? layout.name.replace(/^.*— /, '') : 'Floor '+(i+1);
    var isActive = current && current.id === lid;
    return '<button class="floor-tab'+(isActive?' active':'')+'" onclick="switchFloor('+lid+')" title="'+name+'">'+
      '<span>'+(i===0?'▲ Up':'▼ Down')+'</span> '+(i+1)+
      (activeFloorGroup.length > 1 ? '<span class="del-floor" onclick="deleteFloor(event,'+lid+')">×</span>' : '')+
    '</button>';
  }).join('');
}

function switchFloor(layoutId) {
  if (typeof loadDungeon === 'function') loadDungeon(layoutId);
  renderFloorTabs();
}

function addFloor() {
  // Create a blank floor and add it to the current group
  if (!activeFloorGroup) {
    // Start a new multi-floor group from current layout
    if (!current) return;
    activeFloorGroup = [current.id];
  }
  dungeonCount++;
  var layout = {
    id: nextLayoutId++,
    name: (current ? current.name.split(' — ')[0] : 'Dungeon')+' — Level '+(activeFloorGroup.length+1),
    created: Date.now(), modified: Date.now(),
    tiles: [], elements: [], connections: [],
    mission: null, campaign: null, fogRevealed: [], heroPos: null,
  };
  layouts.push(layout);
  activeFloorGroup.push(layout.id);
  saveLayouts(); refreshSavedList();
  loadDungeon(layout.id);
  showFloorTabs(activeFloorGroup);
  if (typeof addBuildLog === 'function') addBuildLog('Added floor: '+layout.name, 'ok');
}

function deleteFloor(e, layoutId) {
  e.stopPropagation();
  if (!activeFloorGroup || activeFloorGroup.length <= 1) return;
  if (!confirm('Remove this floor?')) return;
  if (typeof deleteDungeon === 'function') deleteDungeon(layoutId);
  activeFloorGroup = activeFloorGroup.filter(function(id){ return id !== layoutId; });
  if (current && current.id === layoutId) loadDungeon(activeFloorGroup[0]);
  if (activeFloorGroup.length <= 1) hideFloorTabs();
  else renderFloorTabs();
}
</script>
</body>
<script src="../src/data/crops.js"></script>
<script src="../src/data/tiles.js"></script>
<script src="../src/data/elements.js"></script>
<script src="../src/scripts/shared.js"></script>
<script>
preloadTileImages();
// Tab wiring
document.querySelectorAll('.bld-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.bld-tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.bld-tab-panel').forEach(function(p){p.classList.remove('active');});
    tab.classList.add('active');
    var panel=document.getElementById('bld-panel-'+tab.dataset.tab);
    if(panel) panel.classList.add('active');
  });
});
</script>
<script src="../src/scripts/dungeon-gen.js"></script>
<script src="../src/scripts/builder.js"></script>
</html>
