<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Universalis — Party Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=MedievalSharp&display=swap');

:root {
  /* Core palette — grim dark */
  --bg-void:    #0a0805;
  --bg-dark:    #111009;
  --bg-panel:   #1a1208;
  --bg-raised:  #221a0c;
  --border-dim: #4a3a18;
  --border-mid: #6a4e22;
  --border-gold:#9a7228;
  --gold-bright:#e8b830;
  --gold-dim:   #9a7228;
  --text-bone:  #f0e4c8;
  --text-muted: #b89060;
  --text-dim:   #7a6040;
  --blood-red:  #8a1a1a;
  --rust:       #6a3010;
  --parchment:  #d8c8a0;
  --ink:        #1a1008;

  /* Attribute icon colours */
  --col-move:   #70a8c0;
  --col-cs:     #e05030;
  --col-str:    #c06840;
  --col-shoot:  #70c070;
  --col-agl:    #90c8d8;
  --col-int:    #9878e0;
  --col-mana:   #5888e0;
  --col-cour:   #e0a030;
  --col-armor:  #88b888;
  --col-vit:    #e04040;
  --col-dex:    #c88840;
  --col-perc:   #c0c050;
  --col-fort:   #e0c030;

  /* Class colours */
  --fighter:    #c04020;
  --explorer:   #206840;
  --caster:     #5030a0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg-void);
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--text-bone);
  min-height: 100vh;
}

/* ─────────────────────────────────────────────── HEADER */
.app-header {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-gold);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 13px;
  color: var(--gold-bright);
  letter-spacing: 3px;
  white-space: nowrap;
}
.app-logo span { color: var(--text-muted); font-size: 9px; display: block; letter-spacing: 4px; }

.nav-tabs { display: flex; gap: 2px; margin-left: auto; }
.nav-tab {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.nav-tab:hover { border-color: var(--border-mid); color: var(--text-bone); }
.nav-tab.active { background: var(--border-gold); color: var(--ink); border-color: var(--gold-bright); }

/* ─────────────────────────────────────────────── VIEWS */
.view { display: none; padding: 20px; }
.view.active { display: block; }

/* ─────────────────────────────────────────────── PARTY LIST VIEW */
.parties-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.section-heading {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.btn-grim {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--border-gold);
  color: var(--gold-bright);
  cursor: pointer;
  transition: all .15s;
}
.btn-grim:hover { background: rgba(138,98,24,.2); }
.btn-grim.danger { border-color: var(--blood-red); color: #d06060; }
.btn-grim.danger:hover { background: rgba(138,26,26,.15); }

.parties-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}
.party-item {
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .15s;
  position: relative;
}
.party-item:hover { border-color: var(--border-gold); }
.party-item.active-party { border-color: var(--gold-bright); }
.party-item-name {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  color: var(--gold-bright);
  margin-bottom: 6px;
}
.party-item-meta {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}
.party-item-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

/* ─────────────────────────────────────────────── PARTY VIEW */
.party-view-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-dim);
}
.party-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px;
  color: var(--gold-bright);
}
.party-vp-badge {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  padding: 3px 10px;
  border: 1px solid var(--border-dim);
}
.party-vp-badge strong { color: var(--gold-bright); font-size: 13px; }

/* ─────────────────────────────────────────────── HERO STRIP */
/* Horizontal scroll strip of DUN-style cards */
.hero-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 4px;
}
.hero-strip::-webkit-scrollbar { height: 4px; }
.hero-strip::-webkit-scrollbar-track { background: transparent; }
.hero-strip::-webkit-scrollbar-thumb { background: var(--border-dim); }

/* ADD HERO slot */
.hero-add-slot {
  min-width: 150px;
  width: 150px;
  flex-shrink: 0;
  border: 1px dashed var(--border-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  min-height: 340px;
  transition: border-color .15s;
  flex-direction: column;
  gap: 8px;
  color: var(--text-dim);
}
.hero-add-slot:hover { border-color: var(--border-gold); color: var(--text-muted); }
.hero-add-slot svg { opacity: .4; }
.hero-add-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────── DUN HERO CARD */
/* Based on the physical card: scroll header, portrait flanked by stat grids, bottom row */
.dun-hero-card {
  min-width: 200px;
  width: 200px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border: 1px solid var(--border-mid);
  position: relative;
  cursor: pointer;
  transition: border-color .2s;
  user-select: none;
}
.dun-hero-card:hover { border-color: var(--gold-bright); }
.dun-hero-card.selected { border-color: var(--gold-bright); box-shadow: 0 0 0 1px var(--border-gold); }
.dun-hero-card.fighter-card { border-top: 2px solid var(--fighter); }
.dun-hero-card.explorer-card { border-top: 2px solid var(--explorer); }
.dun-hero-card.caster-card { border-top: 2px solid var(--caster); }

/* VP badge */
.card-vp-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  background: var(--bg-void);
  border: 1px solid var(--border-gold);
  font-family: 'Cinzel', serif;
  font-size: 9px;
  color: var(--gold-bright);
  padding: 2px 6px;
  line-height: 1.4;
  text-align: center;
  z-index: 2;
}
.card-vp-badge span { display: block; font-size: 14px; font-weight: bold; }

/* Scroll header */
.card-scroll-header {
  background: linear-gradient(180deg, #2a1e0a 0%, #1e1508 100%);
  border-bottom: 1px solid var(--border-dim);
  padding: 6px 8px 5px;
  padding-right: 40px; /* room for VP badge */
}
.card-name {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold-bright);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-race-class {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Central portrait + stat grid section */
.card-body {
  display: grid;
  grid-template-columns: 54px 1fr 54px;
  gap: 0;
  padding: 4px 3px;
  align-items: start;
}

/* Left stat column */
.card-stats-left,
.card-stats-right {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.stat-cell {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 2px 3px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  min-height: 26px;
}
.stat-val {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: bold;
  color: var(--text-bone);
  min-width: 16px;
  text-align: center;
  flex-shrink: 0;
}
.stat-val.modified-up   { color: #70c870; }
.stat-val.modified-down { color: #c87070; }
.stat-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stat-icon svg { width: 12px; height: 12px; }
  justify-content: center;
}
.stat-icon svg { width: 10px; height: 10px; }

/* Portrait cell */
.card-portrait-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-void);
  border: 1px solid var(--border-dim);
  min-height: 110px;
  padding: 4px 2px;
  position: relative;
}
.card-portrait-img {
  width: 52px;
  height: 52px;
  object-fit: cover;
  display: block;
}
.card-portrait-emoji {
  font-size: 40px;
  line-height: 1;
}
.card-alignment-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 4px;
}
.align-good    { background: #4a8a4a; }
.align-evil    { background: #8a2020; }
.align-neutral { background: #8a7020; }

/* Bottom stat row — Armor | Dex | Perc | Fortune */
.card-bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  padding: 0 3px 3px;
}
.card-bottom-cell {
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2px 0;
}
.card-bottom-val {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: bold;
  color: var(--text-bone);
}
.card-bottom-icon {
  width: 13px;
  height: 13px;
}
.card-bottom-icon svg { width: 11px; height: 11px; }

/* Vitality bar */
.card-vit-bar {
  margin: 2px 3px;
  height: 3px;
  background: var(--border-dim);
  position: relative;
}
.card-vit-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--blood-red);
  transition: width .3s;
}
.card-vit-fill.healthy { background: #2a6a2a; }
.card-vit-fill.wounded { background: #8a6020; }

/* Card action buttons */
.card-actions {
  display: flex;
  gap: 1px;
  padding: 3px;
  border-top: 1px solid var(--border-dim);
}
.card-btn {
  flex: 1;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 2px;
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .1s;
  text-align: center;
}
.card-btn:hover { border-color: var(--border-gold); color: var(--text-bone); }
.card-btn.active { background: var(--border-gold); color: var(--ink); border-color: var(--gold-bright); }
.card-btn.remove-btn { color: #6a2020; border-color: #3a1010; }
.card-btn.remove-btn:hover { border-color: var(--blood-red); color: #d06060; }

/* ─────────────────────────────────────────────── COMPANION CARDS (pets/mercs) */
.dun-hero-card.companion-card {
  min-width: 110px;
  width: 110px;
  border-color: var(--border-dim);
  border-top: 2px solid var(--text-dim);
}
.companion-label {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 3px 6px 0;
  display: block;
}

/* ─────────────────────────────────────────────── CARDS EXPAND PANEL */
.cards-expand-panel {
  display: none;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  border-top: none;
  padding: 16px;
  margin-bottom: 8px;
}
.cards-expand-panel.open { display: block; }

.cards-section-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  margin-top: 14px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-dim);
}
.cards-section-title:first-child { margin-top: 0; }

.cards-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
/* Cards panel sections from renderCardsPanel */
.cards-panel-section { margin-bottom: 16px; }
.cards-panel-section:last-child { margin-bottom: 0; }
.cards-panel-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-bright);
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-dim);
}
.dun-card-img-wrap img {
  width: 140px;
  height: auto;
  display: block;
  border: 1px solid var(--border-dim);
}
.dun-card-fallback {
  width: 140px;
  min-height: 100px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  padding: 8px;
  text-align: center;
}
.dun-card {
  width: 140px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
}
.dun-card-header { padding: 6px 8px; border-bottom: 1px solid var(--border-dim); }
.dun-card-type { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
.dun-card-title { font-family: 'Cinzel', serif; font-size: 11px; color: var(--text-bone); margin-top: 2px; }
.dun-card-body { padding: 6px 8px; font-size: 9px; color: var(--text-muted); font-style: italic; line-height: 1.5; }

/* ─────────────────────────────────────────────── DETAIL OVERLAY (sheet) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 100;
  overflow-y: auto;
  padding: 20px;
}
.detail-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.detail-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  width: 100%;
  max-width: 860px;
  position: relative;
}
.creator-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border-dim);
}
.creator-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 14px;
  color: var(--gold-bright);
}
.creator-close {
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 12px;
}
.creator-close:hover { border-color: var(--blood-red); color: #d06060; }

/* Sheet layout */
.hero-sheet {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 500px;
}
.hero-sheet-left {
  padding: 16px;
  border-right: 1px solid var(--border-dim);
  background: var(--bg-raised);
}
.hero-sheet-right { padding: 16px; }

.hero-sheet-portrait-lg {
  width: 80px; height: 80px;
  background: var(--bg-void);
  border: 1px solid var(--border-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  margin-bottom: 8px;
}
.section-divider {
  border: none;
  border-top: 1px solid var(--border-dim);
  margin: 12px 0;
}
.sheet-section-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 14px;
}
.sheet-section-title:first-child { margin-top: 0; }

/* Attribute sheet grid */
.attr-sheet-grid {}
.attr-sheet-header {
  display: grid;
  grid-template-columns: 1fr 48px 48px;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 3px 4px;
  border-bottom: 1px solid var(--border-dim);
  margin-bottom: 2px;
}
.attr-sheet-row {
  display: grid;
  grid-template-columns: 1fr 48px 48px;
  padding: 2px 4px;
  border-bottom: 1px solid rgba(58,42,16,.3);
}
.attr-sheet-row:hover { background: rgba(34,26,12,.5); }
.attr-sheet-name { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.attr-sheet-name svg { width: 11px; height: 11px; flex-shrink: 0; }
.attr-base, .attr-now {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.attr-base small { display: block; font-size: 7px; color: var(--text-dim); font-family: inherit; }
.attr-now.up   { color: #70c870; }
.attr-now.down { color: #c87070; }
.attr-now.dash { color: var(--text-dim); }

/* Quest controls */
.quest-controls { display: flex; flex-direction: column; gap: 6px; }
.quest-control-row { display: flex; align-items: center; gap: 8px; }
.quest-ctrl-label { font-size: 10px; color: var(--text-muted); width: 50px; }
.qty-btn {
  width: 22px; height: 22px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { border-color: var(--border-gold); color: var(--text-bone); }
.qty-btn:disabled { opacity: .3; cursor: default; }
.qty-display {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold-bright);
  min-width: 28px;
  text-align: center;
}

/* Fortune pips */
.fortune-pips { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
.fortune-pip {
  width: 12px; height: 12px;
  border: 1px solid var(--gold-dim);
  background: var(--gold-bright);
  cursor: pointer;
  transition: background .1s;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}
.fortune-pip.spent { background: var(--border-dim); border-color: var(--border-dim); }
.fortune-pip:hover { background: var(--gold-bright); }

/* XP section */
.xp-section { display: flex; flex-direction: column; gap: 6px; }
.xp-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); }
.xp-input {
  width: 60px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-bone);
  padding: 3px 6px;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  text-align: center;
}
.xp-hint { font-size: 9px; color: var(--text-dim); }
.coins-row { display: flex; align-items: center; gap: 6px; }
.coins-input {
  width: 70px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-bone);
  padding: 3px 6px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  text-align: center;
}

/* Skill chips */
.skill-chip {
  display: inline-block;
  font-size: 9px;
  font-family: 'Cinzel', serif;
  padding: 2px 8px;
  border: 1px solid var(--border-dim);
  background: var(--bg-dark);
  color: var(--text-muted);
  margin: 2px;
  letter-spacing: .5px;
}

/* Secondary buttons */
.btn-secondary {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--border-gold); color: var(--text-bone); }

/* ─────────────────────────────────────────────── CREATOR WIZARD */
.creator-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
  align-items: flex-start;
  justify-content: center;
}
.creator-overlay.open { display: flex; }
.creator-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  width: 100%;
  max-width: 800px;
}
.step-indicator {
  display: flex;
  gap: 2px;
  padding: 10px 16px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border-dim);
}
.step-dot {
  flex: 1;
  height: 3px;
  background: var(--border-dim);
  transition: background .2s;
}
.step-dot.done   { background: var(--gold-dim); }
.step-dot.active { background: var(--gold-bright); }
.creator-body { padding: 20px; min-height: 400px; }
.creator-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding: 12px 16px;
  border-top: 1px solid var(--border-dim);
  background: var(--bg-raised);
}

/* Race/class cards in creator */
.race-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 6px; }
.race-card {
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  padding: 8px;
  cursor: pointer;
  transition: border-color .1s;
  text-align: center;
}
.race-card:hover { border-color: var(--border-mid); }
.race-card.selected { border-color: var(--gold-bright); background: rgba(138,98,24,.15); }
.race-name, .race-card-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-bone); }
.race-align { font-size: 10px; font-style: italic; color: var(--text-muted); margin-top: 2px; }

.class-group { margin-bottom: 14px; }
.class-group-header {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 4px 8px;
  margin-bottom: 4px;
}
.class-group-header.fighter  { color: var(--fighter); border-left: 2px solid var(--fighter); }
.class-group-header.explorer { color: var(--explorer); border-left: 2px solid var(--explorer); }
.class-group-header.caster   { color: var(--caster); border-left: 2px solid var(--caster); }
.class-list { display: flex; flex-wrap: wrap; gap: 4px; }
.class-btn {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  padding: 4px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .1s;
}
.class-btn:hover { border-color: var(--border-mid); color: var(--text-bone); }
.class-btn.selected { background: rgba(138,98,24,.2); border-color: var(--gold-bright); color: var(--gold-bright); }
.class-btn:disabled { opacity: .3; cursor: not-allowed; }

/* Attr step */
.attr-dev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.attr-dev-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
}
.attr-dev-label { flex: 1; font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.attr-dev-label svg { width: 12px; height: 12px; }
.attr-dev-val {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--gold-bright);
  min-width: 24px;
  text-align: center;
}
.attr-dev-max { font-size: 8px; color: var(--text-dim); }

/* Portrait picker */
.portrait-grid, .portrait-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.portrait-opt {
  width: 52px; height: 52px;
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  cursor: pointer;
  transition: border-color .1s;
}
.portrait-opt:hover { border-color: var(--border-mid); }
.portrait-opt.selected { border-color: var(--gold-bright); background: rgba(138,98,24,.2); }

/* Race detail */
.race-detail {
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  padding: 12px;
  margin-top: 10px;
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
}
.race-detail table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.race-detail td { padding: 2px 6px; border-bottom: 1px solid rgba(58,42,16,.3); font-size: 9px; }
.race-detail td:first-child { color: var(--text-dim); }
.race-detail td:last-child { color: var(--text-bone); font-family: 'Cinzel', serif; text-align: right; }

/* ─────────────────────────────────────────────── PARTY MANAGEMENT MODALS */
.mini-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.mini-modal-overlay.open { display: flex; }
.mini-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  padding: 24px;
  min-width: 300px;
  max-width: 420px;
  width: 100%;
}
.mini-modal-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 13px;
  color: var(--gold-bright);
  margin-bottom: 16px;
}
.form-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
}
.form-group { margin-bottom: 14px; }
.step-name-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-input, .form-textarea {
  width: 100%;
  background: var(--bg-dark);
  border: 1px solid var(--border-mid);
  color: var(--text-bone);
  padding: 9px 12px;
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  margin-bottom: 12px;
}
.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--gold-bright);
}
.form-textarea { min-height: 70px; resize: vertical; }
.mini-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

/* ─────────────────────────────────────────────── XP AWARD VIEW */
.xp-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
.xp-hero-row {
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ─────────────────────────────────────────────── COMPANIONS (pets/mercs in detail sheet) */
.companion-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-family: 'Cinzel', serif;
  padding: 3px 8px;
  border: 1px solid var(--border-dim);
  background: var(--bg-dark);
  color: var(--text-muted);
  margin: 2px;
}
.companion-chip .remove-x { color: var(--blood-red); cursor: pointer; font-size: 11px; margin-left: 4px; }
.companion-chip .remove-x:hover { color: #d06060; }

/* Card image grid in companion picker */
.companion-picker-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
  padding: 4px;
}
.companion-card-opt {
  cursor: pointer;
  border: 1px solid var(--border-dim);
  transition: border-color .1s;
  width: 100px;
}
.companion-card-opt:hover { border-color: var(--gold-bright); }
.companion-card-opt img {
  width: 100px;
  height: auto;
  display: block;
}
.companion-card-opt-label {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  color: var(--text-muted);
  text-align: center;
  padding: 2px 4px;
  background: var(--bg-raised);
}

/* ─────────────────────────────────────────────── SCROLLBARS */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-dim); }

/* ─────────────────────────────────────────────── EMPTY STATES */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.empty-state-sub { font-size: 11px; font-style: italic; }

/* Companions section within strip */
.companions-divider {
  width: 1px;
  background: var(--border-dim);
  align-self: stretch;
  margin: 0 4px;
  flex-shrink: 0;
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// SVG ICONS — grim-dark replacements for emoji
// ═══════════════════════════════════════════════════════════════
const ICONS = {
  // Attribute icons
  movement: `<svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 1L9 5L5 9M1 5H9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  combatSkill: `<svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 8L8 2M6 2H8V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="3" cy="7" r="1.5" stroke="currentColor" stroke-width=".8"/></svg>`,

  shootingSkill: `<svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5H8M8 5L5.5 2.5M8 5L5.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 3V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,

function icon(key, color) {
  const svg = ICONS[key] || ICONS.skull;
  return `<span class="stat-icon" style="color:${color||'currentColor'}">${svg}</span>`;
}

// ═══════════════════════════════════════════════════════════════

// IDs sourced from worldofarasca.dungeonuniversalis.com DOM extraction

const CREATOR_STEPS = ["Name", "Race", "Class", "Attributes", "Skills", "Spells", "Review"];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let heroes    = [];
let parties   = [];
let activePartyId = null;
let creatorState  = null;
let creatorStep   = 0;
let editingHeroId = null;
let selectedCardHeroId = null; // which hero's cards are expanded

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function save() {
  localStorage.setItem('dun_heroes_v2', JSON.stringify(heroes));
  localStorage.setItem('dun_parties_v2', JSON.stringify(parties));
  localStorage.setItem('dun_active_party', activePartyId || '');
}

function load() {
  try {
    const h = localStorage.getItem('dun_heroes_v2');
    const p = localStorage.getItem('dun_parties_v2');
    const ap = localStorage.getItem('dun_active_party');
    heroes  = h ? JSON.parse(h) : [];
    parties = p ? JSON.parse(p) : [];
    activePartyId = ap || null;

    // Migrate old heroes (dun_heroes) that had no party
    const oldH = localStorage.getItem('dun_heroes');
    if (oldH && !heroes.length) {
      heroes = JSON.parse(oldH);
      // Create a default party and put all old heroes into it
      if (heroes.length && !parties.length) {
        const defParty = { id: 'party_' + Date.now(), name: 'My Party', notes: '', heroIds: heroes.map(h => h.id) };
        parties.push(defParty);
        activePartyId = defParty.id;
      }
      save();
    }
  } catch(e) {
    heroes = []; parties = []; activePartyId = null;
  }
  // Ensure hero migrations
  heroes.forEach(h => {
    if (!h.attrs) h.attrs = {};
    if (h.attrs.dexterity == null) h.attrs.dexterity = 0;
    if (h.attrs.perception == null) h.attrs.perception = 0;
    if (!h.equippedItems) h.equippedItems = [];
    if (!h.knownSpells) h.knownSpells = [];
    if (!h.skills) h.skills = [];
    if (!h.mercenaries) h.mercenaries = []; // array of merc IDs
    if (!h.pets) h.pets = [];               // array of pet IDs
    if (h.weightCurrent == null) h.weightCurrent = 0;
    if (h.xpSpent == null) h.xpSpent = 0;
    if (!h.fortuneBase) h.fortuneBase = h.fortune;
  });
}

// ═══════════════════════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const viewEl = document.getElementById('view-' + name);
  if (viewEl) viewEl.classList.add('active');

  const tabMap = {
    'parties': 0, 'party-view': 1, 'xp': 2, 'all-heroes': 3
  };
  const tabs = document.querySelectorAll('.nav-tab');
  if (tabMap[name] != null && tabs[tabMap[name]]) tabs[tabMap[name]].classList.add('active');

  if (name === 'parties')      renderPartiesList();
  if (name === 'party-view')   renderPartyView();
  if (name === 'xp')           renderXpView();
  if (name === 'all-heroes')   renderAllHeroes();
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════════════════════
// PARTY MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function openNewPartyModal() {
  document.getElementById('new-party-name').value = '';
  document.getElementById('new-party-notes').value = '';
  openModal('modal-new-party');
}

function createParty() {
  const name = document.getElementById('new-party-name').value.trim() || 'New Warband';
  const notes = document.getElementById('new-party-notes').value.trim();
  const party = { id: 'party_' + Date.now(), name, notes, heroIds: [] };
  parties.push(party);
  save();
  closeModal('modal-new-party');
  renderPartiesList();
}

function openParty(id) {
  activePartyId = id;
  save();
  const tabBtn = document.getElementById('tab-party-view');
  if (tabBtn) tabBtn.style.display = '';
  showView('party-view');
}

function deleteParty(id) {
  if (!confirm('Delete this party? Heroes will not be deleted.')) return;
  parties = parties.filter(p => p.id !== id);
  if (activePartyId === id) activePartyId = null;
  save();
  renderPartiesList();
}

function renderPartiesList() {
  const grid = document.getElementById('parties-grid');
  const empty = document.getElementById('parties-empty');
  if (!parties.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = parties.map(p => {
    const memberHeroes = p.heroIds.map(id => heroes.find(h => h.id === id)).filter(Boolean);
    const totalVP = memberHeroes.reduce((s,h) => s + (h.vp||10), 0);
    return `<div class="party-item ${p.id === activePartyId ? 'active-party' : ''}" onclick="openParty('${p.id}')">
      <div class="party-item-name">${p.id === activePartyId ? '⚑ ' : ''}${p.name}</div>
      <div class="party-item-meta">${memberHeroes.length} hero${memberHeroes.length !== 1 ? 'es' : ''} · VP ${totalVP}</div>
      ${p.notes ? `<div class="party-item-meta" style="margin-top:4px;">${p.notes}</div>` : ''}
      <div class="party-item-actions" onclick="event.stopPropagation()">
        <button class="btn-secondary" onclick="openParty('${p.id}')">Open</button>
        <button class="btn-secondary danger" onclick="deleteParty('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// ADD/REMOVE HERO FROM PARTY
// ═══════════════════════════════════════════════════════════════
function openAddHeroModal() {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) return;
  const list = document.getElementById('add-hero-list');
  const available = heroes.filter(h => !party.heroIds.includes(h.id));
  if (!available.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-style:italic;font-size:11px;padding:8px;">All heroes are already in this party, or no heroes exist. Create a new hero first.</div>';
  } else {
    list.innerHTML = available.map(h => {
      const race = RACE_DB.find(r => r.id === h.raceId) || {};
      const cls  = CLASS_DB.find(c => c.id === h.classId) || {};
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--border-dim);">
        <div style="font-size:24px;">${h.portrait}</div>
        <div style="flex:1;">
          <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-bright);">${h.name}</div>
          <div style="font-size:10px;color:var(--text-muted);">${race.name||'?'} · ${cls.name||'?'} · VP ${h.vp}</div>
        </div>
        <button class="btn-grim" onclick="addHeroToParty('${h.id}')">Add</button>
      </div>`;
    }).join('');
  }
  openModal('modal-add-hero');
}

function addHeroToParty(heroId) {
  const party = parties.find(p => p.id === activePartyId);
  if (!party || party.heroIds.includes(heroId)) return;
  party.heroIds.push(heroId);
  save();
  closeModal('modal-add-hero');
  renderPartyView();
}

function removeHeroFromParty(heroId) {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) return;
  party.heroIds = party.heroIds.filter(id => id !== heroId);
  if (selectedCardHeroId === heroId) {
    selectedCardHeroId = null;
    document.getElementById('global-cards-panel').classList.remove('open');
    document.getElementById('global-cards-panel').innerHTML = '';
  }
  save();
  renderPartyView();
}

// ═══════════════════════════════════════════════════════════════
// PARTY VP
// ═══════════════════════════════════════════════════════════════
function calcPartyVP() {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) return heroes.reduce((s,h)=>s+(h.vp||10),0); // fallback: all heroes
  return party.heroIds.reduce((s,id) => {
    const h = heroes.find(h => h.id === id);
    return s + (h ? (h.vp||10) : 0);
  }, 0);
}

// ═══════════════════════════════════════════════════════════════
// RENDER PARTY VIEW — horizontal hero strip
// ═══════════════════════════════════════════════════════════════
function renderPartyView() {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) { showView('parties'); return; }

  document.getElementById('active-party-title').textContent = party.name;
  document.getElementById('party-vp-total').textContent = calcPartyVP();

  const strip = document.getElementById('hero-strip');
  const partyHeroes = party.heroIds.map(id => heroes.find(h => h.id === id)).filter(Boolean);

  let html = '';
  partyHeroes.forEach(h => {
    html += renderDunHeroCard(h, true);
  });
  // Add companion cards (pets and mercs of all party heroes)
  const companions = [];
  partyHeroes.forEach(h => {
    (h.pets||[]).forEach(pid => companions.push({type:'pet', id: pid, owner: h.name}));
    (h.mercenaries||[]).forEach(mid => companions.push({type:'merc', id: mid, owner: h.name}));
  });
  if (companions.length) {
    html += '<div class="companions-divider"></div>';
    companions.forEach(c => { html += renderCompanionCard(c); });
  }

  // Add-hero slot
  html += `<div class="hero-add-slot" onclick="openAddHeroModal()">
    ${ICONS.merc}
    <div class="hero-add-label">Add Hero</div>
  </div>`;

  strip.innerHTML = html;
}

function renderDunHeroCard(h, inParty) {
  const race = RACE_DB.find(r => r.id === h.raceId) || {};
  const cls  = CLASS_DB.find(c => c.id === h.classId) || {};
  const cur  = calcCurrentAttrs(h.attrs, h.equippedItems || []);

  const groupCls = cls.group === 'fighter' ? 'fighter-card' : cls.group === 'explorer' ? 'explorer-card' : 'caster-card';
  const isSelected = selectedCardHeroId === h.id;

  // Vitality pct
  const vitPct = Math.round(((h.currentVitality||h.attrs.vitality) / h.attrs.vitality) * 100);
  const vitFillCls = vitPct >= 70 ? 'healthy' : vitPct >= 35 ? 'wounded' : '';

  // Alignment colour
  const alignCls = race.alignment === 'good' ? 'align-good' : race.alignment === 'evil' ? 'align-evil' : 'align-neutral';

  // Stat cell helper
  const statCell = (key, colorVar, left) => {
    const base = h.attrs[key] ?? 0;
    const current = cur[key] ?? base;
    const diff = current - base;
    const cls2 = diff > 0 ? 'modified-up' : diff < 0 ? 'modified-down' : '';
    const valHtml = `<span class="stat-val ${cls2}">${current}</span>`;
    const iconHtml = `<span class="stat-icon" style="color:var(${colorVar})">${ICONS[key]||''}</span>`;
    return `<div class="stat-cell">${left ? valHtml + iconHtml : iconHtml + valHtml}</div>`;
  };

  return `<div class="dun-hero-card ${groupCls} ${isSelected ? 'selected' : ''}" id="hero-card-${h.id}">
    <div class="card-vp-badge">VP<span>${h.vp}</span></div>

    <div class="card-scroll-header">
      <div class="card-name">${h.name}</div>
      <div class="card-race-class">${race.name||'?'} · ${cls.name||'?'}</div>
    </div>

    <div class="card-body">
      <!-- Left stats: Move, CS, Str, Shoot, Agl -->
      <div class="card-stats-left">
        ${statCell('movement',    '--col-move',  true)}
        ${statCell('combatSkill', '--col-cs',    true)}
        ${statCell('strength',    '--col-str',   true)}
        ${statCell('shootingSkill','--col-shoot', true)}
        ${statCell('agility',     '--col-agl',   true)}
      </div>

      <!-- Portrait -->
      <div class="card-portrait-cell">
        <div class="card-portrait-emoji">${h.portrait}</div>
        <div class="card-alignment-pip ${alignCls}"></div>
      </div>

      <!-- Right stats: Int, Mana, Cour, Vit, (totalArmor shown in bottom row) -->
      <div class="card-stats-right">
        ${statCell('intelligence', '--col-int',  false)}
        ${h.attrs.mana != null ? statCell('mana','--col-mana',false) : `<div class="stat-cell"><span class="stat-icon" style="color:var(--col-mana)">${ICONS.mana}</span><span class="stat-val" style="opacity:.3">—</span></div>`}
        ${statCell('courage',     '--col-cour', false)}
        ${statCell('vitality',    '--col-vit',  false)}
        <div class="stat-cell">
          <span class="stat-icon" style="color:var(--col-armor)">${ICONS.naturalArmor}</span>
          <span class="stat-val">${cur.totalArmor ?? h.attrs.naturalArmor ?? 0}</span>
        </div>
      </div>
    </div>

    <!-- Vitality bar -->
    <div class="card-vit-bar">
      <div class="card-vit-fill ${vitFillCls}" style="width:${vitPct}%"></div>
    </div>

    <!-- Bottom row: Dex | Perc | Fortune | Coins -->
    <div class="card-bottom-row">
      <div class="card-bottom-cell" title="Dexterity">
        <div class="card-bottom-icon" style="color:var(--col-dex)">${ICONS.dexterity}</div>
        <div class="card-bottom-val">${cur.dexterity ?? 0}</div>
      </div>
      <div class="card-bottom-cell" title="Perception">
        <div class="card-bottom-icon" style="color:var(--col-perc)">${ICONS.perception}</div>
        <div class="card-bottom-val">${cur.perception ?? 0}</div>
      </div>
      <div class="card-bottom-cell" title="Fortune (current/max)">
        <div class="card-bottom-icon" style="color:var(--col-fort)">${ICONS.fortune}</div>
        <div class="card-bottom-val">${h.currentFortune ?? h.fortune}/${h.fortune}</div>
      </div>
      <div class="card-bottom-cell" title="Coins">
        <div class="card-bottom-icon" style="color:var(--gold-dim)">${ICONS.coins}</div>
        <div class="card-bottom-val" style="font-size:9px;">${h.coins||0}</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="card-btn ${isSelected ? 'active' : ''}" id="cards-btn-${h.id}"
        onclick="toggleCardsPanel('${h.id}')">Cards</button>
      <button class="card-btn" onclick="openDetail('${h.id}')">Sheet</button>
      <button class="card-btn" onclick="quickRest('${h.id}')">Rest</button>
      ${inParty ? `<button class="card-btn remove-btn" onclick="removeHeroFromParty('${h.id}')">✕</button>` : ''}
    </div>
  </div>`;
}

function renderCompanionCard(c) {
  const isMetc = c.type === 'merc';
  const names = isMetc ? MERC_NAMES : PET_NAMES;
  const name = names[c.id] || `#${c.id}`;
  const imgSrc = `${CARD_BASE}${isMetc ? 'mercs' : 'pets'}/${c.id}.jpg`;
  return `<div class="dun-hero-card companion-card">
    <span class="companion-label">${isMetc ? 'Mercenary' : 'Animal'}</span>
    <div style="padding:4px 4px 0;">
      <img src="${imgSrc}" alt="${name}" style="width:100%;height:auto;display:block;border:1px solid var(--border-dim);"
        onerror="this.style.display='none'">
    </div>
    <div style="padding:4px 4px 6px;">
      <div class="card-name" style="font-size:9px;">${name}</div>
      <div class="card-race-class" style="font-size:8px;">Hired by ${c.owner}</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// CARDS PANEL TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleCardsPanel(heroId) {
  const panel = document.getElementById('global-cards-panel');
  const prevSelected = selectedCardHeroId;

  // Deselect previous card button
  if (prevSelected) {
    const prevBtn = document.getElementById('cards-btn-' + prevSelected);
    if (prevBtn) prevBtn.classList.remove('active');
    const prevCard = document.getElementById('hero-card-' + prevSelected);
    if (prevCard) prevCard.classList.remove('selected');
  }

  if (prevSelected === heroId) {
    // Toggle off
    selectedCardHeroId = null;
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }

  selectedCardHeroId = heroId;
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;

  if (!h.equippedItems) h.equippedItems = [];
  if (!h.knownSpells)   h.knownSpells   = [];

  panel.innerHTML = `<div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-bright);margin-bottom:12px;">${h.name} — Cards</div>`
    + renderCardsPanel(h);
  panel.classList.add('open');

  // Scroll panel into view
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);

  // Mark new card selected
  const newBtn = document.getElementById('cards-btn-' + heroId);
  if (newBtn) newBtn.classList.add('active');
  const newCard = document.getElementById('hero-card-' + heroId);
  if (newCard) newCard.classList.add('selected');
}

// ═══════════════════════════════════════════════════════════════
// ALL HEROES VIEW
// ═══════════════════════════════════════════════════════════════
function renderAllHeroes() {
  const el = document.getElementById('all-heroes-list');
  if (!heroes.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-title">No Heroes</div><div class="empty-state-sub">Create your first hero to begin.</div></div>';
    return;
  }
  // Show as a compact list — click opens detail sheet
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;">`
    + heroes.map(h => renderDunHeroCard(h, false)).join('')
    + `</div>`;
}

// ═══════════════════════════════════════════════════════════════
// XP VIEW
// ═══════════════════════════════════════════════════════════════
function renderXpView() {
  const el = document.getElementById('xp-award-list');
  const pool = activePartyId
    ? (parties.find(p=>p.id===activePartyId)?.heroIds||[]).map(id=>heroes.find(h=>h.id===id)).filter(Boolean)
    : heroes;

  if (!pool.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-style:italic;padding:20px;">No heroes. Create a party and add heroes first.</div>';
    return;
  }
  el.innerHTML = pool.map(h => {
    const race = RACE_DB.find(r=>r.id===h.raceId)||{};
    const devPts = Math.floor(h.xp/3);
    return `<div class="xp-hero-row">
      <div style="font-size:28px;">${h.portrait}</div>
      <div style="flex:1;">
        <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-bright);">${h.name}</div>
        <div style="font-size:10px;color:var(--text-muted);">${race.name||'?'} · VP ${h.vp}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="qty-btn" onclick="awardXP('${h.id}',-1)">−</button>
        <span style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold-bright);min-width:32px;text-align:center;">${h.xp}</span>
        <button class="qty-btn" onclick="awardXP('${h.id}',1)">+</button>
      </div>
      <div style="font-size:10px;color:var(--text-muted);min-width:100px;">
        Dev pts: <strong style="color:var(--gold-bright)">${devPts}</strong>
      </div>
    </div>`;
  }).join('');
}

function awardXP(id, delta) {
  const h = heroes.find(h=>h.id===id);
  if (h) { h.xp = Math.max(0, h.xp+delta); save(); renderXpView(); }
}

// ═══════════════════════════════════════════════════════════════
// QUICK REST (on card)
// ═══════════════════════════════════════════════════════════════
function quickRest(id) {
  const h = heroes.find(h=>h.id===id);
  if (!h) return;
  const cls = CLASS_DB.find(c=>c.id===h.classId);
  h.currentVitality = h.attrs.vitality;
  h.currentFortune = h.fortune;
  if (cls?.isCaster) {
    const intVal = h.attrs.intelligence||3;
    h.currentMana = Math.min((h.knownSpells||[]).length * 2, intVal * 3);
  }
  save();
  renderPartyView();
}

// ═══════════════════════════════════════════════════════════════
// MERCENARIES & PETS MANAGEMENT (in detail sheet)
// ═══════════════════════════════════════════════════════════════
function renderCompanionsSection(h) {
  const mercChips = (h.mercenaries||[]).map(mid => {
    const name = MERC_NAMES[mid] || `Mercenary #${mid}`;
    return `<span class="companion-chip">
      <span style="color:var(--text-muted)">${ICONS.merc}</span>${name}
      <span class="remove-x" onclick="removeCompanion('${h.id}','merc',${mid})">✕</span>
    </span>`;
  }).join('');

  const petChips = (h.pets||[]).map(pid => {
    const name = PET_NAMES[pid] || `Animal #${pid}`;
    return `<span class="companion-chip">
      <span style="color:var(--text-muted)">${ICONS.pet}</span>${name}
      <span class="remove-x" onclick="removeCompanion('${h.id}','pet',${pid})">✕</span>
    </span>`;
  }).join('');

  return `
    <div class="sheet-section-title">Mercenaries</div>
    <div id="merc-chips-${h.id}">${mercChips || '<em style="font-size:10px;color:var(--text-dim)">None hired</em>'}</div>
    <div style="margin-top:6px;">
      <button class="btn-secondary" style="font-size:9px;padding:4px 10px;" onclick="toggleCompanionPicker('${h.id}','merc')">+ Hire Mercenary</button>
    </div>
    <div id="merc-picker-${h.id}" style="display:none;margin-top:8px;"></div>

    <div class="sheet-section-title" style="margin-top:10px;">Animals &amp; Pets</div>
    <div id="pet-chips-${h.id}">${petChips || '<em style="font-size:10px;color:var(--text-dim)">None</em>'}</div>
    <div style="margin-top:6px;">
      <button class="btn-secondary" style="font-size:9px;padding:4px 10px;" onclick="toggleCompanionPicker('${h.id}','pet')">+ Add Animal</button>
    </div>
    <div id="pet-picker-${h.id}" style="display:none;margin-top:8px;"></div>
  `;
}

function toggleCompanionPicker(heroId, type) {
  const pickerId = `${type}-picker-${heroId}`;
  const picker = document.getElementById(pickerId);
  if (!picker) return;
  if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }

  const h = heroes.find(h => h.id === heroId);
  const already = type === 'merc' ? (h.mercenaries||[]) : (h.pets||[]);
  const ids = type === 'merc' ? MERCENARY_IDS : PET_IDS;
  const names = type === 'merc' ? MERC_NAMES : PET_NAMES;

  const cards = ids.filter(id => !already.includes(id)).map(id => {
    const name = names[id] || `#${id}`;
    const imgSrc = `${CARD_BASE}${type === 'merc' ? 'mercs' : 'pets'}/${id}.jpg`;
    return `<div class="companion-card-opt" onclick="addCompanion('${heroId}','${type}',${id})"
      title="${name}">
      <img src="${imgSrc}" alt="${name}" loading="lazy"
        onerror="this.parentElement.style.display='none'">
      <div class="companion-card-opt-label">${name}</div>
    </div>`;
  }).join('');

  picker.innerHTML = `<div style="background:var(--bg-dark);border:1px solid var(--border-dim);padding:10px;">
    <div style="font-size:9px;color:var(--text-muted);margin-bottom:8px;font-style:italic;">Select a ${type === 'merc' ? 'mercenary' : 'companion animal'} to add. Card images load from GitHub repo.</div>
    <div class="companion-picker-grid">${cards || '<em style="color:var(--text-dim);font-size:10px;">All already added.</em>'}</div>
  </div>`;
  picker.style.display = 'block';
}

function addCompanion(heroId, type, id) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (type === 'merc') { if (!h.mercenaries) h.mercenaries=[]; if (!h.mercenaries.includes(id)) h.mercenaries.push(id); }
  else { if (!h.pets) h.pets=[]; if (!h.pets.includes(id)) h.pets.push(id); }
  save();
  openDetail(heroId);
}

function removeCompanion(heroId, type, id) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (type === 'merc') h.mercenaries = (h.mercenaries||[]).filter(x => x !== id);
  else h.pets = (h.pets||[]).filter(x => x !== id);
  save();
  // Refresh chips inline without full re-render
  const names = type === 'merc' ? MERC_NAMES : PET_NAMES;
  const arr = type === 'merc' ? (h.mercenaries||[]) : (h.pets||[]);
  const chipsEl = document.getElementById(`${type}-chips-${heroId}`);
  if (chipsEl) {
    chipsEl.innerHTML = arr.map(mid => {
      const name = names[mid]||`#${mid}`;
      return `<span class="companion-chip"><span>${type==='merc'?ICONS.merc:ICONS.pet}</span>${name}<span class="remove-x" onclick="removeCompanion('${heroId}','${type}',${mid})">✕</span></span>`;
    }).join('') || `<em style="font-size:10px;color:var(--text-dim)">None</em>`;
  }
}

function openCreator() {
  const race = RACE_DB[0];
  creatorState = {
    name: '', portrait: '⚔',
    raceId: null, classId: null,
    devPointsTotal: 8, devPointsSpent: 0,
    attrs: {},
    skills: []
  };
  creatorStep = 0;
  document.getElementById('creator-overlay').classList.add('open');
  renderCreatorStep();
}

function closeCreator() {
  document.getElementById('creator-overlay').classList.remove('open');
  creatorState = null;
}

function renderStepIndicator() {
  const el = document.getElementById('step-indicator');
  el.innerHTML = CREATOR_STEPS.map((s, i) => {
    let cls = i < creatorStep ? 'done' : i === creatorStep ? 'active' : '';
    return `<div class="step-dot ${cls}" title="${s}"></div>`;
  }).join('');
  const titleEl = document.getElementById('creator-title-label');
  if (titleEl) titleEl.textContent = `Create Hero — ${CREATOR_STEPS[creatorStep]}`;
  const prevBtn = document.getElementById('creator-prev-btn');
  if (prevBtn) prevBtn.style.visibility = creatorStep === 0 ? 'hidden' : 'visible';
  const nextBtn = document.getElementById('creator-next-btn');
  if (nextBtn) nextBtn.textContent = creatorStep === CREATOR_STEPS.length - 1 ? 'Create Hero ✓' : 'Next →';
}

function renderCreatorStep() {
  renderStepIndicator();
  const body = document.getElementById('creator-body');
  switch(creatorStep) {
    case 0: body.innerHTML = renderStepName(); break;
    case 1: body.innerHTML = renderStepRace(); attachRaceEvents(); break;
    case 2: body.innerHTML = renderStepClass(); attachClassEvents(); break;
    case 3: body.innerHTML = renderStepAttrs(); attachAttrEvents(); break;
    case 4: body.innerHTML = renderStepSkills(); break;
    case 5: body.innerHTML = renderStepSpells(); break;
    case 6: body.innerHTML = renderStepReview(); break;
  }
}

// ─── Step 0: Name & Portrait ──────────────────────────────────
function renderStepName() {
  const portraitOpts = PORTRAITS.map(p =>
    `<div class="portrait-opt ${creatorState.portrait === p ? 'selected' : ''}" onclick="selectPortrait('${p}')">${p}</div>`
  ).join('');
  return `
    <div class="step-name-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Hero Name</label>
        <input class="form-input" id="inp-name" placeholder="Enter a name…" value="${creatorState.name}"
          oninput="creatorState.name=this.value">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Portrait</label>
        <div class="portrait-picker" id="portrait-picker">${portraitOpts}</div>
      </div>
    </div>`;
}
function selectPortrait(p) {
  creatorState.portrait = p;
  document.querySelectorAll('.portrait-opt').forEach(el => el.classList.toggle('selected', el.textContent === p));
}

// ─── Step 1: Race ──────────────────────────────────────────────
function renderStepRace() {
  const cards = RACE_DB.map(r => {
    const alignLabel = r.alignment.charAt(0).toUpperCase() + r.alignment.slice(1);
    return `<div class="race-card ${creatorState.raceId === r.id ? 'selected' : ''}"
      data-race-id="${r.id}" onclick="selectRace(${r.id})">
      <div class="race-card-name">${r.name}</div>
      <span class="race-align-badge align-${r.alignment}">${alignLabel}</span>
      <div class="race-stat-preview">
        MOV ${r.attrs.movement.min}-${r.attrs.movement.max} · VIT ${r.attrs.vitality.min}-${r.attrs.vitality.max}<br>
        Fortune ${r.fortune} · ${r.size}
      </div>
    </div>`;
  }).join('');

  const detail = creatorState.raceId ? renderRaceDetail(RACE_DB.find(r => r.id === creatorState.raceId)) : '<div style="color:var(--text-muted);text-align:center;padding:20px;font-style:italic;">Select a race to see details</div>';

  return `<div class="race-grid">${cards}</div><div class="race-detail" id="race-detail">${detail}</div>`;
}

function renderRaceDetail(race) {
  if (!race) return '';
  const rows = ATTR_META.filter(a => a.key !== 'mana' || race.attrs.mana).map(a => {
    const at = race.attrs[a.key];
    if (!at) return '';
    const dots = at.dc > 0 ? '●'.repeat(at.dc) : '—';
    const range = at.min === at.max ? `${at.min}` : `${at.min} – ${at.max}`;
    return `<div class="attr-row">
      <span class="attr-name">${a.icon} ${a.label}</span>
      <span class="attr-range">${range}</span>
      <span class="attr-cost"><span class="attr-dots">${dots}</span></span>
    </div>`;
  }).join('');

  return `
    <div class="race-detail-title">${race.name} <span class="race-align-badge align-${race.alignment}">${race.alignment}</span></div>
    <div class="attr-table">${rows}</div>
    <div class="race-skills-row"><strong>Starting skills:</strong> ${race.startingSkills.join(', ') || 'None'}</div>
    <div class="race-special">${race.special}</div>`;
}

function selectRace(id) {
  creatorState.raceId = id;
  document.querySelectorAll('.race-card').forEach(el =>
    el.classList.toggle('selected', parseInt(el.dataset.raceId) === id)
  );
  document.getElementById('race-detail').innerHTML = renderRaceDetail(RACE_DB.find(r => r.id === id));
  initAttrsFromRace();
}

function attachRaceEvents() {}

function initAttrsFromRace() {
  if (!creatorState.raceId) return;
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  creatorState.attrs = {};
  ATTR_META.forEach(a => {
    const at = race.attrs[a.key];
    if (!at) { creatorState.attrs[a.key] = null; return; }
    creatorState.attrs[a.key] = at.min;
  });
  creatorState.devPointsSpent = 0;
}

// ─── Step 2: Class ─────────────────────────────────────────────
function renderStepClass() {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const allowed = race ? race.allowedClasses : [];
  const isAllowed = (cid) => allowed.includes('all') || allowed.includes(cid) || allowed.includes(cid.replace('_',' '));

  const groups = ['fighter','explorer','caster'];
  const cols = groups.map(g => {
    const classes = CLASS_DB.filter(c => c.group === g);
    const header = `<div class="class-group-header ${g}">${g.toUpperCase()}S</div>`;
    const opts = classes.map(c => {
      const ok = isAllowed(c.id) || isAllowed(c.name.toLowerCase());
      const sel = creatorState.classId === c.id ? 'selected' : '';
      const dis = !ok ? 'disabled' : '';
      return `<div class="class-opt ${sel} ${dis}" data-class-id="${c.id}"
        onclick="${ok ? `selectClass('${c.id}')` : ''}">
        <div class="class-opt-name">${c.name}${c.isCaster ? ' ✨' : ''}</div>
        <div class="class-opt-desc">${c.desc}</div>
      </div>`;
    }).join('');
    return `<div>${header}${opts}</div>`;
  }).join('');

  return `<div class="class-columns">${cols}</div>
    <div style="margin-top:12px;font-size:10px;color:var(--text-muted);font-style:italic;">
      Greyed out classes are not recommended for your race (but you can override this rule).
      ✨ = Spellcaster (has Mana pool from creation).
    </div>`;
}

function selectClass(id) {
  creatorState.classId = id;
  document.querySelectorAll('.class-opt').forEach(el =>
    el.classList.toggle('selected', el.dataset.classId === id)
  );
}

function attachClassEvents() {}

// ─── Step 3: Attributes ────────────────────────────────────────
function renderStepAttrs() {
  if (!creatorState.raceId) return '<p style="color:var(--text-muted)">Please select a race first.</p>';
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);
  const remaining = creatorState.devPointsTotal - creatorState.devPointsSpent;
  const warnClass = remaining === 0 ? 'spent' : remaining <= 2 ? 'warn' : '';

  const rows = ATTR_META.map(a => {
    // Dexterity and Perception: start at 0, skill-only, not on race card
    if (a.key === 'dexterity' || a.key === 'perception') {
      return `<div class="attr-builder-row">
        <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
        <div class="attr-builder-val" style="color:var(--text-muted)">0</div>
        <div class="attr-builder-range" style="color:#6a5030">skill-only</div>
        <div class="attr-cost-label" style="font-size:9px;color:#6a5030">modified by skills</div>
      </div>`;
    }
    const at = race.attrs[a.key];
    if (!at || a.key === 'naturalArmor') {
      const val = creatorState.attrs[a.key] ?? at?.min ?? 0;
      if (!at) return '';
      return `<div class="attr-builder-row">
        <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
        <div class="attr-builder-val" style="color:var(--text-muted)">${val}</div>
        <div class="attr-builder-range">(fixed)</div>
        <div class="attr-cost-label" style="font-size:9px;color:#6a5030">cannot change</div>
      </div>`;
    }
    if (a.key === 'mana' && !at) return '';

    const cur = creatorState.attrs[a.key] ?? at.min;
    let dc = at.dc;
    // Class bonus: first increase costs 1 less
    if (cls && cls.bonusAttr === a.key && cur === at.min) dc = Math.max(1, dc - 1);
    const canInc = cur < at.max && remaining >= dc;
    const canDec = cur > at.min;

    return `<div class="attr-builder-row">
      <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
      <button class="attr-btn" ${canDec ? '' : 'disabled'} onclick="changeAttr('${a.key}',-1)">−</button>
      <div class="attr-builder-val">${cur}</div>
      <button class="attr-btn" ${canInc ? '' : 'disabled'} onclick="changeAttr('${a.key}',1)">+</button>
      <div class="attr-builder-range">${at.min} – ${at.max}</div>
      <div class="attr-cost-label">${dc > 0 ? dc + ' pt' + (dc > 1 ? 's' : '') + '/+1' : '—'}</div>
    </div>`;
  }).join('');

  return `<div class="attr-builder">
    <div class="dev-points-banner">
      <span>Development Points Remaining</span>
      <span class="dev-points-count ${warnClass}">${remaining}</span>
    </div>
    ${rows}
    <div style="margin-top:12px;font-size:10px;color:var(--text-muted);font-style:italic;">
      You have 8 development points to spend. Natural Armor and Fortune cannot be changed here.
      ${cls && cls.bonusAttr ? `<br>${cls.name}s get a 1-point discount on the first ${cls.bonusAttr.replace(/([A-Z])/g,' $1')} increase.` : ''}
    </div>
  </div>`;
}

function changeAttr(key, delta) {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);
  const at = race.attrs[key];
  if (!at) return;

  const cur = creatorState.attrs[key] ?? at.min;
  let dc = at.dc;
  if (cls && cls.bonusAttr === key && cur === at.min && delta > 0) dc = Math.max(1, dc - 1);

  if (delta > 0) {
    if (cur >= at.max) return;
    if (creatorState.devPointsSpent + dc > creatorState.devPointsTotal) return;
    creatorState.attrs[key] = cur + 1;
    creatorState.devPointsSpent += dc;
  } else {
    if (cur <= at.min) return;
    let refundDc = at.dc;
    if (cls && cls.bonusAttr === key && cur === at.min + 1) refundDc = Math.max(1, at.dc - 1);
    creatorState.attrs[key] = cur - 1;
    creatorState.devPointsSpent -= refundDc;
  }

  renderCreatorStep();
}

function attachAttrEvents() {}

/**
 * Calculate current attribute values by applying equipped item modifiers to base attrs.
 * Base attrs = starting racial stats + dev point upgrades (character evolution only).
 * Current attrs = base + item bonuses/penalties (armor, rings, potions, etc).
 */
function calcCurrentAttrs(baseAttrs, equippedItemIds) {
  const cur = { ...baseAttrs };
  // Start total armor from natural armor
  cur.totalArmor = cur.naturalArmor || 0;
  
  for (const itemId of (equippedItemIds || [])) {
    const item = ITEM_BY_ID[itemId];
    if (!item) continue;
    // Apply attribute modifiers
    if (item.attrMods) {
      for (const [attr, mod] of Object.entries(item.attrMods)) {
        if (cur[attr] != null) cur[attr] = (cur[attr]||0) + mod;
        else cur[attr] = mod; // dex/perception start at 0
      }
    }
    // Add armor bonus to total armor
    if (item.armorBonus) cur.totalArmor += item.armorBonus;
  }
  return cur;
}

  'Fairies':['Fire','Earth','Corruption','Underworld','Necromancy','Witchcraft'],

function getAvailableSpells(classId, raceName) {
  const lores = CLASS_LORES[classId] || [];
  const bans = RACE_LORE_BANS[raceName] || [];
  return SPELL_DB.filter(s => lores.includes(s.lore) && !bans.includes(s.lore));
}

function calcManaPool(intVal, spellCount) {
  return Math.min(spellCount * 2, intVal * 3);
}

function sorceryLevel(vp) {
  if (vp >= 30) return 'Archmage';
  if (vp >= 15) return 'Journeyman';
  return 'Apprentice';
}

  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);

  if (!cls?.isCaster) {

// ─── Creator navigation ────────────────────────────────────────
function creatorNext() {
  // Validation
  if (creatorStep === 0 && !creatorState.name.trim()) {
    alert('Please enter a name for your hero.'); return;
  }
  if (creatorStep === 1 && !creatorState.raceId) {
    alert('Please select a race.'); return;
  }
  if (creatorStep === 2 && !creatorState.classId) {
    alert('Please select a class.'); return;
  }

  if (creatorStep === CREATOR_STEPS.length - 1) {
    finaliseHero(); return;
  }
  creatorStep++;
  renderCreatorStep();
}

function creatorPrev() {
  if (creatorStep > 0) { creatorStep--; renderCreatorStep(); }
}

function finaliseHero() {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);

  // VP: base 10 + 2 per professional skill + 2 per spell
  // Racial starting skills don't cost VP (they're free with the race)
  const proSkills = creatorState.skills || [];
  const startingSpells = cls.isCaster ? (creatorState.spells || []) : [];
  const startingVP = 10 + (proSkills.length * 2) + (startingSpells.length * 2);

  const hero = {
    id: 'hero_' + Date.now(),
    name: creatorState.name.trim(),
    portrait: creatorState.portrait,
    raceId: creatorState.raceId,
    classId: creatorState.classId,
    alignment: race.alignment,
    vp: startingVP,
    xp: 0,        // unspent accumulated XP
    xpSpent: 0,   // XP already invested in improvements
    coins: 0,
    // Base attributes: racial starting values + dev point spends + XP upgrades
    // These only change through character development, never equipment
    attrs: { ...creatorState.attrs, dexterity: 0, perception: 0 },
    // Equipped item IDs — used to calculate currentAttrs on the fly
    equippedItems: [],   // item IDs currently equipped (hands/body slots)
    weightCurrent: 0,
    // Quest-state (reset per quest)
    currentVitality: creatorState.attrs.vitality,
    // Spells known (spellcasters only). Each +2 mana, +2 VP.
    knownSpells: cls.isCaster ? (creatorState.spells || []) : [],
    currentMana: cls.isCaster
      ? Math.min((creatorState.spells||[]).length * 2 || cls.startMana || 6,
                 (creatorState.attrs.intelligence || 3) * 3)
      : 0,
    fortune: race.fortune,       // current max (can grow +2 above fortuneBase)
    fortuneBase: race.fortune,   // racial base, for reference
    currentFortune: race.fortune,
    skills: [...race.startingSkills, ...(creatorState.skills || [])],
    equipment: { hands: [], body: [], backpack: [] },
    notes: ''
  };

  heroes.push(hero);
  save();
  closeCreator();
  renderRoster();
}

function openDetail(id) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  // Migrate old heroes
  if (h.attrs.dexterity == null) h.attrs.dexterity = 0;
  if (h.attrs.perception == null) h.attrs.perception = 0;
  if (h.fortuneBase == null) h.fortuneBase = h.fortune;
  if (!h.equippedItems) h.equippedItems = [];
  if (!h.knownSpells) h.knownSpells = [];
  if (h.weightCurrent == null) h.weightCurrent = 0;
  if (h.xpSpent == null) h.xpSpent = 0;

  const race = RACE_DB.find(r => r.id === h.raceId) || {};
  const cls  = CLASS_DB.find(c => c.id === h.classId) || {};

  // Calculate current attrs (base + equipment modifiers)
  const cur = calcCurrentAttrs(h.attrs, h.equippedItems);

  // Attribute rows: base | current (highlighted if different)
  const mainAttrs = ['movement','combatSkill','strength','shootingSkill','agility',
                     'intelligence','mana','courage','naturalArmor','vitality',
                     'dexterity','perception'];

  function attrRow(key, label, icon, note) {
    const base    = h.attrs[key] ?? 0;
    const current = cur[key] ?? base;
    const diff    = current - base;
    const isSkillOnly = (key === 'dexterity' || key === 'perception');
    const isFixed     = (key === 'naturalArmor');
    const raceAt      = race.attrs?.[key];
    const maxVal      = raceAt ? raceAt.max : null;

    // BASE column — shows development-point value with racial max below
    const baseHTML = `<div class="attr-base">
      ${base}${maxVal != null ? `<small>max ${maxVal}</small>` : (isFixed ? `<small>fixed</small>` : isSkillOnly ? `<small>skill</small>` : '')}
    </div>`;

    // NOW column — only meaningful if modified by equipment
    let nowHTML;
    if (isSkillOnly) {
      nowHTML = `<div class="attr-now dash" title="Only modified by skills">—</div>`;
    } else if (diff > 0) {
      nowHTML = `<div class="attr-now up" title="Equipment adds +${diff}">${current}</div>`;
    } else if (diff < 0) {
      nowHTML = `<div class="attr-now down" title="Equipment reduces by ${Math.abs(diff)}">${current}</div>`;
    } else {
      nowHTML = `<div class="attr-now dash">—</div>`;
    }

    return `<div class="attr-sheet-row" title="${note||''}">
      <span class="attr-sheet-name">${icon} ${label}</span>

      ${nowHTML}

  // Total armor row — always show base (natural) and current (natural + equipment)
  const armorEqBonus = (cur.totalArmor||0) - (h.attrs.naturalArmor||0);
  const totalArmorRow = `<div class="attr-sheet-row" style="background:rgba(106,74,32,.08)">
    <span class="attr-sheet-name">🛡 Total Armor</span>
    <div class="attr-base">${h.attrs.naturalArmor||0}<small>natural</small></div>
    <div class="attr-now ${armorEqBonus > 0 ? 'up' : 'dash'}" title="${armorEqBonus > 0 ? `+${armorEqBonus} from equipment` : 'no equipment bonus'}">
      ${armorEqBonus > 0 ? cur.totalArmor : '—'}
    </div>
  </div>`;

  const attrRows = [
    attrRow('movement','Movement','🥾','squares per turn'),
    attrRow('combatSkill','Combat Skill','⚔','melee attacks'),
    attrRow('strength','Strength','💪','damage & carry'),
    attrRow('shootingSkill','Shooting Skill','🎯','ranged attacks'),
    attrRow('agility','Agility','🌬','dodge & jump'),
    attrRow('intelligence','Intelligence','🧠','spells & traps'),
    h.attrs.mana != null ? attrRow('mana','Mana','✨','spell power') : '',
    attrRow('courage','Courage','🚩','resist fear'),
    attrRow('naturalArmor','Natural Armor','🛡','fixed — skin toughness'),
    attrRow('vitality','Vitality','❤','hit points'),
    attrRow('dexterity','Dexterity','🖐','traps & locks'),
    attrRow('perception','Perception','👁','detect & initiative'),

  const maxFortune = h.fortune;

    `<div class="fortune-pip ${i >= h.currentFortune ? 'spent' : ''}"
      onclick="toggleFortune('${h.id}',${i})"
      title="${i < h.currentFortune ? 'Click to spend' : 'Click to restore'}"></div>`

  const canLowerFortune = maxFortune > h.fortuneBase;

  const weightMax = ((h.attrs.strength || 3) + (h.attrs.vitality || 4)) * 2;

  // XP split: earned vs spent
  const devPtsTotal = Math.floor((h.xp + h.xpSpent) / 3);
  const devPtsSpent = Math.floor(h.xpSpent / 3);
  const devPtsAvail = devPtsTotal - devPtsSpent;

  const modal = document.getElementById('detail-modal');
  modal.innerHTML = `
    <div class="creator-header">
      <div class="creator-title">${h.portrait} ${h.name}</div>
      <button class="creator-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="hero-sheet">
      <div class="hero-sheet-left">

        <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-light);margin-bottom:2px;">${h.name}</div>
        <div style="font-size:11px;color:var(--text-muted);">${race.name || '?'} · ${cls.name || '?'}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">
          Alignment: <span style="color:${h.alignment==='good'?'#6abf6a':h.alignment==='evil'?'#bf6a6a':'#bfbf6a'}">${h.alignment||'—'}</span>

        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
          VP: <strong style="color:var(--gold-light);font-size:16px;">${h.vp}</strong>
        </div>

        <div class="sheet-section-title">Fortune
          <span style="font-size:8px;margin-left:4px;color:var(--text-muted)">
            base ${h.fortuneBase} · max ${h.fortuneBase + 2}
          </span>
        </div>
        <div class="fortune-pips">${fortunePips}</div>

          <span style="font-size:9px;color:var(--text-muted);align-self:center;">max ${maxFortune}</span>

        <hr class="section-divider">
        <div class="sheet-section-title">Coins</div>

        </div>

        <hr class="section-divider">
        <div class="sheet-section-title">Weight</div>

          <input style="background:var(--bg-dark);border:1px solid var(--panel-border);color:var(--text-light);
            padding:3px 6px;font-family:'Cinzel',serif;font-size:13px;width:48px;text-align:center;"
            type="number" min="0" value="${h.weightCurrent||0}"
            onchange="updateField('${h.id}','weightCurrent',this.value)">
          <span>/ ${weightMax}</span>
        </div>
      </div>

      <div class="hero-sheet-right">
        <div class="sheet-section-title">
          Attributes
        </div>
        <div class="attr-sheet-grid">
          <div class="attr-sheet-header">
            <span>Attribute</span>
            <span>Base</span>
            <span>Now</span>
          </div>
          ${attrRows}
        </div>

        <div class="sheet-section-title">Quest Status</div>
        <div class="quest-controls">
          <div class="quest-control-row">
            <span class="quest-ctrl-label">Vitality</span>
            <button class="qty-btn" onclick="adjustHeroVal('${h.id}','currentVitality',-1)">−</button>
            <span class="qty-display" id="qv-${h.id}">${h.currentVitality}</span>
            <button class="qty-btn" onclick="adjustHeroVal('${h.id}','currentVitality',1)">+</button>
            <span style="font-size:10px;color:var(--text-muted)">/ ${h.attrs.vitality}</span>
          </div>
          ${cls.isCaster ? `<div class="quest-control-row">

        ${cls.isCaster ? renderSpellSection(h, race, cls) : ''}

        </div>

}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  renderRoster();
}

// ─── Hero mutations ────────────────────────────────────────────
function adjustHeroVal(id, key, delta) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const cls = CLASS_DB.find(c => c.id === h.classId);
  let max = key === 'currentVitality' ? h.attrs.vitality
          : key === 'currentMana'     ? (h.attrs.mana != null ? h.attrs.mana : (cls?.startMana || 6))
          : 999;
  h[key] = Math.max(0, Math.min(max, (h[key] || 0) + delta));
  save();
  const el = document.getElementById((key === 'currentVitality' ? 'qv-' : 'qm-') + id);
  if (el) el.textContent = h[key];
}

function toggleFortune(id, idx) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  h.currentFortune = idx < h.currentFortune ? idx : idx + 1;
  save();
  openDetail(id);
}

function updateField(id, key, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h[key] = parseFloat(val) || 0; save(); }
}

function updateXPSpent(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.xpSpent = parseInt(val) || 0; save(); openDetail(id); }
}

function raiseFortune(id, delta) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const newMax = h.fortune + delta;
  const cap = (h.fortuneBase || h.fortune) + 2;
  if (newMax < (h.fortuneBase || h.fortune) || newMax > cap) return;
  h.fortune = newMax;
  if (h.currentFortune > newMax) h.currentFortune = newMax;
  h.vp += delta * 2; // fortune increase costs XP → +2 VP per raise
  save();
  openDetail(id);
}

function updateCoins(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.coins = parseInt(val) || 0; save(); }
}

function updateXP(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.xp = parseInt(val) || 0; save(); openDetail(id); }
}

function updateNotes(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.notes = val; save(); }
}

function restHero(id) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const cls = CLASS_DB.find(c => c.id === h.classId);
  h.currentVitality = h.attrs.vitality;
  // Mana restored to full pool (spells×2, capped at INT×3)
  if (cls?.isCaster) {
    const intVal = h.attrs.intelligence || 3;
    h.currentMana = Math.min((h.knownSpells||[]).length * 2 || cls.startMana || 6, intVal * 3);
  } else {
    h.currentMana = 0;
  }
  h.currentFortune = h.fortune;
  save();
  renderRoster();
}

function deleteHero(id) {
  heroes = heroes.filter(h => h.id !== id);
  save();
  renderRoster();
}

function renderDunCard(cfg) {
  // Use the real card image if available, fall back to CSS card
  const base = 'https://squidboy30.github.io/DUN-Generator/src/cards/';
  const imgUrl = cfg.imgPath ? base + cfg.imgPath : null;

  if (imgUrl) {
    return `<div class="dun-card-img-wrap">
      <img src="${imgUrl}" alt="${cfg.title}" title="${cfg.title}"
        onerror="this.parentElement.innerHTML=\`<div class='dun-card-fallback'>${cfg.title}</div>\`"
        loading="lazy">
    </div>`;
  }

  // CSS fallback
  const typeLabel = {
    combat:'Combat Skill', exploration:'Exploration', scholarly:'Scholarly',
    nature:'Nature', spell:'Magic Spell', item:'Equipment', armor:'Armor & Shield'
  }[cfg.type] || cfg.type;
  return `<div class="dun-card card-${cfg.type}">
    <div class="dun-card-header">
      <div class="dun-card-type">${typeLabel}</div>
      <div class="dun-card-title">${cfg.title}</div>
    </div>
    <div class="dun-card-body">${cfg.desc || ''}</div>
  </div>`;
}
