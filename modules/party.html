  forester:['exploration','nature'], sorcerer_hunter:['combat','exploration'],
  wizard:['scholarly'], sorcerer:['combat','scholarly'], animist:['scholarly','nature'],
  necromancer:['scholarly'], runic_master:['scholarly','nature'], battle_wizard:['combat','scholarly'],
};

const TYPE_LABELS = { combat:'Combat', exploration:'Exploration & Subterfuge', scholarly:'Scholarly & Leadership', nature:'Nature' };
const TYPE_COLORS = { combat:'#c04020', exploration:'#206040', scholarly:'#4020a0', nature:'#406020' };

function renderStepSkills() {
  if (!creatorState.classId) return '<p style="color:var(--text-muted)">Please select a class first.</p>';
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);

  const allowedTypes = CLASS_SKILL_TYPES[creatorState.classId] || ['combat'];
  const intVal = creatorState.attrs.intelligence || 3;
  const maxNewSkills = intVal * 2; // lifetime max new professional skills after creation

  // Free skills (part of base 10 VP — not selectable, already assigned)
  const racialSkills = race ? race.startingSkills : [];
  const classSkill   = cls.startingSkill || null;

  const extraSkills = creatorState.skills || []; // manually chosen — each costs +2 VP

  const vpCurrent = 10 + (extraSkills.length * 2);

  const sections = allowedTypes.map(type => {
    const skills = SKILL_DB.filter(s => s.type === type);
    const color  = TYPE_COLORS[type];
    const chips  = skills.map(s => {
      const isRacial = racialSkills.some(r => r.toLowerCase() === s.name.toLowerCase());
      const isClass  = classSkill && classSkill.toLowerCase() === s.name.toLowerCase();
      const isFree   = isRacial || isClass;
      const isSel    = extraSkills.includes(s.name);
      const freeLabel = isRacial ? '(race)' : isClass ? '(class)' : '';
      const safeName  = s.name.replace(/'/g, "\\'");
      return `<div class="skill-opt ${isSel ? 'selected' : ''} ${isFree ? 'free-skill' : ''}"
        ${!isFree ? `onclick="toggleSkill('${safeName}')"` : ''}
        title="${isFree ? `Free ${freeLabel} — already assigned, no VP cost` : `+2 VP if selected`}">
        <div class="skill-name">${s.name}
          ${isFree ? `<em class="skill-tag">${freeLabel} — free</em>` : ''}
          ${isSel  ? `<em class="skill-tag vp-cost">+2 VP</em>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:16px;">
      <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:${color};
        border-bottom:2px solid ${color};padding-bottom:4px;margin-bottom:8px;">
        ${TYPE_LABELS[type]} (${skills.length})
      </div>
      <div class="skills-grid">${chips}</div>
    </div>`;
  }).join('');

  return `
    <div style="margin-bottom:12px;background:var(--bg-dark);border:1px solid var(--border-gold);
      padding:10px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-bright);">
          VP: <strong>${vpCurrent}</strong>
        </div>
        <div style="font-size:10px;color:var(--text-muted);">
          Extra skills: <strong style="color:var(--gold-bright)">${extraSkills.length}</strong>
          × 2 VP = +${extraSkills.length * 2} VP
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-muted);">
        <strong style="color:var(--text-bone)">Free (included in base 10 VP):</strong>
        Race: ${racialSkills.map(s => `<span class="skill-chip">${s}</span>`).join(' ')}
        ${classSkill ? `· Class: <span class="skill-chip">${classSkill}</span>` : ''}
      </div>
    </div>
    <div style="font-size:10px;color:var(--text-muted);font-style:italic;margin-bottom:12px;">
      Click a skill below to add it as an <strong>extra skill (+2 VP each)</strong>.
      Class: <strong>${cls.name}</strong> can learn: 
      ${allowedTypes.map(t => `<span style="color:${TYPE_COLORS[t]}">${TYPE_LABELS[t]}</span>`).join(', ')}.
      Lifetime max new professional skills: INT×2 = ${maxNewSkills}.
    </div>
    ${sections}`;
}

function toggleSkill(name) {
  if (!creatorState.skills) creatorState.skills = [];
  const idx = creatorState.skills.indexOf(name);
  if (idx >= 0) {
    creatorState.skills.splice(idx, 1);
  } else {
    creatorState.skills.push(name);
  }
  // Re-render step
  document.getElementById('creator-body').innerHTML = renderStepSkills();
}

const RACE_LORE_BANS = {
  'Elves':['Corruption','Underworld'],
  'Amphibians':['Corruption','Underworld'],
  'Reptilians':['Corruption','Underworld'],
  'Fairies':['Fire','Earth','Corruption','Underworld','Necromancy','Witchcraft'],
};

function getAvailableSpells(classId, raceName) {
  const lores = CLASS_LORES[classId] || [];
  const bans = RACE_LORE_BANS[raceName] || [];
  return SPELL_DB.filter(s => lores.includes(s.lore) && !bans.includes(s.lore));
}

function calcManaPool(intVal, spellCount) {
  return Math.min(spellCount * 2, intVal * 3);
}

function sorceryLevel(vp) {
  if (vp >= 30) return 'Archmage';
  if (vp >= 15) return 'Journeyman';
  return 'Apprentice';
}

function renderStepSpells() {
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);
  const race = RACE_DB.find(r => r.id === creatorState.raceId);

  if (!cls?.isCaster) {
    return `<div style="text-align:center;padding:40px;color:var(--text-muted);font-style:italic;">

  }

  const available = getAvailableSpells(creatorState.classId, race?.name);
  const selected  = creatorState.spells || [];
  const intVal    = creatorState.attrs?.intelligence || 3;
  const manaPool  = calcManaPool(intVal, selected.length);
  const manaMax   = intVal * 3;
  const startMana = cls.startMana || 6;

  // Group by lore
  const byLore = {};
  available.forEach(s => { (byLore[s.lore]=byLore[s.lore]||[]).push(s); });

  const sections = Object.entries(byLore).map(([lore, spells]) => {
    const color = LORE_COLORS[lore] || '#888';
    const chips = spells.map(s => {
      const isSel = selected.includes(s.name);

      return `<div class="skill-opt ${isSel?'selected':''}"
        style="${isSel?`border-color:${color};background:rgba(0,0,0,.2)`:''}"

        <div class="skill-name">${s.name} ${manaTag}</div>
        <div class="skill-type-badge">${s.cost} gp to learn</div>

      <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
        color:${color};border-bottom:2px solid ${color};padding-bottom:4px;margin-bottom:8px;">

}

function toggleSpell(name) {
  if (!creatorState.spells) creatorState.spells = [];
  const idx = creatorState.spells.indexOf(name);
  if (idx >= 0) creatorState.spells.splice(idx, 1);
  else creatorState.spells.push(name);
  document.getElementById('creator-body').innerHTML = renderStepSpells();
}

function renderStepReview() {
  const race = RACE_DB.find(r => r.id === creatorState.raceId) || { name:'?', alignment:'neutral', fortune:3, startingSkills:[] };
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId) || { name:'?' };

  const attrRows = ATTR_META.map(a => {
    const val = creatorState.attrs[a.key];
    if (val == null) return '';
    return `<div class="attr-row">
      <span class="attr-name">${a.icon} ${a.label}</span>
      <span class="attr-range" style="font-size:14px;color:var(--gold-light)">${val}</span>
    </div>`;
  }).join('');

  const classSkill = cls.startingSkill ? [cls.startingSkill] : [];
  const extraSkills = creatorState.skills || [];
  const startingSpells = cls.isCaster ? (creatorState.spells || []) : [];
  const vp = 10 + (extraSkills.length * 2) + (startingSpells.length * 2);

  return `
    <div style="max-width:600px;margin:0 auto;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div>
          <div class="sheet-section-title">Identity</div>
          <div style="font-size:28px;margin-bottom:8px;">${creatorState.portrait}</div>
          <div style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold-light);margin-bottom:4px;">${creatorState.name || '(unnamed)'}</div>
          <div style="font-size:12px;color:var(--text-muted);">${race.name} · ${cls.name}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Alignment: ${race.alignment} · Fortune: ${race.fortune}</div>
          <div style="font-size:11px;color:var(--text-muted);">Value Points: <strong style="color:var(--gold-bright)">${vp}</strong>
            <span style="font-size:9px;"> = 10 base${extraSkills.length ? ` +${extraSkills.length*2} skills` : ''}${startingSpells.length ? ` +${startingSpells.length*2} spells` : ''}</span>
          </div>
        </div>
        <div>
          <div class="sheet-section-title">Starting Skills (all free)</div>
          <div style="font-size:11px;color:var(--text-muted);">
            <div style="margin-bottom:4px;font-size:9px;color:var(--text-dim);">Race:</div>
            ${race.startingSkills.map(s => `<span class="skill-chip">${s}</span>`).join('')}
            ${!race.startingSkills.length ? '<em>None</em>' : ''}
            ${classSkill.length ? `
            <div style="margin:6px 0 4px;font-size:9px;color:var(--text-dim);">Class (${cls.name}):</div>
            ${classSkill.map(s => `<span class="skill-chip" style="border-color:var(--fighter)">${s}</span>`).join('')}` : ''}
            ${extraSkills.length ? `
            <div style="margin:6px 0 4px;font-size:9px;color:#c08020;">Extra (+2 VP each):</div>
            ${extraSkills.map(s => `<span class="skill-chip" style="border-color:#c08020">${s}</span>`).join('')}` : ''}
          </div>
          <div class="sheet-section-title" style="margin-top:12px;">Carry Capacity</div>
          <div style="font-size:11px;color:var(--text-muted);">
            Max weight: ${((creatorState.attrs.strength || 3) + (creatorState.attrs.vitality || 4)) * 2} 
            <em>(STR + VIT × 2)</em>
          </div>
          ${cls.isCaster ? `<div class="sheet-section-title" style="margin-top:12px;">Mana</div>
          <div style="font-size:11px;color:var(--text-muted);">Starting mana: ${cls.startMana || 6}</div>` : ''}
        </div>
      </div>
      <div class="sheet-section-title">Attributes</div>
      <div class="attr-table" style="margin-bottom:0;">${attrRows}</div>

}

// ─── Creator navigation ────────────────────────────────────────
function creatorNext() {
  // Validation
  if (creatorStep === 0 && !creatorState.name.trim()) {
    alert('Please enter a name for your hero.'); return;
  }
  if (creatorStep === 1 && !creatorState.raceId) {
    alert('Please select a race.'); return;
  }
  if (creatorStep === 2 && !creatorState.classId) {
    alert('Please select a class.'); return;
  }

  if (creatorStep === CREATOR_STEPS.length - 1) {
    finaliseHero(); return;
  }
  creatorStep++;
  renderCreatorStep();
}

function creatorPrev() {
  if (creatorStep > 0) { creatorStep--; renderCreatorStep(); }
}

function finaliseHero() {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);

  // ── VP calculation (rulebook p.80) ────────────────────────────
  // Base VP = 10 (includes all racial skills + class starting skill — all FREE)
  // Each additional skill manually chosen at creation = +2 VP
  // Each spell chosen at creation = +2 VP
  const extraSkills   = creatorState.skills || [];          // manually chosen (beyond race+class freebies)
  const startingSpells = cls.isCaster ? (creatorState.spells || []) : [];
  const startingVP = 10 + (extraSkills.length * 2) + (startingSpells.length * 2);

  // Build full skill list: racial + class starting + manually chosen extras
  const classSkill = cls.startingSkill ? [cls.startingSkill] : [];
  const allSkills  = [...race.startingSkills, ...classSkill, ...extraSkills];

  const hero = {
    id: 'hero_' + Date.now(),
    name: creatorState.name.trim(),
    portrait: creatorState.portrait,
    portraitUrl: creatorState.portraitUrl || null,
    portraitCustom: creatorState.portraitCustom || null,
    raceId: creatorState.raceId,
    classId: creatorState.classId,
    alignment: race.alignment,
    vp: startingVP,
    xp: 0,        // unspent accumulated XP
    xpSpent: 0,   // XP already invested in improvements
    coins: 0,
    // Base attributes: racial starting values + dev point spends + XP upgrades
    // These only change through character development, never equipment
    attrs: { ...creatorState.attrs, dexterity: 0, perception: 0 },
    // Equipped item IDs — used to calculate currentAttrs on the fly
    equippedItems: [],   // item IDs currently equipped (hands/body slots)
    weightCurrent: 0,
    // Quest-state (reset per quest)
    currentVitality: creatorState.attrs.vitality,
    // Spells known (spellcasters only). Each +2 mana, +2 VP.
    knownSpells: cls.isCaster ? (creatorState.spells || []) : [],
    currentMana: cls.isCaster
      ? Math.min((creatorState.spells||[]).length * 2 || cls.startMana || 6,
                 (creatorState.attrs.intelligence || 3) * 3)
      : 0,
    fortune: race.fortune,       // current max (can grow +2 above fortuneBase)
    fortuneBase: race.fortune,   // racial base, for reference
    currentFortune: race.fortune,
    skills: allSkills,
    equipment: { hands: [], body: [], backpack: [] },
    notes: ''
  };

  heroes.push(hero);
  save();
  closeCreator();
  renderRoster();
}

function openDetail(id) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  // Migrate old heroes
  if (h.attrs.dexterity == null) h.attrs.dexterity = 0;
  if (h.attrs.perception == null) h.attrs.perception = 0;
  if (h.fortuneBase == null) h.fortuneBase = h.fortune;
  if (!h.equippedItems) h.equippedItems = [];
  if (!h.knownSpells) h.knownSpells = [];
  if (h.weightCurrent == null) h.weightCurrent = 0;
  if (h.xpSpent == null) h.xpSpent = 0;

  const race = RACE_DB.find(r => r.id === h.raceId) || {};
  const cls  = CLASS_DB.find(c => c.id === h.classId) || {};

  // Calculate current attrs (base + equipment + skill modifiers)
  const cur = calcCurrentAttrs(h.attrs, h.equippedItems, h.skills || []);

  // Attribute rows: base | current (highlighted if different)
  const mainAttrs = ['movement','combatSkill','strength','shootingSkill','agility',
                     'intelligence','mana','courage','naturalArmor','vitality',
                     'dexterity','perception'];

  // editMode is stored on the modal — a boolean toggled by the user
  const isEdit = !!window._detailEditMode;

  function attrRow(key, label, icon, note) {
    const base    = h.attrs[key] ?? 0;
    const current = cur[key] ?? base;
    const diff    = current - base;
    const isSkillOnly = (key === 'dexterity' || key === 'perception');
    const isFixed     = (key === 'naturalArmor');
    const raceAt      = race.attrs?.[key];
    const maxVal      = raceAt ? raceAt.max : null;

    // XP upgrade button (only for dev-point attributes, not fixed or skill-only)
    let upgradeBtn = '';
    if (!isFixed && !isSkillOnly && raceAt) {
      let dc = raceAt.dc;
      if (cls.bonusAttr === key && base === raceAt.min) dc = Math.max(1, dc - 1);
      const xpCost  = dc * 3;
      const devPtsAvailNow = Math.floor(h.xp / 3);
      const canUp   = devPtsAvailNow >= dc && base < raceAt.max;
      upgradeBtn = `<button class="attr-upgrade-btn ${canUp ? 'can-upgrade' : ''}"
        ${canUp ? `onclick="spendXpOnAttr('${h.id}','${key}',${dc});openDetail('${h.id}')"` : 'disabled'}
        title="${canUp ? `Spend ${xpCost} XP (+2 VP)` : (base >= raceAt.max ? 'At maximum' : `Need ${xpCost} XP`)}">+</button>`;
    }

    // Edit mode: show input instead of static value
    let baseHTML;
    if (isEdit && !isFixed && !isSkillOnly) {
      baseHTML = `<div class="attr-base">
        <input class="attr-edit-input" type="number" min="0" max="${maxVal||20}" value="${base}"
          onchange="editAttrDirect('${h.id}','${key}',this.value)" style="width:36px;">
        ${maxVal != null ? `<small>max ${maxVal}</small>` : ''}
      </div>`;
    } else {
      baseHTML = `<div class="attr-base">
        ${base}${maxVal != null ? `<small>max ${maxVal}</small>` : (isFixed ? `<small>fixed</small>` : isSkillOnly ? `<small>skill</small>` : '')}
      </div>`;
    }

    // NOW column
    let nowHTML;
    if (isSkillOnly) {
      nowHTML = `<div class="attr-now dash" title="Only modified by skills">—</div>`;
    } else if (diff > 0) {
      nowHTML = `<div class="attr-now up" title="Equipment adds +${diff}">${current}</div>`;
    } else if (diff < 0) {
      nowHTML = `<div class="attr-now down" title="Equipment reduces by ${Math.abs(diff)}">${current}</div>`;
    } else {
      nowHTML = `<div class="attr-now dash">—</div>`;
    }

    return `<div class="attr-sheet-row" title="${note||''}">
      <span class="attr-sheet-name">${icon} ${label}</span>
      ${baseHTML}
      ${nowHTML}
      ${upgradeBtn}
    </div>`;
  }

  // Total armor row — always show base (natural) and current (natural + equipment)
  const armorEqBonus = (cur.totalArmor||0) - (h.attrs.naturalArmor||0);
  const totalArmorRow = `<div class="attr-sheet-row" style="background:rgba(106,74,32,.08)">
    <span class="attr-sheet-name">🛡 Total Armor</span>
    <div class="attr-base">${h.attrs.naturalArmor||0}<small>natural</small></div>
    <div class="attr-now ${armorEqBonus > 0 ? 'up' : 'dash'}" title="${armorEqBonus > 0 ? `+${armorEqBonus} from equipment` : 'no equipment bonus'}">
      ${armorEqBonus > 0 ? cur.totalArmor : '—'}
    </div>
  </div>`;

  const attrRows = [
    attrRow('movement','Movement','🥾','squares per turn'),
    attrRow('combatSkill','Combat Skill','⚔','melee attacks'),
    attrRow('strength','Strength','💪','damage & carry'),
    attrRow('shootingSkill','Shooting Skill','🎯','ranged attacks'),
    attrRow('agility','Agility','🌬','dodge & jump'),
    attrRow('intelligence','Intelligence','🧠','spells & traps'),
    h.attrs.mana != null ? attrRow('mana','Mana','✨','spell power') : '',
    attrRow('courage','Courage','🚩','resist fear'),
    attrRow('naturalArmor','Natural Armor','🛡','fixed — skin toughness'),
    attrRow('vitality','Vitality','❤','hit points'),
    attrRow('dexterity','Dexterity','🖐','traps & locks'),
    attrRow('perception','Perception','👁','detect & initiative'),

  // Fortune pips — show fortuneBase and current max (can be raised +2)
  const maxFortune = h.fortune;
  const fortunePips = Array.from({length: maxFortune}, (_,i) =>
    `<div class="fortune-pip ${i >= h.currentFortune ? 'spent' : ''}"

  const modal = document.getElementById('detail-modal');

        </div>

          VP: ${isEdit

        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">

          ${cls.cardSiteId ? `<button class="btn-secondary" style="font-size:8px;padding:3px 8px;"

function closeDetail() {
  window._detailEditMode = false;
  document.getElementById('detail-overlay').classList.remove('open');

}

// Direct VP edit — used in manual edit mode
function editVPDirect(heroId, rawVal) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  const val = parseInt(rawVal, 10);
  if (isNaN(val) || val < 0) return;
  h.vp = val;
  save();
  renderPartyView();
  // Update VP badge in sheet without full re-render
  const badge = document.querySelector(`#detail-modal .creator-title`);
  // Party VP banner
  const partyBanner = document.getElementById('party-vp-total');
  if (partyBanner) partyBanner.textContent = calcPartyVP();
}
function editAttrDirect(heroId, key, rawVal) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  const val = parseInt(rawVal, 10);
  if (isNaN(val) || val < 0) return;
  const oldVal = h.attrs[key] ?? 0;
  const delta  = val - oldVal;
  h.attrs[key] = val;
  // Adjust VP: each +1 to an attribute = +2 VP (rulebook p.80)
  // In edit mode we trust the user knows what they're doing
  h.vp = Math.max(10, (h.vp || 10) + delta * 2);
  save();
  renderPartyView();
}

// ─── Hero mutations ────────────────────────────────────────────
function adjustHeroVal(id, key, delta) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const cls = CLASS_DB.find(c => c.id === h.classId);
  let max = key === 'currentVitality' ? h.attrs.vitality
          : key === 'currentMana'     ? (h.attrs.mana != null ? h.attrs.mana : (cls?.startMana || 6))
          : 999;
  h[key] = Math.max(0, Math.min(max, (h[key] || 0) + delta));
  save();
  const el = document.getElementById((key === 'currentVitality' ? 'qv-' : 'qm-') + id);
  if (el) el.textContent = h[key];
}

function toggleFortune(id, idx) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  h.currentFortune = idx < h.currentFortune ? idx : idx + 1;
  save();
  openDetail(id);
}

function updateField(id, key, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h[key] = parseFloat(val) || 0; save(); }
}

function updateXPSpent(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.xpSpent = parseInt(val) || 0; save(); openDetail(id); }
}

function raiseFortune(id, delta) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const newMax = h.fortune + delta;
  const cap = (h.fortuneBase || h.fortune) + 2;
  if (newMax < (h.fortuneBase || h.fortune) || newMax > cap) return;
  h.fortune = newMax;
  if (h.currentFortune > newMax) h.currentFortune = newMax;
  h.vp += delta * 2; // fortune increase costs XP → +2 VP per raise
  save();
  openDetail(id);
}

function updateCoins(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.coins = parseInt(val) || 0; save(); }
}

function updateXP(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.xp = parseInt(val) || 0; save(); openDetail(id); }
}

function updateNotes(id, val) {
  const h = heroes.find(h => h.id === id);
  if (h) { h.notes = val; save(); }
}

function restHero(id) {
  const h = heroes.find(h => h.id === id);
  if (!h) return;
  const cls = CLASS_DB.find(c => c.id === h.classId);
  h.currentVitality = h.attrs.vitality;
  // Mana restored to full pool (spells×2, capped at INT×3)
  if (cls?.isCaster) {
    const intVal = h.attrs.intelligence || 3;
    h.currentMana = Math.min((h.knownSpells||[]).length * 2 || cls.startMana || 6, intVal * 3);
  } else {
    h.currentMana = 0;
  }
  h.currentFortune = h.fortune;
  save();
  renderRoster();
}

function deleteHero(id) {
  heroes = heroes.filter(h => h.id !== id);
  save();
  renderRoster();
}

function renderDunCard(cfg) {
  const base = 'https://squidboy30.github.io/DUN-Generator/src/cards/';
  const imgUrl = cfg.imgPath ? base + cfg.imgPath : null;
  const safeTitle = (cfg.title||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');

  if (imgUrl) {
    return `<div class="dun-card-img-wrap" onclick="showCardLightbox('${imgUrl}','${safeTitle}')" title="Click to enlarge">
      <img src="${imgUrl}" alt="${cfg.title}" loading="lazy"
        onerror="this.parentElement.innerHTML=\`<div class='dun-card-fallback'>${cfg.title}</div>\`">
    </div>`;
  }

  const typeLabel = {
    combat:'Combat Skill', exploration:'Exploration', scholarly:'Scholarly',
    nature:'Nature', spell:'Magic Spell', item:'Equipment', armor:'Armor & Shield'
  }[cfg.type] || cfg.type;
  return `<div class="dun-card card-${cfg.type}" onclick="showCardLightbox(null,'${safeTitle}','${(cfg.desc||'').replace(/'/g,"\\'")}')">
    <div class="dun-card-header">
      <div class="dun-card-type">${typeLabel}</div>
      <div class="dun-card-title">${cfg.title}</div>
    </div>
    <div class="dun-card-body">${cfg.desc || ''}</div>
  </div>`;
}

// ── Card Lightbox ─────────────────────────────────────────────────
function showCardLightbox(imgUrl, title, desc) {
  let el = document.getElementById('card-lightbox');
  if (!el) {
    el = document.createElement('div');
    el.id = 'card-lightbox';
    el.className = 'card-lightbox';
    el.onclick = () => el.classList.remove('open');
    document.body.appendChild(el);
  }
  if (imgUrl) {
    el.innerHTML = `<div class="card-lightbox-inner" onclick="event.stopPropagation()">
      <button class="card-lightbox-close" onclick="document.getElementById('card-lightbox').classList.remove('open')">✕</button>
      <img src="${imgUrl}" alt="${title}" style="max-width:100%;max-height:90vh;display:block;">
    </div>`;
  } else {
    el.innerHTML = `<div class="card-lightbox-inner" style="background:var(--bg-panel);padding:24px;max-width:400px;" onclick="event.stopPropagation()">
      <button class="card-lightbox-close" onclick="document.getElementById('card-lightbox').classList.remove('open')">✕</button>
      <div style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold-bright);margin-bottom:12px;">${title}</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6;">${desc||''}</div>
    </div>`;
  }
  el.classList.add('open');
}

};

function renderCardsPanel(h) {
  const sections = [];

  // ── SKILLS ──────────────────────────────────────────────────
  if (h.skills && h.skills.length) {
    const skillCards = h.skills.map(sName => {
      const sk = SKILL_DB.find(s => s.name === sName);
      return renderDunCard({
        title: sName,
        type: sk?.type || 'combat',
        imgPath: sk ? `skills/${sk.id}.jpg` : null,
        desc: SKILL_DESC[sName] || sName
      });
    }).join('');
    sections.push(`<div class="cards-panel-section">
      <div class="cards-panel-title">Skills</div>
      <div class="cards-row">${skillCards}</div>
    </div>`);
  }

  // ── SPELLS ──────────────────────────────────────────────────
  if (h.knownSpells && h.knownSpells.length) {
    const spellCards = h.knownSpells.map(spName => {
      const sp = SPELL_DB.find(s => s.name === spName);
      return renderDunCard({
        title: spName,
        type: 'spell',
        imgPath: sp ? `spells/${sp.id}.jpg` : null,
        desc: SPELL_DESC[spName] || spName
      });
    }).join('');
    sections.push(`<div class="cards-panel-section">
      <div class="cards-panel-title">Spells</div>
      <div class="cards-row">${spellCards}</div>
    </div>`);
  }

  // ── EQUIPMENT ───────────────────────────────────────────────
  if (h.equippedItems && h.equippedItems.length) {
    const itemCards = h.equippedItems.map(itemId => {
      const item = ITEM_BY_ID[itemId];
      if (!item) return '';
      return renderDunCard({
        title: item.name,
        type: item.cat === 'armor' || item.cat === 'shield' ? 'armor' : 'item',
        imgPath: `items/${item.id}.jpg`,
        desc: item.name
      });
    }).join('');
    sections.push(`<div class="cards-panel-section">
      <div class="cards-panel-title">Equipment</div>
      <div class="cards-row">${itemCards}</div>
    </div>`);
  }

  if (!sections.length) {
    return `<div style="padding:16px;font-style:italic;color:var(--text-muted);font-size:11px;">No skills, spells or equipment to display.</div>`;
  }
  return sections.join('');
}

function renderHeroSkillChips(h) {
  if (!h.skills || !h.skills.length) return '<em style="font-size:10px;color:var(--text-muted)">No skills</em>';
  return h.skills.map(s =>
    `<span class="skill-chip" style="cursor:pointer" onclick="removeHeroSkill('${h.id}','${s.replace(/'/g,"\\'")}')">
      ${s} <span style="color:#8a2020;font-size:9px">✕</span>
    </span>`
  ).join('');
}

function removeHeroSkill(heroId, skillName) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;

  // Determine if this skill was free (race or class starting skill — no VP cost)
  const race = RACE_DB.find(r => r.id === h.raceId) || {};
  const cls  = CLASS_DB.find(c => c.id === h.classId) || {};
  const freeSkills = [...(race.startingSkills || []), cls.startingSkill].filter(Boolean);
  const isFree = freeSkills.some(f => f.toLowerCase() === skillName.toLowerCase());

  h.skills = h.skills.filter(s => s !== skillName);

  // Subtract VP only for non-free skills (rulebook p.80: each extra skill = +2VP)
  if (!isFree) {
    h.vp = Math.max(10, (h.vp || 10) - 2);
  }

  save();
  // Refresh chips and VP badge
  const el = document.getElementById('hero-skills-' + heroId);
  if (el) el.innerHTML = renderHeroSkillChips(h);
  const partyBanner = document.getElementById('party-vp-total');
  if (partyBanner) partyBanner.textContent = calcPartyVP();
  renderPartyView();
}

function addHeroSkillFromBrowser(heroId, skillName, cardEl) {
  addHeroSkill(heroId, skillName);
  // Swap the Add button for Owned label
  if (cardEl) {
    cardEl.classList.add('has-skill');
    const btn = cardEl.querySelector('.skill-browser-add-btn');
    if (btn) {
      const owned = document.createElement('div');
      owned.className = 'skill-browser-owned';
      owned.textContent = '✓ Owned';
      btn.replaceWith(owned);
    }
  }
}

function addHeroSkill(heroId, skillName) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (!h.skills) h.skills = [];
  if (!h.skills.includes(skillName)) {
    h.skills.push(skillName);
    h.vp += 2; // each skill learned = +2 VP (rulebook p.80)
  }
  save();
  // Refresh skill chips in sheet and VP badge on roster card
  const el = document.getElementById('hero-skills-' + heroId);
  if (el) el.innerHTML = renderHeroSkillChips(h);
  // Refresh the full party view so VP badges update
  renderPartyView();
}

function renderSpellSection(h, race, cls) {
  if (!h.knownSpells) h.knownSpells = [];
  const intVal   = h.attrs.intelligence || 3;
  const manaPool = calcManaPool(intVal, h.knownSpells.length);
  const manaMax  = intVal * 3;
  const level    = sorceryLevel(h.vp);
  const levelColor = level==='Archmage'?'#c0a020':level==='Journeyman'?'#80a0c0':'#c8a060';

  // Group known spells by lore
  const byLore = {};
  h.knownSpells.forEach(name => {
    const sp = SPELL_DB.find(s => s.name === name);
    if (sp) (byLore[sp.lore]=byLore[sp.lore]||[]).push(sp);
    else     (byLore['Unknown']=byLore['Unknown']||[]).push({name,lore:'Unknown',manaCost:1});
  });

  const spellChips = Object.entries(byLore).map(([lore, spells]) => {
    const color = LORE_COLORS[lore] || '#888';
    return `<div style="margin-bottom:6px;">
      <span style="font-size:8px;color:${color};font-family:'Cinzel',serif;letter-spacing:1px;">${lore}</span><br>
      ${spells.map(s => {
        const safeName = s.name.replace(/'/g,"\\'");
        return `<span class="skill-chip spell-chip" style="cursor:pointer;"
          onclick="removeHeroSpell('${h.id}','${safeName}')">
          ${s.name} <span style="color:#c090ff;font-size:8px;">${s.manaCost > 1 ? '★' : ''}✨</span>
          <span style="color:#c06060;font-size:9px;margin-left:4px"> ✕</span>
        </span>`;
      }).join('')}
    </div>`;
  }).join('') || '<em style="font-size:10px;color:var(--text-muted)">No spells known</em>';

  return `
    <div class="sheet-section-title">
      Magic
      <span style="font-size:8px;color:${levelColor};margin-left:8px;">${level}</span>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:8px;font-size:10px;color:var(--text-muted);">
      <span>Mana pool: <strong style="color:var(--gold-light)">${manaPool}</strong>/${manaMax}</span>
      <span>Spells known: <strong style="color:var(--gold-light)">${h.knownSpells.length}</strong></span>
      <span>Each spell: +2 mana, +2 VP</span>
    </div>
    <div id="hero-spells-${h.id}">${spellChips}</div>
    <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
      <button class="btn-secondary" style="font-size:9px;padding:4px 10px;"
        onclick="toggleSpellPicker('${h.id}')">+ Learn Spell</button>
      <span style="font-size:9px;color:var(--text-muted);font-style:italic;">
        Requires School of Magic visit + gold
      </span>
    </div>
    <div id="spell-picker-${h.id}" style="display:none;margin-top:8px;"></div>`;
}

function removeHeroSpell(heroId, spellName) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  h.knownSpells = (h.knownSpells||[]).filter(s => s !== spellName);
  // Remove +2 mana and +2 VP
  h.vp = Math.max(10, (h.vp||10) - 2);
  // Recalculate current mana
  const intVal = h.attrs.intelligence || 3;
  h.currentMana = Math.min(h.knownSpells.length * 2, intVal * 3);
  save();
  openDetail(heroId);
}

function toggleSpellPicker(heroId) {
  const picker = document.getElementById('spell-picker-' + heroId);
  if (!picker) return;
  if (picker.style.display !== 'none') { picker.style.display='none'; return; }

  const h = heroes.find(h => h.id === heroId);
  const race = RACE_DB.find(r => r.id === h?.raceId);
  const cls  = CLASS_DB.find(c => c.id === h?.classId);
  const known = new Set(h?.knownSpells || []);
  const available = getAvailableSpells(h?.classId, race?.name)
    .filter(s => !known.has(s.name));

  const byLore = {};
  available.forEach(s => { (byLore[s.lore]=byLore[s.lore]||[]).push(s); });

  const sections = Object.entries(byLore).map(([lore, spells]) => {
    const color = LORE_COLORS[lore] || '#888';
    const chips = spells.map(s => {
      const safeName = s.name.replace(/'/g,"\\'");
      const manaTag = s.manaCost > 1 ? ' ★' : '';
      return `<span class="skill-chip" style="cursor:pointer;border-color:${color};margin:2px;"
        onclick="learnSpell('${heroId}','${safeName}')">
        + ${s.name}${manaTag}
        <span style="font-size:8px;color:var(--text-muted);"> ${s.cost}gp</span>
      </span>`;
    }).join('');
    return `<div style="margin-bottom:8px;">
      <div style="font-size:8px;color:${color};font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:4px;">${lore}</div>
      ${chips}
    </div>`;
  }).join('');

  picker.innerHTML = `<div style="background:var(--bg-dark);border:1px solid var(--panel-border);
    padding:10px;max-height:240px;overflow-y:auto;">
    <div style="font-size:9px;color:var(--text-muted);margin-bottom:8px;font-style:italic;">
      ★ = Superior spell (2 mana, cannot combine with move).
      Each spell learned: +2 mana pool, +2 VP.
    </div>
    ${sections || '<em style="color:var(--text-muted);font-size:10px;">All available spells already learned.</em>'}
  </div>`;
  picker.style.display = 'block';
}

function learnSpell(heroId, spellName) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (!h.knownSpells) h.knownSpells = [];
  if (!h.knownSpells.includes(spellName)) {
    h.knownSpells.push(spellName);
    h.vp = (h.vp||10) + 2;           // +2 VP per spell learned (p.80)
    const intVal = h.attrs.intelligence || 3;
    h.currentMana = Math.min(h.knownSpells.length * 2, intVal * 3);
  }
  save();
  openDetail(heroId);
  // Update party VP banner
  const partyBanner = document.querySelector('.party-vp-banner span');
  if (partyBanner) partyBanner.textContent = calcPartyVP();
}

function renderEquipSlots(h) {
  if (!h.equippedItems || !h.equippedItems.length) {
    return '<em style="font-size:10px;color:var(--text-muted)">No equipment</em>';
  }
  return h.equippedItems.map(itemId => {
    const item = ITEM_BY_ID[itemId];
    if (!item) return '';
    const hasMods = item.attrMods && Object.keys(item.attrMods).length > 0;
    const modStr = hasMods
      ? Object.entries(item.attrMods).map(([a,v]) => `${v>0?'+':''}${v} ${a}`).join(', ')
      : '';
    const armorStr = item.armorBonus ? `+${item.armorBonus} armor` : '';
    const effects = [modStr, armorStr].filter(Boolean).join(' · ');
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(106,74,32,.2);">
      <span class="skill-chip" style="margin:0;flex:1;cursor:default;">
        ${item.name}
        ${effects ? `<span style="font-size:8px;color:var(--text-muted);margin-left:4px;">(${effects})</span>` : ''}
      </span>
      <span style="font-size:9px;color:var(--text-muted);">${CAT_LABELS[item.cat]||item.cat}</span>
      <span style="cursor:pointer;color:#8a2020;font-size:12px;"
        onclick="removeEquipItem('${h.id}',${itemId})">✕</span>
    </div>`;
  }).join('');
}

function removeEquipItem(heroId, itemId) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  h.equippedItems = (h.equippedItems||[]).filter(id => id !== itemId);
  // Remove from old equipment slots too for compatibility
  h.equipment.hands = (h.equipment.hands||[]).filter(n => {
    const item = ITEM_BY_ID[itemId]; return n !== item?.name;
  });
  h.equipment.body = (h.equipment.body||[]).filter(n => {
    const item = ITEM_BY_ID[itemId]; return n !== item?.name;
  });
  save();
  // Refresh equip display and attrs
  const el = document.getElementById('hero-equip-' + heroId);
  if (el) el.innerHTML = renderEquipSlots(h);
  openDetail(heroId); // full re-render to update current attrs
}

    const vpNote = item.vp ? ` · +${item.vp}VP` : '';
    const modStr = item.attrMods ? ' ' + Object.entries(item.attrMods).map(([a,v])=>`${v>0?'+':''}${v} ${a.slice(0,3)}`).join(' ') : '';
    const armorStr = item.armorBonus ? ` +${item.armorBonus} armor` : '';
    return `<div class="skill-browser-card ${owned ? 'has-skill' : ''}"
      onclick="${owned ? `showCardLightbox('${imgUrl}','${item.name}')` : `addEquipItemFromBrowser('${heroId}',${item.id},this)`}"
      title="${owned ? 'Already equipped — click to enlarge' : `${item.cost}gp · ${item.weight}w${vpNote}${modStr}${armorStr}\nClick to add`}">
      <img src="${imgUrl}" alt="${item.name}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="skill-browser-fallback" style="display:none">
        <div>
          <div style="font-size:10px;font-weight:bold;margin-bottom:4px;">${item.name}</div>
          <div style="font-size:9px;color:var(--text-dim)">${item.cost}gp · ${item.weight}w${vpNote}</div>
          ${modStr ? `<div style="font-size:9px;color:#80c080">${modStr}</div>` : ''}
        </div>
      </div>
      ${owned
        ? '<div class="skill-browser-owned">✓ Equipped</div>'
        : `<div class="skill-browser-add">${item.cost}gp · ${item.weight}w${vpNote}</div>`}
    </div>`;
  }).join('');

  const modal = document.getElementById('item-browser-modal');
  modal.innerHTML = `
    <div class="creator-header">
      <div class="creator-title">Browse Items — ${h.name}</div>
      <button class="creator-close"
        onclick="document.getElementById('item-browser-overlay').classList.remove('open')">✕</button>
    </div>
    <div style="display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--border-dim);flex-wrap:wrap;">
      ${tabs}
    </div>
    <div style="padding:6px 16px;font-size:9px;color:var(--text-muted);font-style:italic;">
      Click a card to add it. VP-granting items shown in gold. Click already-equipped cards to enlarge.
    </div>
    <div class="creator-body" style="display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;">
      ${cards || '<div style="color:var(--text-muted);font-style:italic;font-size:11px;">No items in this category.</div>'}
    </div>`;
}

function addEquipItemFromBrowser(heroId, itemId, cardEl) {
  addEquipItem(heroId, itemId);
  // Mark card as owned visually without closing
  if (cardEl) {
    cardEl.classList.add('has-skill');
    const addLabel = cardEl.querySelector('.skill-browser-add');
    if (addLabel) { addLabel.className = 'skill-browser-owned'; addLabel.textContent = '✓ Equipped'; }
    // Switch onclick to lightbox only
    const base = 'https://squidboy30.github.io/DUN-Generator/src/cards/';
    const item = ITEM_BY_ID[itemId];
    cardEl.onclick = () => showCardLightbox(`${base}items/${itemId}.jpg`, item?.name||'');
    cardEl.title = 'Already equipped — click to enlarge';
  }
}

function addEquipItem(heroId, itemId) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (!h.equippedItems) h.equippedItems = [];
  if (!h.equippedItems.includes(itemId)) {
    h.equippedItems.push(itemId);
    // Update carry weight
    const item = ITEM_BY_ID[itemId];
    if (item) h.weightCurrent = (h.weightCurrent||0) + item.weight;
  }
  save();
  openDetail(heroId); // full re-render updates current attrs display
}

// ═══════════════════════════════════════════════════════════════
function renderRoster() {
  // Called from creator finalise / mutations — refresh whichever view is active
  const activeView = document.querySelector('.view.active');
  if (!activeView) return;
  const id = activeView.id;
  if (id === 'view-party-view') renderPartyView();
  else if (id === 'view-all-heroes') renderAllHeroes();
  else if (id === 'view-xp') renderXpView();
}

load();
if (activePartyId) {
  const tabBtn = document.getElementById('tab-party-view');
  if (tabBtn) tabBtn.style.display = '';
}
renderPartiesList();
</script>
