<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Universalis — Party Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=MedievalSharp&display=swap');

:root {
  /* Core palette — grim dark */
  --bg-void:    #0a0805;
  --bg-dark:    #111009;
  --bg-panel:   #1a1208;
  --bg-raised:  #221a0c;
  --border-dim: #4a3a18;
  --border-mid: #6a4e22;
  --border-gold:#9a7228;
  --gold-bright:#e8b830;
  --gold-dim:   #9a7228;
  --text-bone:  #f0e4c8;
  --text-muted: #b89060;
  --text-dim:   #7a6040;
  --blood-red:  #8a1a1a;
  --rust:       #6a3010;
  --parchment:  #d8c8a0;
  --ink:        #1a1008;

  /* Attribute icon colours */
  --col-move:   #70a8c0;
  --col-cs:     #e05030;
  --col-str:    #c06840;
  --col-shoot:  #70c070;
  --col-agl:    #90c8d8;
  --col-int:    #9878e0;
  --col-mana:   #5888e0;
  --col-cour:   #e0a030;
  --col-armor:  #88b888;
  --col-vit:    #e04040;
  --col-dex:    #c88840;
  --col-perc:   #c0c050;
  --col-fort:   #e0c030;

  /* Class colours */
  --fighter:    #c04020;
  --explorer:   #206840;
  --caster:     #5030a0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg-void);
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--text-bone);
  min-height: 100vh;
}

/* ─────────────────────────────────────────────── HEADER */
.app-header {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-gold);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 13px;
  color: var(--gold-bright);
  letter-spacing: 3px;
  white-space: nowrap;
}
.app-logo span { color: var(--text-muted); font-size: 9px; display: block; letter-spacing: 4px; }

.nav-tabs { display: flex; gap: 2px; margin-left: auto; }
.nav-tab {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.nav-tab:hover { border-color: var(--border-mid); color: var(--text-bone); }
.nav-tab.active { background: var(--border-gold); color: var(--ink); border-color: var(--gold-bright); }

/* ─────────────────────────────────────────────── VIEWS */
.view { display: none; padding: 20px; }
.view.active { display: block; }

/* ─────────────────────────────────────────────── PARTY LIST VIEW */
.parties-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.section-heading {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.btn-grim {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--border-gold);
  color: var(--gold-bright);
  cursor: pointer;
  transition: all .15s;
}
.btn-grim:hover { background: rgba(138,98,24,.2); }
.btn-grim.danger { border-color: var(--blood-red); color: #d06060; }
.btn-grim.danger:hover { background: rgba(138,26,26,.15); }

.parties-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}
.party-item {
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .15s;
  position: relative;
}
.party-item:hover { border-color: var(--border-gold); }
.party-item.active-party { border-color: var(--gold-bright); }
.party-item-name {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  color: var(--gold-bright);
  margin-bottom: 6px;
}
.party-item-meta {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}
.party-item-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

/* ─────────────────────────────────────────────── PARTY VIEW */
.party-view-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-dim);
}
.party-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px;
  color: var(--gold-bright);
}
.party-vp-badge {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  padding: 3px 10px;
  border: 1px solid var(--border-dim);
}
.party-vp-badge strong { color: var(--gold-bright); font-size: 13px; }

/* ─────────────────────────────────────────────── HERO STRIP */
/* Horizontal scroll strip of DUN-style cards */
.hero-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 4px;
}
.hero-strip::-webkit-scrollbar { height: 4px; }
.hero-strip::-webkit-scrollbar-track { background: transparent; }
.hero-strip::-webkit-scrollbar-thumb { background: var(--border-dim); }

/* ADD HERO slot */
.hero-add-slot {
  min-width: 150px;
  width: 150px;
  flex-shrink: 0;
  border: 1px dashed var(--border-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  min-height: 340px;
  transition: border-color .15s;
  flex-direction: column;
  gap: 8px;
  color: var(--text-dim);
}
.hero-add-slot:hover { border-color: var(--border-gold); color: var(--text-muted); }
.hero-add-slot svg { opacity: .4; }
.hero-add-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════
   DUN HERO CARD — faithful recreation of physical sheet
   ═══════════════════════════════════════════════════════ */

.dun-hero-card {
  width: 220px; min-width: 220px;
  flex-shrink: 0; position: relative; user-select: none;
  font-family: 'Cinzel', serif;
  background: #120d06;
  border: 3px solid #6a4a18;
  box-shadow: inset 0 0 0 1px #9a7228, 2px 2px 10px rgba(0,0,0,.9);
}
.dun-hero-card:hover { border-color: #9a7228; }
.dun-hero-card.selected { border-color: var(--gold-bright); box-shadow: inset 0 0 0 1px var(--gold-bright), 0 0 14px rgba(232,184,48,.35); }

/* VP badge */
.card-vp-badge {
  position: absolute; top: 5px; right: 5px;
  background: #0a0704;
  border: 1.5px solid #8a6220;
  font-family: 'Cinzel', serif;
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  color: #c0a030; padding: 2px 5px 1px; line-height: 1.3;
  text-align: center; z-index: 2;
}
.card-vp-badge span { display: block; font-size: 16px; font-weight: 700; color: var(--gold-bright); line-height: 1; }

/* Parchment name scroll */
.card-scroll-header {
  background: linear-gradient(180deg, #f5ead0 0%, #e8d4a8 55%, #d4be88 100%);
  border-bottom: 2px solid #5a3a10;
  padding: 5px 44px 4px 8px;
}
.card-name {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
  color: #1a0800; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-race-class {
  font-size: 10px; color: #4a2a10; font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Main 3-col body */
.card-body {
  display: grid; grid-template-columns: 50px 1fr 50px;
  background: #1e1508; border-bottom: 1px solid #5a3a10;
}
.card-stats-left, .card-stats-right {
  display: flex; flex-direction: column; gap: 2px; padding: 4px 2px;
  background: linear-gradient(180deg, #181008 0%, #221a0c 100%);
}

/* Stat row: value-box left-of-icon (left col) or icon-then-box (right col) */
.stat-row { display: flex; align-items: center; gap: 2px; }
.stat-row.left  { flex-direction: row; }
.stat-row.right { flex-direction: row-reverse; }

/* White parchment value box */
.stat-box {
  width: 24px; height: 24px; flex-shrink: 0;
  background: #f0e8d0; border: 1.5px solid #8a6220;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
  color: #1a0800; line-height: 1;
}
.stat-box.mod-up   { background: #b8f0b8; color: #0a3010; }
.stat-box.mod-down { background: #f0b8b8; color: #3a0a0a; }

/* DUN icon cell */
.stat-dun-icon {
  width: 24px; height: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.stat-dun-icon svg { width: 20px; height: 20px; }

/* Teal framed portrait */
.card-portrait-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  background: #0a0704;
  border-left: 2px solid #5a3a10; border-right: 2px solid #5a3a10;
  box-shadow: inset 0 0 8px rgba(0,0,0,.5), inset 0 0 0 2px #8a6220;
  margin: 4px 0; min-height: 120px; height: 130px;
  overflow: hidden; position: relative; padding: 0;
}
.card-portrait-change {
  position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: rgba(0,0,0,.6); border: 1px solid #8a6220;
  color: #c8a030; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s; z-index: 3;
}
.card-portrait-cell:hover .card-portrait-change { opacity: 1; }
.card-portrait-emoji { font-size: 46px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.6)); }
.card-alignment-pip  { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(0,0,0,.4); }
.align-good    { background: #3a7a3a; }
.align-evil    { background: #7a1a1a; }
.align-neutral { background: #7a6818; }

/* Vitality bar */
.card-vit-bar { height: 4px; background: #0a0704; border-top: 1px solid #2a1808; }
.card-vit-fill { height: 100%; transition: width .3s; background: #8a1a1a; }
.card-vit-fill.healthy { background: #1a6a1a; }
.card-vit-fill.wounded { background: #7a5010; }

/* Bottom stat row: Armor | Dex | Perc | Fortune | Coins */
.card-bottom-row {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 2px; padding: 3px;
  background: linear-gradient(180deg, #181008 0%, #221a0c 100%);
  border-top: 1px solid #5a3a10; border-bottom: 1px solid #5a3a10;
}
.card-bottom-cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.card-bottom-box {
  width: 22px; height: 22px; flex-shrink: 0;
  background: #f0e8d0; border: 1.5px solid #8a6220;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
  color: #1a0800; line-height: 1;
}
.card-bottom-icon { width: 14px; height: 14px; }
.card-bottom-icon svg { width: 13px; height: 13px; }

/* Gold coins/weight bar */
.card-gold-bar {
  background: linear-gradient(180deg, #6a4a10 0%, #4a3008 100%);
  border-top: 2px solid #8a6220;
  padding: 3px 6px;
  display: flex; align-items: center; justify-content: space-between; gap: 4px;
}
.card-gold-bar-label {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; color: #e8c860; flex: 1; text-align: center;
}
.card-gold-val {
  background: #f0e8d0; border: 1px solid #8a6220;
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
  color: #1a0800; padding: 1px 5px; min-width: 24px; text-align: center;
}

/* Action buttons */
.card-actions {
  display: flex; gap: 1px; padding: 3px;
  background: #120d06; border-top: 1px solid #3a2008;
}
.card-btn {
  flex: 1; font-family: 'Cinzel', serif; font-size: 8px;
  letter-spacing: 1px; text-transform: uppercase; padding: 5px 2px;
  background: transparent; border: 1px solid #4a3010;
  color: #907848; cursor: pointer; transition: all .1s; text-align: center;
}
.card-btn:hover { border-color: #8a6020; color: #f0e8d0; background: rgba(138,96,32,.25); }
.card-btn.active { background: #6a4a10; color: #f0e8d0; border-color: var(--gold-bright); }
.card-btn.remove-btn { color: #6a2020; border-color: #3a1010; }
.card-btn.remove-btn:hover { border-color: var(--blood-red); color: #d06060; }

/* Companion cards */
.dun-hero-card.companion-card { width: 130px; min-width: 130px; border-width: 2px; border-color: #3a2808; }
.companion-label {
  font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 2px;
  text-transform: uppercase; color: #7a6030; padding: 3px 6px 0; display: block;
  background: #120d06;
}

/* Add-hero slot */
.hero-add-slot {
  min-width: 130px; width: 130px; flex-shrink: 0;
  border: 2px dashed #3a2808; display: flex; align-items: center; justify-content: center;
  cursor: pointer; min-height: 280px; transition: border-color .15s;
  flex-direction: column; gap: 8px; color: #4a3820; background: #0a0704;
}
.hero-add-slot:hover { border-color: #8a6020; color: #907848; }
.hero-add-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; }

/* ─────────────────────────────────────────────── CARDS EXPAND PANEL */
.cards-expand-panel {
  display: none;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  border-top: none;
  padding: 16px;
  margin-bottom: 8px;
}
.cards-expand-panel.open { display: block; }

.cards-section-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  margin-top: 14px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-dim);
}
.cards-section-title:first-child { margin-top: 0; }

.cards-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
/* Cards panel sections from renderCardsPanel */
.cards-panel-section { margin-bottom: 16px; }
.cards-panel-section:last-child { margin-bottom: 0; }
.cards-panel-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-bright);
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-dim);
}
.dun-card-img-wrap {
  display: inline-block;
  position: relative;
  cursor: pointer;
}
.dun-card-img-wrap:hover img { border-color: var(--border-gold); }
.dun-card-img-wrap img {
  width: 140px;
  height: auto;
  display: block;
  border: 1px solid var(--border-dim);
  transition: border-color .15s;
}
.dun-card-fallback {
  width: 140px;
  min-height: 100px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  padding: 8px;
  text-align: center;
}

/* ── Card Lightbox ─────────────────────────────────────────────── */
.card-lightbox {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.92);
  align-items: center; justify-content: center; cursor: pointer;
}
.card-lightbox.open { display: flex; }
.card-lightbox-inner {
  position: relative; cursor: default;
  max-width: 95vw; max-height: 95vh;
}
.card-lightbox-inner img { max-width: 100%; max-height: 90vh; display: block; }
.card-lightbox-close {
  position: absolute; top: -14px; right: -14px;
  width: 28px; height: 28px;
  background: var(--bg-dark); border: 1px solid var(--border-gold);
  color: var(--gold-bright); font-size: 14px; cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; z-index: 1;
}

/* ── Skill Browser ─────────────────────────────────────────────── */
.skill-browser-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 10px;
  cursor: pointer; letter-spacing: 1px; opacity: .6; transition: opacity .15s;
}
.skill-browser-tab:hover { opacity: .9; }
.skill-browser-tab.active { opacity: 1; }
.skill-browser-card {
  position: relative; width: 120px; flex-shrink: 0;
  cursor: pointer; border: 2px solid transparent;
  transition: border-color .15s, transform .1s;
}
.skill-browser-card img { width: 100%; display: block; }
.skill-browser-card:not(.has-skill):hover {
  border-color: var(--border-gold); transform: scale(1.04);
}
.skill-browser-card.has-skill { opacity: .45; cursor: default; }
.skill-browser-add, .skill-browser-owned {
  position: absolute; bottom: 0; left: 0; right: 0;
  font-size: 9px; text-align: center; padding: 3px 0;
  font-family: 'Cinzel', serif; letter-spacing: .5px;
}
.skill-browser-add { background: rgba(138,98,24,.88); color: var(--gold-bright); }
.skill-browser-owned { background: rgba(20,80,20,.88); color: #80d080; }
.skill-browser-add-btn {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(138,98,24,.9); color: var(--gold-bright);
  border: none; font-size: 9px; text-align: center; padding: 4px 0;
  font-family: 'Cinzel', serif; letter-spacing: .5px; cursor: pointer;
  transition: background .15s;
}
.skill-browser-add-btn:hover { background: rgba(168,118,44,1); }
.skill-browser-fallback {
  width: 100%; height: 160px; background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 10px; text-align: center; padding: 8px;
}
.dun-card {
  width: 140px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
}
.dun-card-header { padding: 6px 8px; border-bottom: 1px solid var(--border-dim); }
.dun-card-type { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
.dun-card-title { font-family: 'Cinzel', serif; font-size: 11px; color: var(--text-bone); margin-top: 2px; }
.dun-card-body { padding: 6px 8px; font-size: 9px; color: var(--text-muted); font-style: italic; line-height: 1.5; }

/* ─────────────────────────────────────────────── DETAIL OVERLAY (sheet) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 100;
  overflow-y: auto;
  padding: 20px;
}
.detail-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.detail-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  width: 100%;
  max-width: 860px;
  position: relative;
}
.creator-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border-dim);
}
.creator-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 14px;
  color: var(--gold-bright);
}
.creator-close {
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 12px;
}
.creator-close:hover { border-color: var(--blood-red); color: #d06060; }

/* Sheet layout */
.hero-sheet {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 500px;
}
.hero-sheet-left {
  padding: 16px;
  border-right: 1px solid var(--border-dim);
  background: var(--bg-raised);
}
.hero-sheet-right { padding: 16px; }

.hero-sheet-portrait-lg {
  width: 80px; height: 80px;
  background: var(--bg-void);
  border: 1px solid var(--border-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  margin-bottom: 8px;
}
.section-divider {
  border: none;
  border-top: 1px solid var(--border-dim);
  margin: 12px 0;
}
.sheet-section-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 14px;
}
.sheet-section-title:first-child { margin-top: 0; }

/* Attribute sheet grid */
.attr-sheet-grid {}
.attr-sheet-header {
  display: grid;
  grid-template-columns: 1fr 48px 48px;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 3px 4px;
  border-bottom: 1px solid var(--border-dim);
  margin-bottom: 2px;
}
.attr-sheet-row {
  display: grid;
  grid-template-columns: 1fr 48px 48px 28px;
  padding: 2px 4px;
  border-bottom: 1px solid rgba(58,42,16,.3);
  align-items: center;
}
.attr-sheet-row:hover { background: rgba(34,26,12,.5); }
.attr-sheet-name { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.attr-sheet-name svg { width: 11px; height: 11px; flex-shrink: 0; }
.attr-upgrade-btn {
  width: 22px; height: 22px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-dim);
  font-size: 14px; cursor: default;
  display: flex; align-items: center; justify-content: center;
}
.attr-upgrade-btn.can-upgrade {
  border-color: var(--border-gold); color: var(--gold-bright); cursor: pointer;
}
.attr-upgrade-btn.can-upgrade:hover { background: rgba(138,98,24,.2); }
.attr-upgrade-btn:disabled { opacity: .25; }
.attr-edit-input {
  width: 36px; padding: 1px 3px;
  background: rgba(200,168,32,.15);
  border: 1px solid var(--gold-bright);
  color: var(--text-bone);
  font-family: 'Cinzel', serif;
  font-size: 13px; text-align: center;
}
.attr-base, .attr-now {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.attr-base small { display: block; font-size: 7px; color: var(--text-dim); font-family: inherit; }
.attr-now.up   { color: #70c870; }
.attr-now.down { color: #c87070; }
.attr-now.dash { color: var(--text-dim); }

/* Quest controls */
.quest-controls { display: flex; flex-direction: column; gap: 6px; }
.quest-control-row { display: flex; align-items: center; gap: 8px; }
.quest-ctrl-label { font-size: 10px; color: var(--text-muted); width: 50px; }
.qty-btn {
  width: 22px; height: 22px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { border-color: var(--border-gold); color: var(--text-bone); }
.qty-btn:disabled { opacity: .3; cursor: default; }
.qty-display {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold-bright);
  min-width: 28px;
  text-align: center;
}

/* Fortune pips */
.fortune-pips { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
.fortune-pip {
  width: 12px; height: 12px;
  border: 1px solid var(--gold-dim);
  background: var(--gold-bright);
  cursor: pointer;
  transition: background .1s;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}
.fortune-pip.spent { background: var(--border-dim); border-color: var(--border-dim); }
.fortune-pip:hover { background: var(--gold-bright); }

/* XP section */
.xp-section { display: flex; flex-direction: column; gap: 6px; }
.xp-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); }
.xp-input {
  width: 60px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-bone);
  padding: 3px 6px;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  text-align: center;
}
.xp-hint { font-size: 9px; color: var(--text-dim); }
.coins-row { display: flex; align-items: center; gap: 6px; }
.coins-input {
  width: 70px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-bone);
  padding: 3px 6px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  text-align: center;
}

/* Skill chips */
.skill-chip {
  display: inline-block;
  font-size: 9px;
  font-family: 'Cinzel', serif;
  padding: 2px 8px;
  border: 1px solid var(--border-dim);
  background: var(--bg-dark);
  color: var(--text-muted);
  margin: 2px;
  letter-spacing: .5px;
}

/* Secondary buttons */
.btn-secondary {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--border-gold); color: var(--text-bone); }

/* ─────────────────────────────────────────────── CREATOR WIZARD */
.creator-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  overflow: hidden;
  padding: 20px;
  align-items: center;
  justify-content: center;
}
.creator-overlay.open { display: flex; }
.creator-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  width: 100%;
  max-width: 800px;
  height: 92vh;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.step-indicator {
  display: flex;
  gap: 2px;
  padding: 10px 16px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border-dim);
}
.step-dot {
  flex: 1;
  height: 3px;
  background: var(--border-dim);
  transition: background .2s;
}
.step-dot.done   { background: var(--gold-dim); }
.step-dot.active { background: var(--gold-bright); }
.creator-body { padding: 20px; min-height: 300px; overflow-y: auto; flex: 1; }
.creator-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding: 12px 16px;
  border-top: 1px solid var(--border-dim);
  background: var(--bg-raised);
}

/* Race/class cards in creator */
.race-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 6px; }
.race-img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}
.race-img-card {
  position: relative; cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s, transform .1s;
  background: var(--bg-raised);
}
.race-img-card img { width: 100%; display: block; }
.race-img-card:hover { border-color: var(--border-mid); transform: scale(1.03); }
.race-img-card.selected { border-color: var(--gold-bright); }
.race-img-card.not-recommended { opacity: .5; }
.race-img-card.not-recommended.selected { opacity: 1; }
.race-img-label {
  font-family: 'Cinzel', serif; font-size: 8px;
  text-align: center; padding: 3px 2px;
  color: var(--text-muted); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.race-img-card.selected .race-img-label { color: var(--gold-bright); }
.race-img-selected-badge {
  position: absolute; top: 3px; right: 3px;
  background: var(--gold-bright); color: #1a0800;
  font-size: 9px; font-weight: bold;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.race-img-dim-badge {
  position: absolute; top: 3px; left: 3px;
  background: rgba(180,60,30,.85); color: white;
  font-size: 9px; font-weight: bold;
  width: 14px; height: 14px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.race-img-fallback {
  width: 100%; min-height: 80px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 9px;
  color: var(--text-muted); text-align: center; padding: 6px;
  background: var(--bg-dark);
}
.race-card {
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  padding: 8px;
  cursor: pointer;
  transition: border-color .1s;
  text-align: center;
}
.race-card:hover { border-color: var(--border-mid); }
.race-card.selected { border-color: var(--gold-bright); background: rgba(138,98,24,.15); }
.race-name, .race-card-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-bone); }
.race-align { font-size: 10px; font-style: italic; color: var(--text-muted); margin-top: 2px; }

.class-group { margin-bottom: 14px; }
.class-group-header {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 4px 8px;
  margin-bottom: 4px;
}
.class-group-header.fighter  { color: var(--fighter); border-left: 2px solid var(--fighter); }
.class-group-header.explorer { color: var(--explorer); border-left: 2px solid var(--explorer); }
.class-group-header.caster   { color: var(--caster); border-left: 2px solid var(--caster); }
.class-list { display: flex; flex-wrap: wrap; gap: 4px; }
.class-btn {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  padding: 4px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .1s;
}
.class-btn:hover { border-color: var(--border-mid); color: var(--text-bone); }
.class-btn.selected { background: rgba(138,98,24,.2); border-color: var(--gold-bright); color: var(--gold-bright); }
.class-btn:disabled { opacity: .3; cursor: not-allowed; }

/* class-columns / class-opt — used by renderStepClass */
.class-columns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.class-opt {
  padding: 8px 10px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  cursor: pointer;
  transition: border-color .15s, background .15s;
  border-radius: 0;
}
.class-opt:hover { border-color: var(--border-mid); background: rgba(58,40,16,.4); }
.class-opt.selected { border-color: var(--gold-bright); background: rgba(138,98,24,.2); }
.skill-opt.free-skill { opacity: .55; cursor: default; pointer-events: none; border-style: dashed; }
.skill-tag { font-size: 8px; color: var(--text-dim); font-style: italic; margin-left: 4px; }
.skill-tag.vp-cost { color: #c08020; }
.class-opt-name {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--text-bone);
  margin-bottom: 3px;
}
.class-opt.selected .class-opt-name { color: var(--gold-bright); }
.class-opt-desc {
  font-size: 9px;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.4;
}
.class-opt-card-btn {
  font-size: 8px; color: var(--gold-bright); cursor: pointer;
  margin-top: 3px; opacity: .65; text-decoration: underline; display: inline-block;
}
.class-opt-card-btn:hover { opacity: 1; }
.class-opt.disabled { opacity: .35; cursor: default; pointer-events: none; }

/* attr-builder — used by renderStepAttrs */
.attr-builder { display: flex; flex-direction: column; gap: 4px; }
.dev-points-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  padding: 8px 12px;
  margin-bottom: 8px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-muted);
}
.dev-points-count {
  font-size: 22px;
  font-weight: 700;
  color: var(--gold-bright);
  min-width: 32px;
  text-align: right;
}
.dev-points-count.warn  { color: #c87030; }
.dev-points-count.spent { color: var(--blood-red); }
.attr-builder-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  border-left: 3px solid var(--border-dim);
}
.attr-builder-row:hover { border-left-color: var(--border-gold); }
.attr-builder-name {
  flex: 1;
  font-size: 11px;
  color: var(--text-bone);
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.attr-builder-name em {
  font-size: 9px;
  color: var(--text-dim);
  font-style: italic;
}
.attr-builder-val {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold-bright);
  min-width: 28px;
  text-align: center;
}
.attr-btn {
  width: 26px; height: 26px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.attr-btn:hover:not(:disabled) { border-color: var(--border-gold); color: var(--text-bone); }
.attr-btn:disabled { opacity: .25; cursor: default; }
.attr-builder-range {
  font-size: 9px;
  color: var(--text-dim);
  min-width: 40px;
  text-align: right;
}
.attr-cost-label {
  font-size: 9px;
  color: var(--text-muted);
  min-width: 56px;
  text-align: right;
}
.attr-dev-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
}
.attr-dev-label { flex: 1; font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.attr-dev-label svg { width: 12px; height: 12px; }
.attr-dev-val {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--gold-bright);
  min-width: 24px;
  text-align: center;
}
.attr-dev-max { font-size: 8px; color: var(--text-dim); }

/* Portrait picker */
.portrait-grid, .portrait-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.portrait-opt {
  width: 52px; height: 52px; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-raised); border: 1px solid var(--border-dim); cursor: pointer; transition: border-color .1s;
}
.portrait-opt:hover { border-color: var(--border-mid); }
.portrait-opt.selected { border-color: var(--gold-bright); background: rgba(138,98,24,.2); }

/* Mini portrait grid — actual DUN miniature images */
.portrait-mini-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
  max-height: 300px; overflow-y: auto; padding: 4px;
  background: var(--bg-dark); border: 1px solid var(--border-dim);
}
.portrait-mini-grid::-webkit-scrollbar { width: 4px; }
.portrait-mini-grid::-webkit-scrollbar-thumb { background: var(--border-dim); }
.portrait-mini-opt {
  width: 64px; height: 80px; flex-shrink: 0;
  background: #72cece; border: 2px solid transparent; cursor: pointer;
  overflow: hidden; transition: border-color .1s;
}
.portrait-mini-opt:hover { border-color: var(--border-gold); }
.portrait-mini-opt.selected { border-color: var(--gold-bright); box-shadow: 0 0 0 1px var(--gold-bright); }
.portrait-mini-opt img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; display: block; }

/* Race detail */
.race-detail {
  background: var(--bg-dark);
  border: 1px solid var(--border-dim);
  padding: 12px;
  margin-top: 10px;
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
}
.race-detail table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.race-detail td { padding: 2px 6px; border-bottom: 1px solid rgba(58,42,16,.3); font-size: 9px; }
.race-detail td:first-child { color: var(--text-dim); }
.race-detail td:last-child { color: var(--text-bone); font-family: 'Cinzel', serif; text-align: right; }

/* ─────────────────────────────────────────────── PARTY MANAGEMENT MODALS */
.mini-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.mini-modal-overlay.open { display: flex; }
.mini-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-gold);
  padding: 24px;
  min-width: 300px;
  max-width: 420px;
  width: 100%;
}
.mini-modal-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 13px;
  color: var(--gold-bright);
  margin-bottom: 16px;
}
.form-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
}
.form-group { margin-bottom: 14px; }
.step-name-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-input, .form-textarea {
  width: 100%;
  background: var(--bg-dark);
  border: 1px solid var(--border-mid);
  color: var(--text-bone);
  padding: 9px 12px;
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  margin-bottom: 12px;
}
.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--gold-bright);
}
.form-textarea { min-height: 70px; resize: vertical; }
.mini-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

/* ─────────────────────────────────────────────── XP AWARD VIEW */
.xp-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
.xp-hero-row {
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ─────────────────────────────────────────────── COMPANIONS (pets/mercs in detail sheet) */
.companion-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-family: 'Cinzel', serif;
  padding: 3px 8px;
  border: 1px solid var(--border-dim);
  background: var(--bg-dark);
  color: var(--text-muted);
  margin: 2px;
}
.companion-chip .remove-x { color: var(--blood-red); cursor: pointer; font-size: 11px; margin-left: 4px; }
.companion-chip .remove-x:hover { color: #d06060; }

/* Card image grid in companion picker */
.companion-picker-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
  padding: 4px;
}
.companion-card-opt {
  cursor: pointer;
  border: 1px solid var(--border-dim);
  transition: border-color .1s;
  width: 100px;
}
.companion-card-opt:hover { border-color: var(--gold-bright); }
.companion-card-opt img {
  width: 100px;
  height: auto;
  display: block;
}
.companion-card-opt-label {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  color: var(--text-muted);
  text-align: center;
  padding: 2px 4px;
  background: var(--bg-raised);
}

/* ─────────────────────────────────────────────── SCROLLBARS */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-dim); }

/* ─────────────────────────────────────────────── EMPTY STATES */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.empty-state-sub { font-size: 11px; font-style: italic; }

/* Companions section within strip */
.companions-divider {
  width: 1px;
  background: var(--border-dim);
  align-self: stretch;
  margin: 0 4px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ═══════ APP HEADER ═══════════════════════════════════════ -->
<div class="app-header">
  <div class="app-logo">
    DUN Generator
    <span>Party Manager</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('parties')">Parties</button>
    <button class="nav-tab" id="tab-party-view" onclick="showView('party-view')" style="display:none">Active Party</button>
    <button class="nav-tab" onclick="showView('xp')">Award XP</button>
    <button class="nav-tab" onclick="showView('all-heroes')">All Heroes</button>
  </div>
</div>

<!-- ═══════ PARTIES LIST VIEW ═══════════════════════════════ -->
<div class="view active" id="view-parties">
  <div class="parties-toolbar">
    <div class="section-heading">Warbands &amp; Parties</div>
    <button class="btn-grim" onclick="openNewPartyModal()">+ New Party</button>
  </div>
  <div class="parties-grid" id="parties-grid"></div>
  <div id="parties-empty" class="empty-state" style="display:none">
    <div class="empty-state-title">No Parties Yet</div>
    <div class="empty-state-sub">Create a party to begin assembling your warband.</div>
  </div>
</div>

<!-- ═══════ ACTIVE PARTY VIEW ═══════════════════════════════ -->
<div class="view" id="view-party-view">
  <div class="party-view-header">
    <button class="btn-secondary" onclick="showView('parties')">← Parties</button>
    <div class="party-title" id="active-party-title">Party</div>
    <div class="party-vp-badge">Party VP <strong id="party-vp-total">0</strong></div>
    <button class="btn-grim" onclick="openCreator()" style="margin-left:auto">+ New Hero</button>
    <button class="btn-grim" onclick="openAddHeroModal()">+ Add Hero</button>
  </div>

  <!-- Hero strip -->

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let heroes    = [];
let parties   = [];
let activePartyId = null;
let creatorState  = null;
let creatorStep   = 0;
let editingHeroId = null;
let selectedCardHeroId = null; // which hero's cards are expanded

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function save() {
  localStorage.setItem('dun_heroes_v2', JSON.stringify(heroes));
  localStorage.setItem('dun_parties_v2', JSON.stringify(parties));
  localStorage.setItem('dun_active_party', activePartyId || '');
}

function load() {
  try {
    const h = localStorage.getItem('dun_heroes_v2');
    const p = localStorage.getItem('dun_parties_v2');
    const ap = localStorage.getItem('dun_active_party');
    heroes  = h ? JSON.parse(h) : [];
    parties = p ? JSON.parse(p) : [];
    activePartyId = ap || null;

    // Migrate old heroes (dun_heroes) that had no party
    const oldH = localStorage.getItem('dun_heroes');
    if (oldH && !heroes.length) {
      heroes = JSON.parse(oldH);
      // Create a default party and put all old heroes into it
      if (heroes.length && !parties.length) {
        const defParty = { id: 'party_' + Date.now(), name: 'My Party', notes: '', heroIds: heroes.map(h => h.id) };
        parties.push(defParty);
        activePartyId = defParty.id;
      }
      save();
    }
  } catch(e) {
    heroes = []; parties = []; activePartyId = null;
  }
  // Ensure hero migrations
  heroes.forEach(h => {
    if (!h.attrs) h.attrs = {};
    if (h.attrs.dexterity == null) h.attrs.dexterity = 0;
    if (h.attrs.perception == null) h.attrs.perception = 0;
    if (!h.equippedItems) h.equippedItems = [];
    if (!h.knownSpells) h.knownSpells = [];
    if (!h.skills) h.skills = [];
    if (!h.mercenaries) h.mercenaries = []; // array of merc IDs
    if (!h.pets) h.pets = [];               // array of pet IDs
    if (h.portraitUrl === undefined) h.portraitUrl = null;
    if (h.portraitCustom === undefined) h.portraitCustom = null;
    if (h.weightCurrent == null) h.weightCurrent = 0;
    if (h.xpSpent == null) h.xpSpent = 0;
    if (!h.fortuneBase) h.fortuneBase = h.fortune;
  });
}

// ═══════════════════════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const viewEl = document.getElementById('view-' + name);
  if (viewEl) viewEl.classList.add('active');

  const tabMap = {
    'parties': 0, 'party-view': 1, 'xp': 2, 'all-heroes': 3
  };
  const tabs = document.querySelectorAll('.nav-tab');
  if (tabMap[name] != null && tabs[tabMap[name]]) tabs[tabMap[name]].classList.add('active');

  if (name === 'parties')      renderPartiesList();
  if (name === 'party-view')   renderPartyView();
  if (name === 'xp')           renderXpView();
  if (name === 'all-heroes')   renderAllHeroes();
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════════════════════
// PARTY MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function openNewPartyModal() {
  document.getElementById('new-party-name').value = '';
  document.getElementById('new-party-notes').value = '';
  openModal('modal-new-party');
}

function createParty() {
  const name = document.getElementById('new-party-name').value.trim() || 'New Warband';
  const notes = document.getElementById('new-party-notes').value.trim();
  const party = { id: 'party_' + Date.now(), name, notes, heroIds: [] };
  parties.push(party);
  save();
  closeModal('modal-new-party');
  renderPartiesList();
}

function openParty(id) {
  activePartyId = id;
  save();
  const tabBtn = document.getElementById('tab-party-view');
  if (tabBtn) tabBtn.style.display = '';
  showView('party-view');
}

function deleteParty(id) {
  if (!confirm('Delete this party? Heroes will not be deleted.')) return;
  parties = parties.filter(p => p.id !== id);
  if (activePartyId === id) activePartyId = null;
  save();
  renderPartiesList();
}

function renderPartiesList() {
  const grid = document.getElementById('parties-grid');
  const empty = document.getElementById('parties-empty');
  if (!parties.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = parties.map(p => {
    const memberHeroes = p.heroIds.map(id => heroes.find(h => h.id === id)).filter(Boolean);
    const totalVP = memberHeroes.reduce((s,h) => s + (h.vp||10), 0);
    return `<div class="party-item ${p.id === activePartyId ? 'active-party' : ''}" onclick="openParty('${p.id}')">
      <div class="party-item-name">${p.id === activePartyId ? '⚑ ' : ''}${p.name}</div>
      <div class="party-item-meta">${memberHeroes.length} hero${memberHeroes.length !== 1 ? 'es' : ''} · VP ${totalVP}</div>
      ${p.notes ? `<div class="party-item-meta" style="margin-top:4px;">${p.notes}</div>` : ''}
      <div class="party-item-actions" onclick="event.stopPropagation()">
        <button class="btn-secondary" onclick="openParty('${p.id}')">Open</button>
        <button class="btn-secondary danger" onclick="deleteParty('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// ADD/REMOVE HERO FROM PARTY
// ═══════════════════════════════════════════════════════════════
function openAddHeroModal() {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) return;
  const list = document.getElementById('add-hero-list');
  const available = heroes.filter(h => !party.heroIds.includes(h.id));
  if (!available.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-style:italic;font-size:11px;padding:8px;">All heroes are already in this party, or no heroes exist. Create a new hero first.</div>';
  } else {
    list.innerHTML = available.map(h => {
      const race = RACE_DB.find(r => r.id === h.raceId) || {};
      const cls  = CLASS_DB.find(c => c.id === h.classId) || {};
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--border-dim);">
        <div style="font-size:24px;">${h.portrait}</div>
        <div style="flex:1;">
          <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-bright);">${h.name}</div>
          <div style="font-size:10px;color:var(--text-muted);">${race.name||'?'} · ${cls.name||'?'} · VP ${h.vp}</div>
        </div>
        <button class="btn-grim" onclick="addHeroToParty('${h.id}')">Add</button>
      </div>`;
    }).join('');
  }
  openModal('modal-add-hero');
}

function addHeroToParty(heroId) {
  const party = parties.find(p => p.id === activePartyId);
  if (!party || party.heroIds.includes(heroId)) return;
  party.heroIds.push(heroId);
  save();
  closeModal('modal-add-hero');
  renderPartyView();
}

function removeHeroFromParty(heroId) {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) return;
  party.heroIds = party.heroIds.filter(id => id !== heroId);
  if (selectedCardHeroId === heroId) {
    selectedCardHeroId = null;
    document.getElementById('global-cards-panel').classList.remove('open');
    document.getElementById('global-cards-panel').innerHTML = '';
  }
  save();
  renderPartyView();
}

// ═══════════════════════════════════════════════════════════════
// PARTY VP
// ═══════════════════════════════════════════════════════════════
function calcPartyVP() {
  const party = parties.find(p => p.id === activePartyId);
  const partyHeroes = party
    ? party.heroIds.map(id => heroes.find(h => h.id === id)).filter(Boolean)
    : heroes;

  let total = 0;
  for (const h of partyHeroes) {
    // Hero base VP
    total += h.vp || 10;
    // Merc VP (rulebook p.9)
    for (const mid of (h.mercenaries || [])) {
      total += MERC_DB[mid]?.vp || 0;
    }
    // Pet VP (rulebook p.9)
    for (const pid of (h.pets || [])) {
      total += PET_DB[pid]?.vp || 0;
    }
    // Magic/Special item VP (rulebook p.9: Magic Objects, Relics, Special Objects only)
    for (const itemId of (h.equippedItems || [])) {
      total += ITEM_BY_ID[itemId]?.vp || 0;
    }
    for (const itemId of (h.backpack || [])) {
      total += ITEM_BY_ID[itemId]?.vp || 0;
    }
  }
  return total;
}

// ═══════════════════════════════════════════════════════════════
// RENDER PARTY VIEW — horizontal hero strip
// ═══════════════════════════════════════════════════════════════
function renderPartyView() {
  const party = parties.find(p => p.id === activePartyId);
  if (!party) { showView('parties'); return; }

  document.getElementById('active-party-title').textContent = party.name;
  document.getElementById('party-vp-total').textContent = calcPartyVP();

  const strip = document.getElementById('hero-strip');
  const partyHeroes = party.heroIds.map(id => heroes.find(h => h.id === id)).filter(Boolean);

  let html = '';
  partyHeroes.forEach(h => {
    html += renderDunHeroCard(h, true);
  });
  // Add companion cards (pets and mercs of all party heroes)
  const companions = [];
  partyHeroes.forEach(h => {
    (h.pets||[]).forEach(pid => companions.push({type:'pet', id: pid, owner: h.name}));
    (h.mercenaries||[]).forEach(mid => companions.push({type:'merc', id: mid, owner: h.name}));
  });
  if (companions.length) {
    html += '<div class="companions-divider"></div>';
    companions.forEach(c => { html += renderCompanionCard(c); });
  }

  // Add-hero slot
  html += `<div class="hero-add-slot" onclick="openAddHeroModal()">
    ${ICONS.merc}
    <div class="hero-add-label">Add Hero</div>
  </div>`;

  strip.innerHTML = html;
}

function getPortraitUrl(raceId, classGroup) {
  const options = RACE_PORTRAITS[raceId];

  return PORTRAIT_BASE + pool[raceId % pool.length];
}

  const vitPct = Math.round(((h.currentVitality ?? h.attrs.vitality) / h.attrs.vitality) * 100);
  const vitFillCls = vitPct >= 70 ? 'healthy' : vitPct >= 35 ? 'wounded' : '';

  const alignCls = race.alignment === 'good' ? 'align-good' : race.alignment === 'evil' ? 'align-evil' : 'align-neutral';

  const statRow = (key, icon, side) => {
    const base = h.attrs[key] ?? 0;

    const ico  = `<div class="stat-dun-icon">${icon}</div>`;

function renderCompanionCard(c) {
  const isMetc = c.type === 'merc';
  const names = isMetc ? MERC_NAMES : PET_NAMES;
  const name = names[c.id] || `#${c.id}`;
  const imgSrc = `${CARD_BASE}${isMetc ? 'mercs' : 'pets'}/${c.id}.jpg`;
  return `<div class="dun-hero-card companion-card">
    <span class="companion-label">${isMetc ? 'Mercenary' : 'Animal'}</span>
    <div style="padding:4px 4px 0;">
      <img src="${imgSrc}" alt="${name}" style="width:100%;height:auto;display:block;border:1px solid var(--border-dim);"
        onerror="this.style.display='none'">
    </div>
    <div style="padding:4px 4px 6px;">
      <div class="card-name" style="font-size:9px;">${name}</div>
      <div class="card-race-class" style="font-size:8px;">Hired by ${c.owner}</div>
    </div>
  </div>`;
}

  const panel = document.getElementById('global-cards-panel');
  const prevSelected = selectedCardHeroId;

  // Deselect previous card button
  if (prevSelected) {
    const prevBtn = document.getElementById('cards-btn-' + prevSelected);
    if (prevBtn) prevBtn.classList.remove('active');
    const prevCard = document.getElementById('hero-card-' + prevSelected);
    if (prevCard) prevCard.classList.remove('selected');
  }

  if (prevSelected === heroId) {
    // Toggle off
    selectedCardHeroId = null;
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }

  selectedCardHeroId = heroId;
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;

  if (!h.equippedItems) h.equippedItems = [];
  if (!h.knownSpells)   h.knownSpells   = [];

  panel.innerHTML = `<div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-bright);margin-bottom:12px;">${h.name} — Cards</div>`
    + renderCardsPanel(h);
  panel.classList.add('open');

  // Scroll panel into view
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);

  // Mark new card selected
  const newBtn = document.getElementById('cards-btn-' + heroId);
  if (newBtn) newBtn.classList.add('active');
  const newCard = document.getElementById('hero-card-' + heroId);
  if (newCard) newCard.classList.add('selected');
}

// ═══════════════════════════════════════════════════════════════
// XP VIEW
// ═══════════════════════════════════════════════════════════════
function renderXpView() {
  const el = document.getElementById('xp-award-list');
  const pool = activePartyId
    ? (parties.find(p=>p.id===activePartyId)?.heroIds||[]).map(id=>heroes.find(h=>h.id===id)).filter(Boolean)
    : heroes;

  if (!pool.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-style:italic;padding:20px;">No heroes. Create a party and add heroes first.</div>';
    return;
  }

  el.innerHTML = `
    <div style="background:var(--bg-raised);border:1px solid var(--border-dim);padding:10px 16px;margin-bottom:16px;font-size:10px;color:var(--text-muted);">
      <strong style="color:var(--text-bone);">Rulebook (p.80):</strong>
      Every <strong style="color:var(--gold-bright)">3 XP</strong> = 1 Development Point → spend on attribute increase or skill/spell/fortune.
      Each upgrade costs <strong style="color:var(--gold-bright)">+2 VP</strong> regardless of dev points spent.
      Attribute dev-point cost varies by race (shown on race card).
    </div>
    ${pool.map(h => {
      const race = RACE_DB.find(r=>r.id===h.raceId) || {};
      const cls  = CLASS_DB.find(c=>c.id===h.classId) || {};
      const devPts     = Math.floor(h.xp / 3);
      const xpRemainder = h.xp % 3;

      // Build upgradable attributes with race-specific dev-point costs
      const upgradeRows = ATTR_META.filter(a => {
        if (!a.devPts) return false;
        const at = race.attrs?.[a.key];
        if (!at) return false;
        const cur = h.attrs[a.key] ?? at.min ?? 0;
        return cur < at.max; // only show if can still increase
      }).map(a => {
        const at   = race.attrs[a.key];
        const cur  = h.attrs[a.key] ?? at.min ?? 0;
        let   dc   = at.dc;
        // Class discount on first increase of bonusAttr
        if (cls.bonusAttr === a.key && cur === at.min) dc = Math.max(1, dc - 1);
        const canUpgrade = devPts >= dc;
        const xpNeeded   = dc * 3;
        return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border-dim);">
          <div style="flex:1;font-size:10px;color:${canUpgrade?'var(--text-bone)':'var(--text-dim)'};">
            ${a.icon} ${a.label}
            <span style="font-size:9px;color:var(--text-dim);margin-left:4px;">${cur} → ${cur+1}</span>
          </div>
          <div style="font-size:9px;color:var(--text-muted);min-width:100px;text-align:right;">
            ${dc} dev pt${dc>1?'s':''} = ${xpNeeded} XP · +2 VP
          </div>
          <button class="attr-btn" style="width:22px;height:22px;font-size:12px;"
            ${canUpgrade?`onclick="spendXpOnAttr('${h.id}','${a.key}',${dc})"`:' disabled'}
            title="${canUpgrade?'Spend '+xpNeeded+' XP to increase '+a.label:'Need '+xpNeeded+' XP ('+dc+' dev pts)'}">+</button>
        </div>`;
      }).join('');

      return `<div class="xp-hero-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-raised);">
          <div style="flex:1;">
            <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold-bright);">${h.name}</div>
            <div style="font-size:10px;color:var(--text-muted);">${race.name||'?'} · ${cls.name||'?'} · VP ${h.vp}</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:9px;color:var(--text-muted);margin-bottom:2px;">XP</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="qty-btn" onclick="awardXP('${h.id}',-1)">−</button>
              <span style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold-bright);min-width:28px;text-align:center;">${h.xp}</span>
              <button class="qty-btn" onclick="awardXP('${h.id}',1)">+</button>
            </div>
          </div>
          <div style="text-align:center;min-width:80px;">
            <div style="font-size:9px;color:var(--text-muted);margin-bottom:2px;">Dev Points</div>
            <div style="font-family:'Cinzel',serif;font-size:18px;color:${devPts>0?'var(--gold-bright)':'var(--text-dim)'};">${devPts}</div>
            ${xpRemainder>0?`<div style="font-size:8px;color:var(--text-dim);">(${xpRemainder} XP spare)</div>`:''}
          </div>
        </div>
        ${devPts > 0 ? `
        <div style="padding:8px 12px;background:var(--bg-dark);border-top:1px solid var(--border-dim);">
          <div style="font-size:9px;color:var(--text-muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">
            Spend Dev Points — Attributes (race max limits apply)
          </div>
          ${upgradeRows || '<div style="font-size:9px;color:var(--text-dim);font-style:italic;">All attributes at racial maximum.</div>'}
        </div>` : ''}
      </div>`;
    }).join('')}`;
}

function awardXP(id, delta) {
  const h = heroes.find(h=>h.id===id);
  if (h) { h.xp = Math.max(0, h.xp + delta); save(); renderXpView(); }
}

function spendXpOnAttr(heroId, attrKey, devPtCost) {
  const h    = heroes.find(h=>h.id===heroId);
  const race = RACE_DB.find(r=>r.id===h.raceId);
  if (!h || !race) return;

  const xpCost = devPtCost * 3;
  if (h.xp < xpCost) return;

  const at  = race.attrs[attrKey];
  const cur = h.attrs[attrKey] ?? at.min ?? 0;
  if (cur >= at.max) return;

  // Rulebook p.80: each upgrade = +2 VP, costs the required XP
  h.xp         -= xpCost;
  h.xpSpent    += xpCost;
  h.attrs[attrKey] = cur + 1;
  h.vp         += 2;

  // Keep current vitality in sync if vitality upgraded
  if (attrKey === 'vitality') h.currentVitality = Math.min(h.currentVitality + 1, h.attrs.vitality);

  save();
  renderXpView();
  renderPartyView(); // refresh cards
}

// ═══════════════════════════════════════════════════════════════
// QUICK REST (on card)
// ═══════════════════════════════════════════════════════════════
function quickRest(id) {
  const h = heroes.find(h=>h.id===id);
  if (!h) return;
  const cls = CLASS_DB.find(c=>c.id===h.classId);
  h.currentVitality = h.attrs.vitality;
  h.currentFortune = h.fortune;
  if (cls?.isCaster) {
    const intVal = h.attrs.intelligence||3;
    h.currentMana = Math.min((h.knownSpells||[]).length * 2, intVal * 3);
  }
  save();
  renderPartyView();
}

function renderCompanionsSection(h) {
  const mercChips = (h.mercenaries||[]).map(mid => {
    const name = MERC_NAMES[mid] || `Mercenary #${mid}`;
    return `<span class="companion-chip">
      <span style="color:var(--text-muted)">${ICONS.merc}</span>${name}
      <span class="remove-x" onclick="removeCompanion('${h.id}','merc',${mid})">✕</span>
    </span>`;
  }).join('');

  const petChips = (h.pets||[]).map(pid => {
    const name = PET_NAMES[pid] || `Animal #${pid}`;
    return `<span class="companion-chip">
      <span style="color:var(--text-muted)">${ICONS.pet}</span>${name}
      <span class="remove-x" onclick="removeCompanion('${h.id}','pet',${pid})">✕</span>
    </span>`;
  }).join('');

  return `
    <div class="sheet-section-title">Mercenaries</div>
    <div id="merc-chips-${h.id}">${mercChips || '<em style="font-size:10px;color:var(--text-dim)">None hired</em>'}</div>
    <div style="margin-top:6px;">
      <button class="btn-secondary" style="font-size:9px;padding:4px 10px;" onclick="toggleCompanionPicker('${h.id}','merc')">+ Hire Mercenary</button>
    </div>
    <div id="merc-picker-${h.id}" style="display:none;margin-top:8px;"></div>

    <div class="sheet-section-title" style="margin-top:10px;">Animals &amp; Pets</div>
    <div id="pet-chips-${h.id}">${petChips || '<em style="font-size:10px;color:var(--text-dim)">None</em>'}</div>
    <div style="margin-top:6px;">
      <button class="btn-secondary" style="font-size:9px;padding:4px 10px;" onclick="toggleCompanionPicker('${h.id}','pet')">+ Add Animal</button>
    </div>
    <div id="pet-picker-${h.id}" style="display:none;margin-top:8px;"></div>
  `;
}

function toggleCompanionPicker(heroId, type) {
  const pickerId = `${type}-picker-${heroId}`;
  const picker = document.getElementById(pickerId);
  if (!picker) return;
  if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }

  const h = heroes.find(h => h.id === heroId);
  const already = type === 'merc' ? (h.mercenaries||[]) : (h.pets||[]);
  const ids = type === 'merc' ? MERCENARY_IDS : PET_IDS;
  const names = type === 'merc' ? MERC_NAMES : PET_NAMES;

  const cards = ids.filter(id => !already.includes(id)).map(id => {
    const name = names[id] || `#${id}`;
    const imgSrc = `${CARD_BASE}${type === 'merc' ? 'mercs' : 'pets'}/${id}.jpg`;
    return `<div class="companion-card-opt" onclick="addCompanion('${heroId}','${type}',${id})"
      title="${name}">
      <img src="${imgSrc}" alt="${name}" loading="lazy"
        onerror="this.parentElement.style.display='none'">
      <div class="companion-card-opt-label">${name}</div>
    </div>`;
  }).join('');

  picker.innerHTML = `<div style="background:var(--bg-dark);border:1px solid var(--border-dim);padding:10px;">
    <div style="font-size:9px;color:var(--text-muted);margin-bottom:8px;font-style:italic;">Select a ${type === 'merc' ? 'mercenary' : 'companion animal'} to add. Card images load from GitHub repo.</div>
    <div class="companion-picker-grid">${cards || '<em style="color:var(--text-dim);font-size:10px;">All already added.</em>'}</div>
  </div>`;
  picker.style.display = 'block';
}

function addCompanion(heroId, type, id) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (type === 'merc') { if (!h.mercenaries) h.mercenaries=[]; if (!h.mercenaries.includes(id)) h.mercenaries.push(id); }
  else { if (!h.pets) h.pets=[]; if (!h.pets.includes(id)) h.pets.push(id); }
  save();
  openDetail(heroId);
}

function removeCompanion(heroId, type, id) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  if (type === 'merc') h.mercenaries = (h.mercenaries||[]).filter(x => x !== id);
  else h.pets = (h.pets||[]).filter(x => x !== id);
  save();
  // Refresh chips inline without full re-render
  const names = type === 'merc' ? MERC_NAMES : PET_NAMES;
  const arr = type === 'merc' ? (h.mercenaries||[]) : (h.pets||[]);
  const chipsEl = document.getElementById(`${type}-chips-${heroId}`);
  if (chipsEl) {
    chipsEl.innerHTML = arr.map(mid => {
      const name = names[mid]||`#${mid}`;
      return `<span class="companion-chip"><span>${type==='merc'?ICONS.merc:ICONS.pet}</span>${name}<span class="remove-x" onclick="removeCompanion('${heroId}','${type}',${mid})">✕</span></span>`;
    }).join('') || `<em style="font-size:10px;color:var(--text-dim)">None</em>`;
  }
}

function openCreator() {
  const race = RACE_DB[0];
  creatorState = {
    name: '', portrait: '⚔',
    raceId: null, classId: null,
    devPointsTotal: 8, devPointsSpent: 0,
    attrs: {},
    skills: []
  };
  creatorStep = 0;
  document.getElementById('creator-overlay').classList.add('open');
  renderCreatorStep();
}

function closeCreator() {
  document.getElementById('creator-overlay').classList.remove('open');
  creatorState = null;
}

function renderStepIndicator() {
  const el = document.getElementById('step-indicator');
  el.innerHTML = CREATOR_STEPS.map((s, i) => {
    let cls = i < creatorStep ? 'done' : i === creatorStep ? 'active' : '';
    return `<div class="step-dot ${cls}" title="${s}"></div>`;
  }).join('');
  const titleEl = document.getElementById('creator-title-label');
  if (titleEl) titleEl.textContent = `Create Hero — ${CREATOR_STEPS[creatorStep]}`;
  const prevBtn = document.getElementById('creator-prev-btn');
  if (prevBtn) prevBtn.style.visibility = creatorStep === 0 ? 'hidden' : 'visible';
  const nextBtn = document.getElementById('creator-next-btn');
  if (nextBtn) nextBtn.textContent = creatorStep === CREATOR_STEPS.length - 1 ? 'Create Hero ✓' : 'Next →';
}

function renderCreatorStep() {
  renderStepIndicator();
  const body = document.getElementById('creator-body');
  switch(creatorStep) {
    case 0: body.innerHTML = renderStepName(); break;
    case 1: body.innerHTML = renderStepRace(); attachRaceEvents(); break;
    case 2: body.innerHTML = renderStepClass(); attachClassEvents(); break;
    case 3: body.innerHTML = renderStepAttrs(); attachAttrEvents(); break;
    case 4: body.innerHTML = renderStepSkills(); break;
    case 5: body.innerHTML = renderStepSpells(); break;
    case 6: body.innerHTML = renderStepReview(); break;
  }
}

function selectPortraitUrl(url) {
  creatorState.portraitUrl = url;

  // Update preview
  const img = document.getElementById('portrait-preview-img');
  if (img) img.src = url;
  document.querySelectorAll('.portrait-mini-opt').forEach(el => {
    const elImg = el.querySelector('img');
    el.classList.toggle('selected', elImg && elImg.src === url);
  });
}

function handlePortraitUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    // Compress to max 200×250 via canvas
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxW = 200, maxH = 250;
      let w = img.width, h = img.height;
      if (w > maxW || h > maxH) {
        const ratio = Math.min(maxW/w, maxH/h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.8);
      creatorState.portraitCustom = compressed;
      creatorState.portraitUrl = null;
      // Update preview
      const prevImg = document.getElementById('portrait-preview-img');
      if (prevImg) prevImg.src = compressed;
      // Deselect miniatures
      document.querySelectorAll('.portrait-mini-opt').forEach(el => el.classList.remove('selected'));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function pickPortraitForHero(heroId, url) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  h.portraitUrl = url;
  h.portraitCustom = null;
  save();
  const prevImg = document.getElementById('pp-preview');
  if (prevImg) prevImg.src = url;
  document.querySelectorAll('#detail-modal .portrait-mini-opt').forEach(el => {
    el.classList.toggle('selected', el.querySelector('img')?.src === url);
  });
  renderPartyView();
}

function handlePortraitUploadForHero(heroId, input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxW = 200, maxH = 250;
      let w = img.width, h = img.height;
      if (w > maxW || h > maxH) {
        const ratio = Math.min(maxW/w, maxH/h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.8);
      const hero = heroes.find(h => h.id === heroId);
      if (hero) { hero.portraitCustom = compressed; hero.portraitUrl = null; save(); }
      const prevImg = document.getElementById('pp-preview');
      if (prevImg) prevImg.src = compressed;
      document.querySelectorAll('#detail-modal .portrait-mini-opt').forEach(el => el.classList.remove('selected'));
      renderPartyView();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function clearPortrait(heroId) {
  const h = heroes.find(h => h.id === heroId);
  if (!h) return;
  h.portraitCustom = null;
  h.portraitUrl = null;

  closeDetail();

function renderStepRace() {

function renderRaceDetail(race) {
  if (!race) return '';
  const rows = ATTR_META.filter(a => a.key !== 'mana' || race.attrs.mana).map(a => {
    const at = race.attrs[a.key];
    if (!at) return '';
    const dots = at.dc > 0 ? '●'.repeat(at.dc) : '—';
    const range = at.min === at.max ? `${at.min}` : `${at.min} – ${at.max}`;
    return `<div class="attr-row">
      <span class="attr-name">${a.icon} ${a.label}</span>
      <span class="attr-range">${range}</span>
      <span class="attr-cost"><span class="attr-dots">${dots}</span></span>
    </div>`;
  }).join('');

  const cardUrl = race.cardSiteId
    ? `https://squidboy30.github.io/DUN-Generator/src/cards/races/${race.cardSiteId}.jpg`
    : null;
  const viewCardBtn = cardUrl
    ? `<button class="btn-secondary" style="font-size:9px;padding:3px 10px;margin-top:6px;"
        onclick="showCardLightbox('${cardUrl}','${race.name} Race Card')">🃏 View Race Card</button>`
    : '';

  return `
    <div class="race-detail-title">${race.name} <span class="race-align-badge align-${race.alignment}">${race.alignment}</span>
      ${viewCardBtn}
    </div>
    <div class="attr-table">${rows}</div>
    <div class="race-skills-row"><strong>Starting skills:</strong> ${race.startingSkills.join(', ') || 'None'}</div>
    <div class="race-special">${race.special}</div>`;
}

function selectRace(id) {
  if (creatorState.raceId === id) {
    // Already selected — click again to zoom
    const race = RACE_DB.find(r => r.id === id);
    if (race?.cardSiteId) {
      const base = 'https://squidboy30.github.io/DUN-Generator/src/cards/races/';
      showCardLightbox(`${base}${race.cardSiteId}.jpg`, race.name + ' Race Card');
    }
    return;
  }
  creatorState.raceId = id;
  document.querySelectorAll('.race-img-card').forEach(el => {
    const sel = parseInt(el.dataset.raceId) === id;
    el.classList.toggle('selected', sel);
    // Update badge
    el.querySelector('.race-img-selected-badge')?.remove();
    if (sel) {
      const badge = document.createElement('div');
      badge.className = 'race-img-selected-badge';
      badge.textContent = '✓';
      el.appendChild(badge);
    }
  });
  document.getElementById('race-detail').innerHTML = renderRaceDetail(RACE_DB.find(r => r.id === id));
  initAttrsFromRace();
}

function initAttrsFromRace() {
  if (!creatorState.raceId) return;
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  creatorState.attrs = {};
  ATTR_META.forEach(a => {
    const at = race.attrs[a.key];
    if (!at) { creatorState.attrs[a.key] = null; return; }
    creatorState.attrs[a.key] = at.min;
  });
  creatorState.devPointsSpent = 0;

function renderStepClass() {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const allowed = race ? race.allowedClasses : [];
  const isAllowed = (cid) => allowed.includes('all') || allowed.includes(cid) || allowed.includes(cid.replace('_',' '));
  const base = 'https://squidboy30.github.io/DUN-Generator/src/cards/classes/';

  const groups = ['fighter','explorer','caster'];
  const groupLabels = { fighter:'Fighters', explorer:'Explorers', caster:'Spellcasters' };
  const sections = groups.map(g => {
    const classes = CLASS_DB.filter(c => c.group === g);
    const cards = classes.map(c => {
      const ok = isAllowed(c.id) || isAllowed(c.name.toLowerCase());
      const sel = creatorState.classId === c.id;
      const imgUrl = c.cardSiteId ? `${base}${c.cardSiteId}.jpg` : null;
      return `<div class="race-img-card ${sel ? 'selected' : ''} ${!ok ? 'not-recommended' : ''}"
        data-class-id="${c.id}"

        ${imgUrl
          ? `<img src="${imgUrl}" alt="${c.name}" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
             <div class="race-img-fallback" style="display:none">${c.name}</div>`
          : `<div class="race-img-fallback">${c.name}</div>`}
        <div class="race-img-label">${c.name}${c.isCaster ? ' ✨' : ''}</div>
        ${sel ? '<div class="race-img-selected-badge">✓</div>' : ''}
        ${!ok ? '<div class="race-img-dim-badge">!</div>' : ''}
      </div>`;
    }).join('');
    return `<div style="margin-bottom:16px;">
      <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--text-muted);
        border-bottom:1px solid var(--border-dim);padding-bottom:4px;margin-bottom:8px;">${groupLabels[g]}</div>

// ─── Step 3: Attributes ────────────────────────────────────────
function renderStepAttrs() {
  if (!creatorState.raceId) return '<p style="color:var(--text-muted)">Please select a race first.</p>';
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);
  const remaining = creatorState.devPointsTotal - creatorState.devPointsSpent;
  const warnClass = remaining === 0 ? 'spent' : remaining <= 2 ? 'warn' : '';

  const rows = ATTR_META.map(a => {
    // Dexterity and Perception: start at 0, skill-only, not on race card
    if (a.key === 'dexterity' || a.key === 'perception') {
      return `<div class="attr-builder-row">
        <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
        <div class="attr-builder-val" style="color:var(--text-muted)">0</div>
        <div class="attr-builder-range" style="color:#6a5030">skill-only</div>
        <div class="attr-cost-label" style="font-size:9px;color:#6a5030">modified by skills</div>
      </div>`;
    }
    const at = race.attrs[a.key];
    if (!at || a.key === 'naturalArmor') {
      const val = creatorState.attrs[a.key] ?? at?.min ?? 0;
      if (!at) return '';
      return `<div class="attr-builder-row">
        <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
        <div class="attr-builder-val" style="color:var(--text-muted)">${val}</div>
        <div class="attr-builder-range">(fixed)</div>
        <div class="attr-cost-label" style="font-size:9px;color:#6a5030">cannot change</div>
      </div>`;
    }
    if (a.key === 'mana' && !at) return '';

    const cur = creatorState.attrs[a.key] ?? at.min;
    let dc = at.dc;
    // Class bonus: first increase costs 1 less
    if (cls && cls.bonusAttr === a.key && cur === at.min) dc = Math.max(1, dc - 1);
    const canInc = cur < at.max && remaining >= dc;
    const canDec = cur > at.min;

    return `<div class="attr-builder-row">
      <div class="attr-builder-name">${a.icon} ${a.label}<em>${a.note}</em></div>
      <button class="attr-btn" ${canDec ? '' : 'disabled'} onclick="changeAttr('${a.key}',-1)">−</button>
      <div class="attr-builder-val">${cur}</div>
      <button class="attr-btn" ${canInc ? '' : 'disabled'} onclick="changeAttr('${a.key}',1)">+</button>
      <div class="attr-builder-range">${at.min} – ${at.max}</div>
      <div class="attr-cost-label">${dc > 0 ? dc + ' pt' + (dc > 1 ? 's' : '') + '/+1' : '—'}</div>
    </div>`;
  }).join('');

  return `<div class="attr-builder">
    <div class="dev-points-banner">
      <span>Development Points Remaining</span>
      <span class="dev-points-count ${warnClass}">${remaining}</span>
    </div>
    ${rows}
    <div style="margin-top:12px;font-size:10px;color:var(--text-muted);font-style:italic;">
      You have 8 development points to spend. Natural Armor and Fortune cannot be changed here.
      ${cls && cls.bonusAttr ? `<br>${cls.name}s get a 1-point discount on the first ${cls.bonusAttr.replace(/([A-Z])/g,' $1')} increase.` : ''}
    </div>
  </div>`;
}

function changeAttr(key, delta) {
  const race = RACE_DB.find(r => r.id === creatorState.raceId);
  const cls  = CLASS_DB.find(c => c.id === creatorState.classId);
  const at = race.attrs[key];
  if (!at) return;

  const cur = creatorState.attrs[key] ?? at.min;
  let dc = at.dc;
  if (cls && cls.bonusAttr === key && cur === at.min && delta > 0) dc = Math.max(1, dc - 1);

  if (delta > 0) {
    if (cur >= at.max) return;
    if (creatorState.devPointsSpent + dc > creatorState.devPointsTotal) return;
    creatorState.attrs[key] = cur + 1;
    creatorState.devPointsSpent += dc;
  } else {
    if (cur <= at.min) return;
    let refundDc = at.dc;
    if (cls && cls.bonusAttr === key && cur === at.min + 1) refundDc = Math.max(1, at.dc - 1);
    creatorState.attrs[key] = cur - 1;
    creatorState.devPointsSpent -= refundDc;
  }

  renderCreatorStep();
}

function attachAttrEvents() {}

/**
 * Calculate current attribute values by applying equipped item modifiers to base attrs.
 * Base attrs = starting racial stats + dev point upgrades (character evolution only).
 * Current attrs = base + item bonuses/penalties (armor, rings, potions, etc).
 */
// ═══════════════════════════════════════════════════════════════
// SKILL → ATTRIBUTE BONUS MAP
// Skills that permanently modify base attribute values on the card
// ═══════════════════════════════════════════════════════════════
const SKILL_ATTR_BONUSES = {
  // Permanent stat increases (these show as modified values on the card)
  'Strong':          { strength: 1 },
  'Tough':           { vitality: 1 },          // both combat and nature versions
  'Hardy':           { vitality: 1 },
  'Hardened':        { naturalArmor: 1 },
  'Fleet footed':    { movement: 1 },
  'Fast':            { movement: 1 },
  'Skilled hands':   { dexterity: 1 },
  'Sharp Senses':    { perception: 1 },        // both exploration and nature versions
  'Eagle eye':       { perception: 1 },
  'Acrobat':         { agility: 1 },
  'Large':           { strength: 1, naturalArmor: 1 },
  'Expert archer':   { shootingSkill: 1 },
  'Sword master':    { combatSkill: 1 },
  'Martial arts':    { combatSkill: 1 },
  'Elite':           { combatSkill: 1 },
  'Used to armors':  { naturalArmor: 1 },
};

function calcCurrentAttrs(baseAttrs, equippedItemIds, skillNames) {
  const cur = { ...baseAttrs };
  cur.totalArmor = cur.naturalArmor || 0;

  // Apply skill bonuses
  for (const skillName of (skillNames || [])) {
    const bonus = SKILL_ATTR_BONUSES[skillName];
    if (!bonus) continue;
    for (const [attr, mod] of Object.entries(bonus)) {
      cur[attr] = (cur[attr] ?? 0) + mod;
      if (attr === 'naturalArmor') cur.totalArmor = (cur.totalArmor || 0) + mod;
    }
  }

  // Apply equipment bonuses
  for (const itemId of (equippedItemIds || [])) {
    const item = ITEM_BY_ID[itemId];
    if (!item) continue;
    if (item.attrMods) {
      for (const [attr, mod] of Object.entries(item.attrMods)) {
        cur[attr] = (cur[attr] ?? 0) + mod;
      }
    }
    if (item.armorBonus) cur.totalArmor += item.armorBonus;
  }
  return cur;
}

const CLASS_SKILL_TYPES = {
  warrior:['combat','exploration'], barbarian:['combat'], knight:['combat','scholarly'],
  paladin:['combat','scholarly'], gladiator:['combat'], battle_dancer:['combat','exploration'],
  warrior_monk:['combat','scholarly'], scout:['combat','exploration'], ranger:['exploration','nature'],
